rasal verb). Two changes: passive→active + phrasal verb (set up) + tense (past simple→past perfect). Answer: had set up.", "chunk1": "had set up", "chunk2": "set up", "p1": "had set up (past perfect — earlier event)", "p2": "set up (phrasal verb = found)", "hint": "WAS FOUNDED → HAD SET UP. Passive→active + phrasal verb + past perfect."}, {"id": "b2t089", "orig": "They didn't manage to agree on a date for the next meeting.", "key": "UNABLE", "before": "They were", "after": "on a date for the next meeting.", "ans": "unable to agree", "accept": ["unable to agree"], "chunk1": "unable to", "chunk2": "agree", "p1": "be unable to = not manage to / not be able to", "p2": "agree (bare infinitive after 'to')", "hint": "DIDN'T MANAGE TO AGREE → WERE UNABLE TO AGREE. UNABLE TO = not able to.", "h": "DIDN'T MANAGE TO AGREE → WERE UNABLE TO AGREE. UNABLE TO = not able to."}, {"id": "b2t090", "orig": "The concert was so popular that all tickets were sold within hours.", "key": "DEMAND", "before": "There was such", "after": "tickets that they all sold within hours.", "ans": "demand for the", "accept": ["demand for the", "high demand for the"], "chunk1": "demand for", "chunk2": "the", "p1": "such + noun phrase = so popular that", "p2": "the (definite article before 'tickets')", "hint": "SO POPULAR → SUCH HIGH DEMAND FOR THE TICKETS. Convert adjective to noun phrase.", "h": "SO POPULAR → SUCH HIGH DEMAND FOR THE TICKETS. Convert adjective to noun phrase."}, {"id": "b2t091", "orig": "It's possible that he missed the train.", "key": "MIGHT", "before": "He", "after": "the train.", "ans": "might have missed", "accept": ["might have missed", "may have missed"], "chunk1": "might have", "chunk2": "missed", "p1": "might/may have + past participle = possibility about the past", "p2": "missed (past participle)", "hint": "IT'S POSSIBLE THAT HE MISSED → HE MIGHT HAVE MISSED. Modal for past possibility.", "h": "IT'S POSSIBLE THAT HE MISSED → HE MIGHT HAVE MISSED. Modal for past possibility."}, {"id": "b2t092", "orig": "Her success is the result of years of hard work.", "key": "SUCCEEDED", "before": "She has", "after": "years of hard work.", "ans": "succeeded because of", "accept": ["succeeded because of", "succeeded thanks to", "succeeded as a result of"], "chunk1": "succeeded", "chunk2": "because of", "p1": "have succeeded because of = achieved success as a result of", "p2": "because of / thanks to / as a result of (causal preposition)", "hint": "HER SUCCESS IS THE RESULT OF → HAS SUCCEEDED BECAUSE OF. Nominalisation reversed.", "h": "HER SUCCESS IS THE RESULT OF → HAS SUCCEEDED BECAUSE OF. Nominalisation reversed."}, {"id": "b2t093", "orig": "She didn't want to seem rude, so she didn't mention the problem.", "key": "AVOID", "before": "She didn't mention the problem", "after": "rude.", "ans": "to avoid seeming", "accept": ["to avoid seeming", "so as to avoid seeming", "in order to avoid seeming"], "chunk1": "avoid", "chunk2": "seeming", "p1": "to avoid + gerund = in order not to do", "p2": "seeming (gerund after 'avoid')", "hint": "DIDN'T WANT TO SEEM RUDE → TO AVOID SEEMING RUDE. AVOID + gerund for negative purpose.", "h": "DIDN'T WANT TO SEEM RUDE → TO AVOID SEEMING RUDE. AVOID + gerund for negative purpose."}, {"id": "b2t094", "orig": "I'd recommend that you visit the old town while you're here.", "key": "WORTH", "before": "The old town is", "after": "while you're here.", "ans": "worth visiting", "accept": ["worth visiting"], "chunk1": "worth", "chunk2": "visiting", "p1": "worth + gerund = recommended / worth the effort", "p2": "visiting (gerund — WORTH is always followed by a gerund)", "hint": "I'D RECOMMEND VISITING → WORTH VISITING. WORTH is always followed by a gerund, not 'to visit'.", "h": "I'D RECOMMEND VISITING → WORTH VISITING. WORTH is always followed by a gerund, not 'to visit'."}, {"id": "b2t095", "orig": "Nobody helped him write the report.", "key": "OWN", "before": "He wrote the report", "after": ".", "ans": "on his own", "accept": ["on his own", "by himself"], "chunk1": "on his own", "chunk2": "own", "p1": "on one's own = without help / alone", "p2": "his own (possessive — 'on his own')", "hint": "NOBODY HELPED → WROTE IT ON HIS OWN. Fixed phrase for doing something alone or without help.", "h": "NOBODY HELPED → WROTE IT ON HIS OWN. Fixed phrase for doing something alone or without help."}, {"id": "b2t096", "orig": "His parents made him apologise for what he had done.", "key": "FORCED", "before": "He was", "after": "for what he had done.", "ans": "forced to apologise", "accept": ["forced to apologise"], "chunk1": "forced to", "chunk2": "apologise", "p1": "be forced to = be made to — passive of 'make'", "p2": "apologise (infinitive with TO)", "hint": "MADE HIM APOLOGISE → FORCED TO APOLOGISE. Passive of causative — TO appears in the passive.", "h": "MADE HIM APOLOGISE → FORCED TO APOLOGISE. Passive of causative — TO appears in the passive."}, {"id": "b2t097", "orig": "They had such fun at the party that they didn't want to leave.", "key": "SO", "before": "They enjoyed the party", "after": "they didn't want to leave.", "ans": "so much that", "accept": ["so much that"], "chunk1": "so much", "chunk2": "that", "p1": "enjoyed so much that = had such fun that", "p2": "that (result conjunction)", "hint": "SUCH FUN THAT → ENJOYED SO MUCH THAT. Convert 'such fun' to 'so much'.", "h": "SUCH FUN THAT → ENJOYED SO MUCH THAT. Convert 'such fun' to 'so much'."}, {"id": "b2t098", "orig": "My sister is much better at cooking than me.", "key": "NEARLY", "before": "I am not", "after": "at cooking as my sister.", "ans": "nearly as good", "accept": ["nearly as good"], "chunk1": "nearly as", "chunk2": "good", "p1": "not nearly as + adjective + as = much worse than", "p2": "good (positive adjective in the comparison)", "hint": "MUCH BETTER THAN ME → NOT NEARLY AS GOOD AS. NOT NEARLY AS + adjective shows a large gap.", "h": "MUCH BETTER THAN ME → NOT NEARLY AS GOOD AS. NOT NEARLY AS + adjective shows a large gap."}, {"id": "b2t099", "orig": "She is probably still at work — she's been very busy lately.", "key": "LIKELY", "before": "She is", "after": "at work — she's been very busy lately.", "ans": "likely to still be", "accept": ["likely to still be", "likely to be still"], "chunk1": "likely to", "chunk2": "be", "p1": "is likely to + infinitive = is probably", "p2": "still be (be + adverb — she is probably still there)", "hint": "IS PROBABLY STILL AT WORK → IS LIKELY TO STILL BE. IS LIKELY TO = it is probable that she is.", "h": "IS PROBABLY STILL AT WORK → IS LIKELY TO STILL BE. IS LIKELY TO = it is probable that she is."}, {"id": "b2t100", "orig": "He was so angry that he left the meeting early.", "key": "TEMPER", "before": "He", "after": "and left the meeting early.", "ans": "lost his temper", "accept": ["lost his temper"], "chunk1": "lost his", "chunk2": "temper", "p1": "lose one's temper = become very angry — fixed idiom", "p2": "temper (noun — the thing that is lost)", "hint": "WAS SO ANGRY → LOST HIS TEMPER. Fixed idiom for becoming angry.", "h": "WAS SO ANGRY → LOST HIS TEMPER. Fixed idiom for becoming angry."}];
const P5 = [{"id": "b2pv001", "sent": "She was asking after you when I saw her — she wanted to know how you were getting on.", "pv": "ask after", "opts": ["A: enquiring about your health", "B: searching for you", "C: asking you to come back", "D: criticising you"], "a": "A", "h": "ASK AFTER = enquire about someone's health or wellbeing. Context: she 'wanted to know how you were getting on'."}, {"id": "b2pv002", "sent": "He had threatened to resign, but he backed down when the board offered him a pay rise.", "pv": "back down", "opts": ["A: fell over", "B: withdrew his threat", "C: left the room", "D: refused to negotiate"], "a": "B", "h": "BACK DOWN = stop demanding something or stop saying you will do something. Context: he had threatened but then didn't follow through."}, {"id": "b2pv003", "sent": "She had agreed to give a speech at the wedding but backed out at the last minute.", "pv": "back out", "opts": ["A: arrived late", "B: refused to speak", "C: decided not to do something she had agreed to", "D: left early"], "a": "C", "h": "BACK OUT = decide not to do something you had previously agreed to do."}, {"id": "b2pv004", "sent": "Stress can bring on headaches in people who are already under a lot of pressure.", "pv": "bring on", "opts": ["A: cure", "B: prevent", "C: cause", "D: reduce"], "a": "C", "h": "BRING ON = cause something unpleasant, especially an illness or symptom."}, {"id": "b2pv005", "sent": "The company is planning to bring out a new version of the software next spring.", "pv": "bring out", "opts": ["A: advertise", "B: produce and release", "C: withdraw", "D: improve"], "a": "B", "h": "BRING OUT = produce and start to sell a new product."}, {"id": "b2pv006", "sent": "She was brought up by her grandparents after her parents moved abroad for work.", "pv": "bring up", "opts": ["A: taught", "B: employed", "C: raised as a child", "D: supported financially"], "a": "C", "h": "BRING UP = raise a child until he or she becomes an adult."}, {"id": "b2pv007", "sent": "The situation calls for immediate action — we can't afford to wait any longer.", "pv": "call for", "opts": ["A: prevents", "B: requires", "C: suggests", "D: avoids"], "a": "B", "h": "CALL FOR = require or demand something as necessary."}, {"id": "b2pv008", "sent": "The match was called off because the pitch was waterlogged after three days of heavy rain.", "pv": "call off", "opts": ["A: delayed", "B: cancelled", "C: postponed", "D: shortened"], "a": "B", "h": "CALL OFF = cancel completely. Different from POSTPONE (moved to a later time)."}, {"id": "b2pv009", "sent": "Despite the difficulties, she carried on working and eventually completed the project.", "pv": "carry on", "opts": ["A: refused to work", "B: performed well", "C: continued", "D: complained"], "a": "C", "h": "CARRY ON = continue doing something, especially despite difficulties."}, {"id": "b2pv010", "sent": "The scientists carried out a series of experiments to test their hypothesis.", "pv": "carry out", "opts": ["A: planned", "B: conducted or performed", "C: reported", "D: published"], "a": "B", "h": "CARRY OUT = conduct, perform or complete a task, experiment or plan."}, {"id": "b2pv011", "sent": "Online shopping caught on very quickly once people realised how convenient it was.", "pv": "catch on", "opts": ["A: became popular", "B: became available", "C: became expensive", "D: became necessary"], "a": "A", "h": "CATCH ON = become popular or fashionable."}, {"id": "b2pv012", "sent": "After missing two weeks of school, she had to work hard to catch up with the rest of the class.", "pv": "catch up with", "opts": ["A: meet", "B: impress", "C: reach the same level as", "D: compete with"], "a": "C", "h": "CATCH UP WITH = reach the same level or point as someone who was ahead of you."}, {"id": "b2pv013", "sent": "Passengers are advised to check in at least two hours before their flight departs.", "pv": "check in", "opts": ["A: collect luggage", "B: board the plane", "C: register at the airport", "D: arrive at the gate"], "a": "C", "h": "CHECK IN = register at a hotel or airport before travelling or staying."}, {"id": "b2pv014", "sent": "Guests must check out of their rooms by eleven o'clock on the day of departure.", "pv": "check out", "opts": ["A: pay for extras", "B: leave a hotel after settling the bill", "C: vacate the room temporarily", "D: return the key"], "a": "B", "h": "CHECK OUT = leave a hotel formally after paying the bill."}, {"id": "b2pv015", "sent": "The weather is forecast to clear up by the afternoon, so we should be able to eat outside.", "pv": "clear up", "opts": ["A: get colder", "B: become windy", "C: become brighter and better", "D: start raining again"], "a": "C", "h": "CLEAR UP = (of weather) become brighter and more pleasant after being cloudy or rainy."}, {"id": "b2pv016", "sent": "The local cinema closed down last year after struggling to compete with streaming services.", "pv": "close down", "opts": ["A: renovated", "B: stopped operating permanently", "C: reduced its hours", "D: changed ownership"], "a": "B", "h": "CLOSE DOWN = stop operating permanently (of a business or organisation)."}, {"id": "b2pv017", "sent": "I came across some fascinating old letters while clearing out the attic last weekend.", "pv": "come across", "opts": ["A: received", "B: found by chance", "C: looked for", "D: bought"], "a": "B", "h": "COME ACROSS = find or meet something by chance, without looking for it."}, {"id": "b2pv018", "sent": "Jobs like that are very hard to come by in this part of the country.", "pv": "come by", "opts": ["A: apply for", "B: understand", "C: obtain, especially with difficulty", "D: lose"], "a": "C", "h": "COME BY = obtain something, especially when it is hard to get."}, {"id": "b2pv019", "sent": "He came down with flu the day before the exam and had to postpone it.", "pv": "come down with", "opts": ["A: recovered from", "B: started to suffer from a minor illness", "C: was diagnosed with", "D: was treated for"], "a": "B", "h": "COME DOWN WITH = start to suffer from a mild illness such as a cold or flu."}, {"id": "b2pv020", "sent": "The plan to merge the two departments didn't come off in the end.", "pv": "come off", "opts": ["A: was cancelled", "B: succeeded", "C: failed to happen as planned", "D: was delayed"], "a": "C", "h": "COME OFF = succeed or happen as planned. Here, the negative: it didn't work out."}, {"id": "b2pv021", "sent": "Her piano playing is really coming on — she's made huge progress this term.", "pv": "come on", "opts": ["A: starting", "B: developing or making progress", "C: beginning to be broadcast", "D: becoming famous"], "a": "B", "h": "COME ON = develop or make progress."}, {"id": "b2pv022", "sent": "His new album is coming out next month and the advance reviews are very positive.", "pv": "come out", "opts": ["A: being recorded", "B: being promoted", "C: being released or published", "D: being sold"], "a": "C", "h": "COME OUT = be published or released (for a book, film, album)."}, {"id": "b2pv023", "sent": "After several months, she finally came round to the idea of moving to a smaller house.", "pv": "come round", "opts": ["A: visited", "B: regained consciousness", "C: changed her mind", "D: agreed reluctantly"], "a": "C", "h": "COME ROUND = gradually change your opinion and begin to agree with someone."}, {"id": "b2pv024", "sent": "She came up with an ingenious solution that nobody else had thought of.", "pv": "come up with", "opts": ["A: found by chance", "B: produced through thinking", "C: borrowed from someone", "D: was given"], "a": "B", "h": "COME UP WITH = produce or find an idea, plan or solution through thinking or effort."}, {"id": "b2pv025", "sent": "You can always count on Maria — she never lets you down when you need help.", "pv": "count on", "opts": ["A: expect too much from", "B: rely on", "C: thank", "D: ask for help from"], "a": "B", "h": "COUNT ON = rely on or trust someone to do something for you."}, {"id": "b2pv026", "sent": "She crossed out the wrong answer and wrote the correct one above it.", "pv": "cross out", "opts": ["A: copied", "B: checked", "C: drew a line through", "D: erased"], "a": "C", "h": "CROSS OUT = draw a line through something written to show it is wrong or no longer needed."}, {"id": "b2pv027", "sent": "The company had to cut back on spending after a difficult year.", "pv": "cut back on", "opts": ["A: stop completely", "B: reduce the amount of", "C: reorganise", "D: plan more carefully"], "a": "B", "h": "CUT BACK ON = reduce the amount or frequency of something, especially money spent."}, {"id": "b2pv028", "sent": "The village was completely cut off by the floods for nearly a week.", "pv": "cut off", "opts": ["A: destroyed", "B: isolated from the rest", "C: evacuated", "D: damaged"], "a": "B", "h": "CUT OFF = make a place difficult or impossible to reach or communicate with."}, {"id": "b2pv029", "sent": "It suddenly dawned on me that I had left my passport at home.", "pv": "dawn on", "opts": ["A: reminded", "B: upset", "C: occurred to or was realised by", "D: was forgotten by"], "a": "C", "h": "DAWN ON = occur to someone or be suddenly understood by them."}, {"id": "b2pv030", "sent": "Many people think the government should do away with the current system and start again.", "pv": "do away with", "opts": ["A: criticise", "B: reform", "C: get rid of", "D: introduce"], "a": "C", "h": "DO AWAY WITH = abolish or get rid of something completely."}, {"id": "b2pv031", "sent": "During the power cut, we had to do without heating for three days.", "pv": "do without", "opts": ["A: manage without having", "B: refuse to use", "C: replace", "D: request"], "a": "A", "h": "DO WITHOUT = manage despite not having something you normally rely on."}, {"id": "b2pv032", "sent": "Feel free to drop in whenever you're passing — you don't need to call first.", "pv": "drop in", "opts": ["A: stay for a long time", "B: visit unexpectedly or informally", "C: phone", "D: write a letter"], "a": "B", "h": "DROP IN = visit someone unexpectedly or informally, usually briefly."}, {"id": "b2pv033", "sent": "She asked the taxi driver to drop her off outside the station.", "pv": "drop off", "opts": ["A: call for", "B: let out of a vehicle", "C: wait for", "D: drive away from"], "a": "B", "h": "DROP OFF = let someone get out of a vehicle at a particular place."}, {"id": "b2pv034", "sent": "He completely fell for the story about the lottery win and handed over all his savings.", "pv": "fall for", "opts": ["A: was upset by", "B: was tricked by", "C: laughed at", "D: reported"], "a": "B", "h": "FALL FOR = be tricked by something or believe something that is not true."}, {"id": "b2pv035", "sent": "The two friends fell out over something quite minor and haven't spoken since.", "pv": "fall out", "opts": ["A: lost touch", "B: stopped being friends after an argument", "C: moved away", "D: became rivals"], "a": "B", "h": "FALL OUT = quarrel and stop being friendly with someone."}, {"id": "b2pv036", "sent": "She didn't really feel up to going to the party after such an exhausting week.", "pv": "feel up to", "opts": ["A: want", "B: feel well or strong enough to do", "C: be excited about", "D: decide against"], "a": "B", "h": "FEEL UP TO = feel physically or mentally able to do something."}, {"id": "b2pv037", "sent": "He managed to get away with submitting the report late because the manager forgot about the deadline.", "pv": "get away with", "opts": ["A: was punished for", "B: avoided punishment for", "C: was praised for", "D: was forgiven for"], "a": "B", "h": "GET AWAY WITH = avoid punishment or negative consequences for something wrong."}, {"id": "b2pv038", "sent": "When did you get back from your holiday? You look very relaxed.", "pv": "get back", "opts": ["A: recover", "B: return from a place", "C: contact", "D: leave"], "a": "B", "h": "GET BACK = return from a place."}, {"id": "b2pv039", "sent": "The children kept asking and eventually their parents gave in and bought them the game.", "pv": "give i t used as a weather modifier."}, {"id": "b2col019", "prompt": "Which word does NOT collocate with BROAD?", "key": "BROAD", "opts": ["A: range", "B: smile", "C: knowledge", "D: a traffic"], "a": "D", "h": "A broad range, a broad smile and broad knowledge are all natural — but TRAFFIC is uncountable. You have 'heavy traffic' or 'light traffic', never 'a traffic'."}, {"id": "b2col020", "prompt": "Which word does NOT collocate with REACH?", "key": "REACH", "opts": ["A: an agreement", "B: a conclusion", "C: a decision", "D: an advice"], "a": "D", "h": "You reach an agreement, a conclusion and a decision — but ADVICE is uncountable. You 'take advice' or 'receive advice', never 'reach an advice'."}, {"id": "b2col021", "prompt": "Which word does NOT collocate with SPEND?", "key": "SPEND", "opts": ["A: time", "B: money", "C: a homework", "D: energy"], "a": "C", "h": "You spend time, money and energy — but HOMEWORK is uncountable. You 'do your homework', not 'spend a homework'."}, {"id": "b2col022", "prompt": "Which word does NOT collocate with TAKE?", "key": "TAKE", "opts": ["A: place", "B: an experience", "C: care", "D: part"], "a": "B", "h": "You take place, take part and take care — but EXPERIENCE is uncountable in the abstract sense. You 'have experience' or 'gain experience', never 'take an experience'."}, {"id": "b2col023", "prompt": "Which word does NOT collocate with MAKE?", "key": "MAKE", "opts": ["A: progress", "B: an effort", "C: an advice", "D: noise"], "a": "C", "h": "You make progress, an effort and noise — but ADVICE is uncountable. You 'give advice' or 'take advice', never 'make an advice'."}, {"id": "b2col024", "prompt": "Which word does NOT collocate with HIGH?", "key": "HIGH", "opts": ["A: expectations", "B: speed", "C: temperature", "D: a furniture"], "a": "D", "h": "High expectations, high speed and high temperature are all natural — but FURNITURE is uncountable. You cannot say 'a furniture' — the noun is always uncountable."}, {"id": "b2col025", "prompt": "Which word does NOT collocate with WIDE?", "key": "WIDE", "opts": ["A: a traffic", "B: awake", "C: variety", "D: range"], "a": "A", "h": "Wide range, wide awake and wide variety are all natural — but TRAFFIC is uncountable. You never say 'a traffic' in standard English."}, {"id": "b2col026", "prompt": "Which word does NOT collocate with FALL?", "key": "FALL", "opts": ["A: asleep", "B: in love", "C: apart", "D: a knowledge"], "a": "D", "h": "You fall asleep, fall in love and fall apart — but KNOWLEDGE is uncountable. You cannot 'fall a knowledge'. You 'gain knowledge' or 'acquire knowledge'."}, {"id": "b2col027", "prompt": "Which word does NOT collocate with PUT?", "key": "PUT", "opts": ["A: pressure on", "B: effort into", "C: emphasis on", "D: a work in"], "a": "D", "h": "You put pressure on, put effort into and put emphasis on — but 'put a work in' is not standard. You 'put work into something' (no article) or 'put in some work'."}, {"id": "b2col028", "prompt": "Which word does NOT collocate with CLOSE?", "key": "CLOSE", "opts": ["A: attention", "B: a weather", "C: relationship", "D: friend"], "a": "B", "h": "Close attention, a close friend and a close relationship are all natural — but 'a weather' is never used — WEATHER is uncountable and you cannot say 'a weather'."}, {"id": "b2col029", "prompt": "Which word does NOT collocate with GAIN?", "key": "GAIN", "opts": ["A: experience", "B: weight", "C: a travel", "D: confidence"], "a": "C", "h": "You gain experience, gain confidence and gain weight — but TRAVEL is uncountable in this sense. You 'go travelling' or 'do some travelling', never 'gain a travel'."}, {"id": "b2col030", "prompt": "Which word does NOT collocate with SAVE?", "key": "SAVE", "opts": ["A: money", "B: time", "C: energy", "D: an information"], "a": "D", "h": "You save money, save time and save energy — but INFORMATION is uncountable. You 'save information' (no article), never 'save an information'."}, {"id": "b2col031", "prompt": "Which word doe gements"], "a": "B", "h": "You make arrangements, make a complaint and make a decision — but TRAVEL is uncountable. You 'make a trip' or 'travel' as a verb, never 'make a travel'."}, {"id": "b2col055", "prompt": "Which word does NOT collocate with GIVE?", "key": "GIVE", "opts": ["A: permission", "B: a travel", "C: someone the opportunity", "D: a presentation"], "a": "B", "h": "You give permission, give a presentation and give someone the opportunity — but TRAVEL doesn't collocate with GIVE. You never 'give a travel'."}, {"id": "b2col056", "prompt": "Which word does NOT collocate with WIN?", "key": "WIN", "opts": ["A: a prize", "B: a competition", "C: a match", "D: a travel"], "a": "D", "h": "You win a prize, win a competition and win a match — but TRAVEL doesn't collocate with WIN."}, {"id": "b2col057", "prompt": "Which word does NOT collocate with PASS?", "key": "PASS", "opts": ["A: an exam", "B: a travel", "C: time", "D: a law"], "a": "B", "h": "You pass an exam, pass a law and pass time — but TRAVEL doesn't collocate with PASS."}, {"id": "b2col058", "prompt": "Which word does NOT collocate with LOSE?", "key": "LOSE", "opts": ["A: a match", "B: a travel", "C: weight", "D: your temper"], "a": "B", "h": "You lose a match, lose your temper and lose weight — but TRAVEL doesn't collocate with LOSE."}, {"id": "b2col059", "prompt": "Which word does NOT collocate with BREAK?", "key": "BREAK", "opts": ["A: a record", "B: a travel", "C: news", "D: the rules"], "a": "B", "h": "You break a record, break the rules and break news — but TRAVEL doesn't collocate with BREAK."}, {"id": "b2col060", "prompt": "Which word does NOT collocate with SET?", "key": "SET", "opts": ["A: a travel", "B: a record", "C: a target", "D: a good example"], "a": "A", "h": "You set a good example, set a record and set a target — but TRAVEL doesn't collocate with SET."}];
const VOC = [{"id": "b2voc001", "topic": "Travel", "def": "An expedition by sea, usually over a long distance.", "opts": ["A: trip", "B: journey", "C: voyage", "D: excursion"], "a": "C", "h": "TRIP = a short return outing. EXCURSION = a short pleasure outing from a base. Which of the remaining options is the specific word for an expedition made by sea?"}, {"id": "b2voc002", "topic": "Travel", "def": "A short journey made for pleasure, often as part of a holiday.", "opts": ["A: voyage", "B: excursion", "C: travel", "D: route"], "a": "B", "h": "VOYAGE = a long sea journey. TRAVEL = the general activity of going places. Which of the remaining options describes a short, organised pleasure outing — often from a holiday destination to a nearby attraction?"}, {"id": "b2voc003", "topic": "Travel", "def": "The money you pay to travel on a bus, train or other public transport.", "opts": ["A: fee", "B: cost", "C: fare", "D: charge"], "a": "C", "h": "FEE = money paid for a service or permission. COST = general term for the amount something requires. Which of the remaining options is the specific term for the money paid for public transport?"}, {"id": "b2voc004", "topic": "Travel", "def": "The official boundary that divides two countries or regions.", "opts": ["A: edge", "B: line", "C: border", "D: limit"], "a": "C", "h": "EDGE = the furthest part of something. LINE = a thin mark on a surface or map. Which of the remaining options is the specific term for the official divide between two countries?"}, {"id": "b2voc005", "topic": "Sport", "def": "Someone who watches a public sporting event or activity.", "opts": ["A: viewer", "B: audience", "C: spectator", "D: observer"], "a": "C", "h": "VIEWER = someone who watches TV. AUDIENCE = people watching a theatre or live performance. Which of the remaining options specifically refers to people watching a live sporting event?"}, {"id": "b2voc006", "topic": "Sport", "def": "The last game or race in a competition that decides the overall wi function shuffle(arr){
  var a=[...arr];
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=a[i];a[i]=a[j];a[j]=tmp;
  }
  return a;
}
const norm    = s => s.toLowerCase().replace(/\s+/g,' ').trim().replace(/['\u2019]/g,"'");
// Split answer string on / to get accepted variants (for P2/P3 with multiple answers)
const getAccepted = (q) => {
  if (q.accept) return q.accept.map(norm); // P4 has explicit accept array
  if (q.a) return q.a.split('/').map(s => norm(s.trim())); // P2/P3 slash-separated
  return [];
};
const lsGet = (k,d) => { try{ var v=JSON.parse(localStorage.getItem(k)); return v!==null&&v!==undefined?v:d; }catch(e){return d;} };
const lsSet = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)) }catch{} };
// Get hint text - field is 'h' in P1/P2/P3, 'hint' in P4
const getHint = q => q.h || q.hint || '';


let G = { partId:null, qs:[], idx:0, score:0, done:false, val:'', hint:false, bests:lsGet('b2bests',{}), results:[], streak:0, maxStreak:0 };
var BANK = lsGet('b2bank',{});

function show(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function updateBankBtn(){
  var wrongCount=Object.values(BANK).filter(function(e){return e.wrong;}).length;
  var hintCount=Object.values(BANK).filter(function(e){return !e.wrong&&e.hint;}).length;
  var total=wrongCount+hintCount;
  var btn=document.getElementById('bank-btn');
  var label=document.getElementById('bank-label');
  if(!btn) return;
  if(total>0){
    btn.style.display='flex';
    var parts=[];
    if(wrongCount>0) parts.push(wrongCount+' incorrect');
    if(hintCount>0) parts.push(hintCount+' hint-used');
    label.textContent=parts.join(' · ')+' saved for review';
  } else {
    btn.style.display='none';
  }
}

function startBankReview(filterFn){
  // Look up actual question objects from all pools
  var ALL={};
  [P1,P2,P3,P4,P5,COL,VOC].forEach(function(pool){
    pool.forEach(function(q){ ALL[q.id]=q; });
  });
  var ids=Object.keys(BANK).filter(filterFn||function(){return true;});
  var qs=ids.map(function(id){return ALL[id];}).filter(Boolean);
  if(!qs.length){ alert('No questions found.'); return; }
  // Determine partId from first question (mixed sessions use first part)
  var firstEntry=BANK[ids[0]];
  G.partId=firstEntry?firstEntry.partId:1;
  // For mixed parts, we need to handle rendering — set partId per question
  G.qs=qs.map(function(q){
    var entry=BANK[q.id];
    return Object.assign({},q,{_partId:entry?entry.partId:G.partId});
  });
  G.idx=0; G.score=0; G.done=false; G.val=''; G.hint=false; G.hintUsed=false; G.results=[]; G.streak=0; G.maxStreak=0;
  G.bankMode=true;
  renderQ(); show('s-question');
}

function startTopicSession(topic){
  var filtered=VOC.filter(function(q){return q.topic===topic;});
  G.partId=7; G.qs=shuffle(filtered);
  G.idx=0; G.score=0; G.done=false; G.val=''; G.hint=false; G.hintUsed=false; G.results=[]; G.streak=0; G.maxStreak=0; G.bankMode=false;
  renderQ(); show('s-question');
}

function startSession(partId,n){
  G.partId=partId;
  var pool=POOLS[partId];
  var SEEN=lsGet('b2seen',{});
  // Weight each question: unseen=4, wrong/hint-used=3, seen-correct-once=2, seen-correct-multiple=1
  var weighted=[];
  pool.forEach(function(q){
    var bankEntry=BANK[q.id];
    var seenCount=SEEN[q.id]||0;
    var w;
    if(bankEntry&&bankEntry.wrong) w=3;        // previously wrong — keep showing
    else if(bankEntry&&bankEntry.hint) w=2;    // correct but needed hint
    else if(seenCount===0) w=4;                // never seen — prioritise
    else if(seenCount===1) w=2;               // seen once correctly
    else w=1;                                  // seen correctly multiple times — rare
    for(var i=0;i<w;i++) weighted.push(q);
  });
  // Shuffle weighted pool, deduplicate preserving order, take n
  var seen={}; var deduped=[];
  shuffle(weighted).forEach(function(q){
    if(!seen[q.id]){seen[q.id]=true;deduped.push(q);}
  });
  G.qs=deduped.slice(0,n);
  G.idx=0; G.score=0; G.done=false; G.val=''; G.hint=false; G.hintUsed=false; G.results=[]; G.streak=0; G.maxStreak=0; G.bankMode=false;
  renderQ(); show('s-question');
}

function renderQ(){
  const q=G.qs[G.idx], effectivePartId=G.bankMode&&q._partId?q._partId:G.partId, p=PARTS.find(x=>x.id===effectivePartId)||PARTS[0], c=`var(${p.c})`;
  const total=G.qs.length, sMax=G.partId===4?G.idx*2:G.idx;
  document.getElementById('pfill').style.cssText=`width:${(G.idx/total)*100}%;background:${c}`;
  document.getElementById('qctr').style.color=c;
  document.getElementById('qctr').textContent=`${G.idx+1}/${total}`;
  document.getElementById('qscr').textContent=`${G.score}/${sMax}`;
  let html='<div class="ptag" style="color:'+c+'">'+(p.label?p.label+' &middot; ':'')+p.name+'</div>';
  var rPart=G.bankMode&&q._partId?q._partId:G.partId;
  if(rPart===1) html+=htmlP1(q);
  else if(rPart===2) html+=htmlP2(q);
  else if(rPart===3) html+=htmlP3(q);
  else if(rPart===4) html+=htmlP4(q);
  else if(rPart===5) html+=htmlP5(q);
  else if(rPart===6) html+=htmlCOL(q);
  else html+=htmlVOC(q);
  html+=htmlHint(q);
  document.getElementById('qbody').innerHTML=html;
  document.getElementById('qbody').scrollTop=0;
  renderBot();
  if(G.partId!==1) setTimeout(()=>{const i=document.getElementById('tin');if(i)i.focus();},80);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function htmlP1(q){
  const pts=q.sent.split('_______');
  return `<div class="sent">${esc(pts[0])}<span class="gap" id="gap">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>${esc(pts[1]||'')}</div>
  <div class="opts">${shuffle(q.opts).map(function(o,i){var lbl=String.fromCharCode(65+i);return `<button class="opt" data-l="${o[0]}" onclick="pickP1('${o[0]}')">${lbl}: ${esc(o.slice(3))}</button>`;}).join('')}</div>`;
}

function htmlP2(q){

  <input class="tin" id="tin" type="text" autocomplete="off" spellcheck="false" placeholder="Type the missing word\u2026" oninput="G.val=this.value;updBot()" onkeydown="if(event.key==='Enter'&&G.val.trim())chk()">`;
}

function htmlP3(q){
  const pts=q.sent.split('['+q.root+']');

}

function htmlP4(q){
  return `<div class="origbox"><div class="origlbl">REWRITE THIS SENTENCE</div><div class="origtxt">${esc(q.orig)}</div></div>
  <div class="kbadge"><span class="klabel">KEY WORD</span><span class="kword">${esc(q.key)}</span></div>
  <div class="trow">${esc(q.before)} <span class="tgap" id="tgap">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> ${esc(q.after)}</div>
  <input class="tin" id="tin" type="text" autocomplete="off" spellcheck="false" placeholder="2\u20135 words including the key word" oninput="G.val=this.value;updTgap()" onkeydown="if(event.key==='Enter'&&G.val.trim())chk()">`;
}

function htmlP5(q){
  // Highlight the phrasal verb within the sentence (handles inflected forms)
  var sentEsc = esc(q.sent);
  var pvParts = q.pv.toLowerCase().split(' ');
  var verb = pvParts[0]; // e.g. 'add', 'blow', 'bring'
  var particles = pvParts.slice(1).join(' '); // e.g. 'up to', 'off'
  // Try exact match first
  var highlighted = sentEsc;
  if(sentEsc.toLowerCase().indexOf(q.pv.toLowerCase()) >= 0){
    highlighted = sentEsc.replace(new RegExp(esc(q.pv).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'),
      '<span style="color:var(--p5);font-weight:500;border-bottom:2px solid var(--p5);padding-bottom:1px">$&</span>');
  } else {
    // Find the particle(s) in the sentence and highlight the surrounding verb+particle
    var particlePat = new RegExp('(\\w+(?:n\'t|s|ed|ing|d)?)\\s+('+esc(particles).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?:\\s+\\w+)?)','i');
    highlighted = sentEsc.replace(particlePat,
      '<span style="color:var(--p5);font-weight:500;border-bottom:2px solid var(--p5);padding-bottom:1px">$1 $2</span>');
  }
  return '<div class="sent">'+highlighted+'</div>'
    +'<div class="opts" id="p5opts">'+shuffle(q.opts).map(function(o,i){var lbl=String.fromCharCode(65+i);
      return '<button class="opt" data-l="'+o[0]+'" onclick="pickP5(this.dataset.l)">'+lbl+': '+esc(o.slice(3))+'</button>';
    }).join('')+'</div>';
}

function pickP5(letter){
  if(G.done) return;
  var q=G.qs[G.idx];
  var correct=letter===q.a;
  G.score+=correct?1:0;
  G.done=true;
  G.results.push({idx:G.idx,correct:correct,skipped:false,hint:G.hintUsed});
  if(correct){G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);}else{G.streak=0;}
  document.querySelectorAll('.opt').forEach(function(btn){
    btn.disabled=true;
    if(btn.dataset.l===q.a) btn.classList.add('ok');
    else if(btn.dataset.l===letter&&!correct) btn.classList.add('bad');
  });
  if(correct){
    renderBot();
  } else {
    G.hint=true; G.hintUsed=true;
    var hb=document.getElementById('hbox'),hbtn=document.getElementById('hbtn');
    if(hb) hb.style.display='block';
    if(hbtn) hbtn.textContent='Hide hint';
    renderBot();
  }
}

function htmlCOL(q){
  // Collocations odd-one-out: show key word as badge + prompt question
  var html='<div style="display:inline-flex;align-items:center;gap:7px;margin-bottom:16px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);border-radius:7px;padding:5px 12px">'
    +'<span style="font-size:10px;color:var(--p6);letter-spacing:.1em;font-weight:500">KEY WORD</span>'
    +'<span style="font-family:monospace;font-size:.95rem;color:#c4b5fd;font-weight:500">'+esc(q.key)+'</span>'
    +'</div>';
  html+='<div style="font-size:1.07rem;line-height:1.7;margin-bottom:22px;color:var(--tx)">'+esc(q.prompt)+'</div>';
  html+='<div class="opts">'+shuffle(q.opts).map(function(o,i){var lbl=String.fromCharCode(65+i);
    return '<button class="opt" data-l="'+o[0]+'" onclick="pickMC(this.dataset.l)">'+lbl+': '+esc(o.slice(3))+'</button>';
  }).join('')+'</div>';

}

function htmlVOC(q){

  var c='var(--p7)';
  var html='<div style="display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.25);border-radius:7px;padding:4px 11px">'
    +'<span style="font-size:10px;color:var(--p7);letter-spacing:.1em;font-weight:500">'+esc(q.topic).toUpperCase()+'</span>'
    +'</div>';
  html+='<div style="font-size:1.07rem;line-height:1.7;margin-bottom:24px;color:var(--tx)">'+esc(q.def)+'</div>';
  html+='<div class="opts">'+shuffle(q.opts).map(function(o,i){var lbl=String.fromCharCode(65+i);
    return '<button class="opt" data-l="'+o[0]+'" onclick="pickMC(this.dataset.l)">'+lbl+': '+esc(o.slice(3))+'</button>';
  }).join('')+'</div>';
  return html;
}

function pickMC(letter){
  // Generic MC handler for COL and VOC (and could be used by P1/P5 too)
  if(G.done) return;
  var q=G.qs[G.idx];
  var correct=letter===q.a;
  G.score+=correct?1:0;
  G.done=true;
  G.results.push({idx:G.idx,correct:correct,skipped:false,hint:G.hintUsed});
  if(correct){G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);}else{G.streak=0;}
  document.querySelectorAll('.opt').forEach(function(btn){
    btn.disabled=true;
    if(btn.dataset.l===q.a) btn.classList.add('ok');
    else if(btn.dataset.l===letter&&!correct) btn.classList.add('bad');
  });
  if(correct){
    renderBot();
  } else {
    G.hint=true; G.hintUsed=true;
    var hb=document.getElementById('hbox'),hbtn=document.getElementById('hbtn');
    if(hb) hb.style.display='block';
    if(hbtn) hbtn.textContent='Hide hint';
    renderBot();
  }
}

  const hint=getHint(q);

  return `<div class="harea"><button class="hbtn" id="hbtn" onclick="togHint()">${G.hint?'Hide hint':'Show hint'}</button>
  <div class="hbox" id="hbox" style="${G.hint?'':'display:none'}"><div class="htag">HINT</div><div class="htxt">${esc(hint)}</div></div></div>`;
}

function togHint(){
  G.hint=!G.hint;
  if(G.hint) G.hintUsed=true;
  const b=document.getElementById('hbox'),btn=document.getElementById('hbtn');
  if(b) b.style.display=G.hint?'block':'none';

function updTgap(){
  const g=document.getElementById('tgap');
  if(g) g.textContent=G.val||'\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0';
  updBot();
}

function renderBot(){
  const p=PARTS.find(x=>x.id===G.partId),c=`var(${p.c})`;

    el.innerHTML=`<button class="nxtbtn" style="background:${c}" onclick="nxt()">${isLast?'See Results &rarr;':'Next &rarr;'}</button>`;
  } else if([1,5,6,7].indexOf(G.bankMode&&G.qs[G.idx]&&G.qs[G.idx]._partId?G.qs[G.idx]._partId:G.partId)>=0){
    el.innerHTML='';
  } else {

    <button class="skipbtn" onclick="doSkip()">Skip &rarr;</button>`;
  }
}

function updBot(){
  if(G.done) return;
  const p=PARTS.find(x=>x.id===G.partId),c=`var(${p.c})`;
  const btn=document.getElementById('chkbtn');
  if(!btn) return;

function pickP1(letter){
  if(G.done) return;
  const q=G.qs[G.idx];
  const correct=letter===q.a;
  G.score+=correct?1:0;
  G.done=true;
  G.results.push({idx:G.idx,correct:correct,skipped:false,hint:G.hintUsed});
  if(correct){G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);}else{G.streak=0;}
  document.querySelectorAll('.opt').forEach(btn=>{
    btn.disabled=true;
    if(btn.dataset.l===q.a) btn.classList.add('ok');
    else if(btn.dataset.l===letter&&!correct) btn.classList.add('bad');
  });
  const ansText=q.opts.find(o=>o[0]===q.a);
  const gap=document.getElementById('gap');
  if(gap&&ansText){gap.textContent=ansText.slice(3);gap.style.color='var(--green)';gap.style.borderColor='var(--green)';}
  if(correct){
    renderBot();;
  } else {
    G.hint=true;
    const hb=document.getElementById('hbox'),hbtn=document.getElementById('hbtn');
    if(hb) hb.style.display='block';
    if(hbtn) hbtn.textContent='Hide hint';
    renderBot();
  }
}

function chk(){
  if(G.done||!G.val.trim()) return;
  const q=G.qs[G.idx], gn=norm(G.val);
  let gained=0, status='wrong';

  if(G.partId===4){
    const accepted=q.accept.map(norm);
    const fullyOk=accepted.includes(gn);
    if(fullyOk){gained=2;status='correct';}
    else{
      const h1=gn.includes(norm(q.chunk1)), h2=gn.includes(norm(q.chunk2));
      gained=(h1?1:0)+(h2?1:0);
      status=gained===2?'correct':gained===1?'partial':'wrong';
    }
  } else {
    // P2/P3: split 'a' field on '/' for multiple accepted answers
    const accepted=getAccepted(q);
    const ok=accepted.includes(gn);
    gained=ok?1:0; status=ok?'correct':'wrong';
  }

  G.score+=gained;
  G.done=true;
  G.results.push({idx:G.idx,correct:status==='correct',skipped:false,hint:G.hintUsed});
  if(status==='correct'){G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);}else{G.streak=0;}
  const sc=status==='correct'?'var(--green)':status==='partial'?'var(--amber)':'var(--red)';
  const inp=document.getElementById('tin');
  if(inp){inp.readOnly=true;inp.style.borderColor=sc;inp.style.color=sc;}
  const tg=document.getElementById('tgap');
  if(tg){tg.style.borderColor=sc;tg.style.color=sc;}
  const gap=document.getElementById('gap');
  // Show canonical correct answer in gap
  const canonAns = q.accept ? q.accept[0] : (q.a ? q.a.split('/')[0] : '');
  if(gap){gap.textContent=canonAns;gap.style.color='var(--green)';gap.style.borderColor='var(--green)';}

  let fb='';
  if(G.partId===4){
    if(status==='correct') fb=`<div class="fb ok"><div class="fbm ok">&#10003; +2 marks &mdash; ${esc(q.accept[0])}</div></div>`;
    else if(status==='partial') fb=`<div class="fb mid"><div class="fbm mid">&#126; +1 mark &mdash; one point correct</div><div class="fbs">Full answer: ${esc(q.accept[0])}</div></div>`;
    else fb=`<div class="fb bad"><div class="fbm bad">&#10007; 0 marks</div><div class="fbs">Correct: ${esc(q.accept[0])}</div></div>`;
    fb+=`<div class="mbox"><div class="mlbl">MARKING POINTS</div><div class="mrow">&#9312; ${esc(q.p1)}<br>&#9313; ${esc(q.p2)}</div></div>`;
  } else {
    if(status==='correct'){
      fb=`<div class="fb ok"><div class="fbm ok">&#10003; Correct</div></div>`;
    } else {
      const accepted=getAccepted(q);
      const displayAns=accepted.join(' / ');
      fb=`<div class="fb bad"><div class="fbm bad">&#10007; &nbsp;Correct: <span style="color:var(--green)">${esc(displayAns)}</span></div></div>`;
    }
  }

  const ha=document.querySelector('.harea');
  if(ha) ha.insertAdjacentHTML('beforebegin',fb);
  G.hint=true; G.hintUsed=true;
  const hb=document.getElementById('hbox'),hbtn=document.getElementById('hbtn');
  if(hb) hb.style.display='block';
  if(hbtn) hbtn.textContent='Hide hint';
  renderBot();
}

function nxt(){
  if(G.idx>=G.qs.length-1){endSession();return;}
  G.idx++;G.done=false;G.val='';G.hint=false;G.hintUsed=false;renderQ();
}

function endSession(){
  const answered = G.done ? G.idx+1 : G.idx;
  const sMax = G.partId===4 ? answered*2 : answered;
  const pct = sMax>0 ? Math.round((G.score/sMax)*100) : 0;
  const k='p'+G.partId, prev=G.bests[k]||0;
  if(pct>prev){G.bests[k]=pct;lsSet('b2bests',G.bests);}
  // Update persistent question bank
  G.results.forEach(function(r){
    if(r.skipped) return;
    var q=G.qs[r.idx];
    if(!q) return;
    if(!r.correct){
      // Wrong — add/keep in bank as wrong
      BANK[q.id]={wrong:true,hint:r.hint,partId:G.partId};
    } else if(r.hint){
      // Correct but needed hint — add to bank unless already marked wrong
      if(!BANK[q.id]||!BANK[q.id].wrong){
        BANK[q.id]={wrong:false,hint:true,partId:G.partId};
      }
    } else {
      // Correct without hint — remove from bank entirely
      delete BANK[q.id];
    }
  });
  lsSet('b2bank',BANK);
  // Update seen counts for correctly answered questions
  var SEEN=lsGet('b2seen',{});
  G.results.forEach(function(r){
    if(!r.skipped){
      var q=G.qs[r.idx];
      if(q&&r.correct&&!r.hint){
        SEEN[q.id]=(SEEN[q.id]||0)+1;
      }
    }
  });
  lsSet('b2seen',SEEN);
  updateBankBtn();
  showResults();
}

function showResults(){
  const p=PARTS.find(x=>x.id===G.partId), c=`var(${p.c})`;
  const answered=G.done?G.idx+1:G.idx;
  const sMax=G.partId===4?answered*2:answered;
  const pct=sMax>0?Math.round((G.score/sMax)*100):0;
  const [grd,gc]=pct>=80?['Excellent','var(--green)']:pct>=60?['Good','var(--amber)']:['Keep Practising','var(--red)'];

  document.getElementById('rtag').style.color=c;
  document.getElementById('rtag').textContent=p.label+' \u00b7 '+answered+' question'+(answered!==1?'s':'');

  document.getElementById('rcrd').innerHTML=`<div class="rscore">${G.score}/${sMax}</div>
    <div class="rpct">${pct}%</div>
    <div class="rgrade" style="color:${gc};background:rgba(128,128,128,.1);border:1px solid rgba(128,128,128,.2)">${grd}</div>
    ${G.partId===4?'<div class="rnote">2 marks per question</div>':''}`;

  // Best score
  const best=G.bests['p'+G.partId];
  const isNew=best===pct&&pct>0;
  const rb=document.getElementById('rbest');
  rb.style.color=isNew?c:'var(--dimmer)';
  const hintCount=G.results.filter(r=>r.hint&&!r.skipped).length;
  let bestTxt=best!=null?(isNew?'\uD83C\uDF89 New personal best!':'Personal best: '+best+'%'):'';
  if(hintCount>0) bestTxt+=(bestTxt?' \u00b7 ':'')+hintCount+' hint'+(hintCount!==1?'s':'')+' used';
  if(G.maxStreak>1) bestTxt+=(bestTxt?' \u00b7 ':'')+'\uD83D\uDD25 Best streak: '+G.maxStreak;
  rb.textContent=bestTxt;

  // Breakdown dots
  const bd=document.getElementById('rbreakdown');
  if(G.results.length>0){
    bd.innerHTML=G.results.map((r,i)=>{
      const cls=r.skipped?'skip':r.correct?'ok':'bad';
      const sym=r.skipped?'–':r.correct?'✓':'✗';
      const hintMark=r.hint&&!r.skipped?' style="opacity:.6;font-style:italic"':'';
      const title='Q'+(i+1)+(r.hint?' (hint used)':'');
      return '<div class="rdot '+cls+'" title="'+title+'"'+hintMark+'>'+sym+'</div>';
    }).join('');
  } else { bd.innerHTML=''; }

  // Wrong answers review button
  const wrongQs=G.results.filter(r=>!r.correct);
  const hintQs=G.results.filter(r=>r.correct&&r.hint&&!r.skipped);
  const reviewBtn=document.getElementById('rreview');
  const reviewHintBtn=document.getElementById('rreviewhint');
  if(wrongQs.length>0){
    reviewBtn.style.display='block';
    reviewBtn.style.background=c;
    reviewBtn.textContent='Review '+wrongQs.length+' Mistake'+(wrongQs.length!==1?'s':'');
    reviewBtn.onclick=()=>startReview(wrongQs);
  } else {
    reviewBtn.style.display='none';
  }
  if(hintQs.length>0){
    reviewHintBtn.style.display='block';
    reviewHintBtn.style.background='rgba(108,142,191,.2)';
    reviewHintBtn.style.border='1.5px solid var(--blue)';
    reviewHintBtn.style.color='var(--blue)';
    reviewHintBtn.textContent='Revisit '+hintQs.length+' Hint Used';
    reviewHintBtn.onclick=()=>startReview(hintQs);
  } else {
    reviewHintBtn.style.display='none';
  }

  const btn=document.getElementById('ragain');
  btn.style.background='transparent';
  btn.style.border='1.5px solid var(--bd)';
  btn.style.color='var(--tx)';
  btn.style.fontWeight='400';
  btn.style.fontSize='.94rem';
  btn.onclick=()=>startSession(G.partId,G.qs.length);

  show('s-results');
}

function startReview(wrongResults){
  // Re-run only the wrong questions from the last session
  const wrongQs=wrongResults.map(r=>G.qs[r.idx]);
  G.qs=wrongQs;
  G.idx=0; G.score=0; G.done=false; G.val=''; G.hint=false; G.hintUsed=false; G.results=[]; G.streak=0; G.maxStreak=0; G.bankMode=false;
  renderQ(); show('s-question');
}


function confirmStop(){
  if(G.idx===0 && !G.done){
    // Haven't answered anything yet — just go back quietly
    show('s-setup'); return;
  }
  // Show inline confirm inside the top bar rather than a browser dialog
  const bar=document.getElementById('qbot');
  if(document.getElementById('stop-confirm')) return; // already showing
  const p=PARTS.find(x=>x.id===G.partId), c=`var(${p.c})`;
  bar.insertAdjacentHTML('afterbegin',
    `<div id="stop-confirm" style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.25);border-radius:10px;padding:12px 14px">
      <span style="font-size:.85rem;color:var(--dim)">Stop and see results so far?</span>
      <div style="display:flex;gap:8px">
        <button onclick="document.getElementById('stop-confirm').remove()" style="background:transparent;border:1px solid var(--bd);color:var(--dim);border-radius:8px;padding:6px 14px;font-size:.82rem;cursor:pointer">Keep going</button>
        <button onclick="endSession()" style="background:var(--red);border:none;color:#0d0f1a;border-radius:8px;padding:6px 14px;font-size:.82rem;font-weight:700;cursor:pointer">Stop</button>
      </div>
    </div>`
  );
}

function doSkip(){
  if(G.done) return;
  const q=G.qs[G.idx];
  G.done=true;
  G.streak=0;
  G.results.push({idx:G.idx,correct:false,skipped:true});
  // Show the correct answer
  const canonAns=q.accept?q.accept[0]:(q.a?q.a.split('/')[0]:'');
  const gap=document.getElementById('gap');
  if(gap){gap.textContent=canonAns;gap.style.color='var(--green)';gap.style.borderColor='var(--green)';}
  const tg=document.getElementById('tgap');
  if(tg){tg.textContent=canonAns;tg.style.borderColor='var(--green)';tg.style.color='var(--green)';}
  const inp=document.getElementById('tin');
  if(inp){inp.readOnly=true;inp.style.borderColor='var(--bd)';}
  let fb='<div class="fb bad"><div class="fbm bad">&#8212; Skipped</div><div class="fbs">Answer: '+esc(canonAns)+'</div></div>';
  if(G.partId===4) fb+='<div class="mbox"><div class="mlbl">MARKING POINTS</div><div class="mrow">&#9312; '+esc(q.p1)+'<br>&#9313; '+esc(q.p2)+'</div></div>';
  const ha=document.querySelector('.harea');
  if(ha) ha.insertAdjacentHTML('beforebegin',fb);
  G.hint=true; G.hintUsed=true;
  const hb=document.getElementById('hbox'),hbtn=document.getElementById('hbtn');
  if(hb) hb.style.display='block';
  if(hbtn) hbtn.textContent='Hide hint';
  renderBot();
}

// Theme
var isLight = lsGet('b2theme', false);
function showBankMenu(){
  var wrongCount=Object.values(BANK).filter(function(e){return e.wrong;}).length;
  var hintCount=Object.values(BANK).filter(function(e){return !e.wrong&&e.hint;}).length;
  var total=wrongCount+hintCount;
  // Build a simple overlay menu
  var existing=document.getElementById('bank-menu');
  if(existing){ existing.remove(); return; }
  var menu=document.createElement('div');
  menu.id='bank-menu';
  menu.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding-bottom:32px';
  var inner='<div style="background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:24px 20px;width:min(440px,92vw);display:flex;flex-direction:column;gap:10px">'
    +'<div style="font-size:10px;color:var(--blue);letter-spacing:.1em;margin-bottom:6px">REVIEW BANK — '+total+' question'+(total!==1?'s':'')+' saved</div>';
  var bsBase='border-radius:10px;padding:14px;font-weight:700;font-size:.95rem;cursor:pointer;text-align:left;width:100%';
  if(total>0) inner+='<button data-action="all" style="background:var(--blue);color:#fff;border:none;'+bsBase+'">Review all '+total+' questions</button>';
  if(wrongCount>0) inner+='<button data-action="wrong" style="background:rgba(251,113,133,.12);color:var(--red);border:1.5px solid rgba(251,113,133,.3);'+bsBase+'">Incorrect only — '+wrongCount+'</button>';
  if(hintCount>0) inner+='<button data-action="hint" style="background:rgba(108,142,191,.1);color:var(--blue);border:1.5px solid rgba(108,142,191,.3);'+bsBase+'">Hint-used only — '+hintCount+'</button>';
  inner+='<button data-action="clear" style="background:transparent;border:1px solid var(--bd);color:var(--dim);border-radius:10px;padding:12px;font-size:.85rem;cursor:pointer;width:100%">Clear bank</button>';
  inner+='</div>';
  menu.innerHTML=inner;
  menu.addEventListener('click',function(e){
    if(e.target===menu){ menu.remove(); return; }
    var action=e.target.dataset.action;
    if(action==='all'){ menu.remove(); startBankReview(); }
    else if(action==='wrong'){ menu.remove(); startBankReview(function(id){return BANK[id].wrong;}); }
    else if(action==='hint'){ menu.remove(); startBankReview(function(id){return !BANK[id].wrong&&BANK[id].hint;}); }
    else if(action==='clear'){
      if(confirm('Clear the review bank?')){
        Object.keys(BANK).forEach(function(k){delete BANK[k];});
        lsSet('b2bank',BANK); updateBankBtn(); menu.remove();
      }
    }
  });
  document.body.appendChild(menu);
}

function applyTheme(){
  document.body.classList.toggle('light', isLight);
  var tb = document.getElementById('theme-toggle');
  if(tb) tb.textContent = isLight ? '\u263D' : '\u2600';
}
function toggleTheme(){
  isLight = !isLight;
  lsSet('b2theme', isLight);
  applyTheme();
}
applyTheme();

buildHome();

// Keyboard shortcuts
document.addEventListener('keydown', function(e){
  var tag = document.activeElement ? document.activeElement.tagName : '';
  var inInput = (tag==='INPUT'||tag==='TEXTAREA');

  // Enter confirms stop dialog (if visible)
  if((e.key==='Enter'||e.code==='Enter') && document.getElementById('stop-confirm')){
    e.preventDefault();
    // Click the Stop/confirm button (second button in stop-confirm)
    var stopBtns = document.querySelectorAll('#stop-confirm button');
    if(stopBtns.length>=2) stopBtns[1].click();
    return;
  }

  // Space or Enter advances to next question
  if((e.code==='Space'||e.key===' '||e.key==='Enter'||e.code==='Enter') && !inInput){
    var nxt = document.querySelector('.nxtbtn');
    if(nxt && nxt.offsetParent !== null){ e.preventDefault(); nxt.click(); return; }
  }
});
