<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>B2 First — Use of English</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0f1a;--s1:#13152a;--bd:#1e2235;--tx:#eeeef5;--dim:rgba(238,238,245,.38);--dimmer:rgba(238,238,245,.18);--p1:#3b82f6;--p2:#10b981;--p3:#8b5cf6;--p4:#f43f5e;--p5:#0ea5e9;--p6:#6366f1;--p7:#ec4899;--green:#34d399;--red:#fb7185;--amber:#f59e0b;--blue:#6c8ebf}
.light{--bg:#f5f4f0;--s1:#ffffff;--bd:#dddbd4;--tx:#1a1a18;--dim:rgba(26,26,24,.65);--dimmer:rgba(26,26,24,.45);--p1:#2563eb;--p2:#059669;--p3:#7c3aed;--p4:#e11d48;--p5:#0284c7;--p6:#4f46e5;--p7:#be185d;--green:#1a7a50;--red:#b5253a;--amber:#b8860b;--blue:#2a5a9f}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif}
input,button{font-family:inherit}
input:focus{outline:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:2px}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;transform:translateY(12px);overflow:hidden}
.scr.on{opacity:1;pointer-events:all;transform:none}
#s-home{overflow-y:auto}
.home-pad{padding:44px 20px 20px}
.eyebrow{font-family:'DM Mono',monospace;font-size:10px;color:var(--p1);letter-spacing:.14em;margin-bottom:10px}
.h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.9rem,8vw,2.8rem);line-height:1.1;margin-bottom:6px}
.sub{color:var(--dim);font-size:.88rem;font-weight:300;margin-bottom:36px}
.tiles{padding:0 16px 48px;display:flex;flex-direction:column;gap:11px}
.tile{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .12s,border-color .12s,transform .12s;text-align:left;width:100%;-webkit-appearance:none}
.tile:active{transform:scale(.97);background:#1a1d2e}
.tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;margin-bottom:5px}
.tname{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;color:var(--tx);margin-bottom:2px}
.tsub{font-size:.76rem;color:var(--dimmer);font-weight:300}
.tile-r{display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-left:10px}
.bbadge{font-family:'DM Mono',monospace;font-size:11px;border-radius:6px;padding:3px 8px}
.arrow{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.15rem;line-height:1;flex-shrink:0}
#s-setup{overflow-y:auto;padding:0 20px 48px}
.setup-head{padding:36px 0 18px;display:flex;align-items:center;gap:12px}
.bk{background:none;border:none;color:var(--dimmer);font-size:1.5rem;padding:4px 8px;cursor:pointer;line-height:1}
.setup-head h2{font-family:'Syne',sans-serif;font-weight:700;font-size:1.35rem}
.p4note{color:var(--dim);font-size:.83rem;margin-bottom:22px;line-height:1.7;font-weight:300;background:rgba(251,113,133,.06);border:1px solid rgba(251,113,133,.2);border-radius:10px;padding:12px 15px}
.p4note strong{color:var(--red)}
.cnt-btns{display:flex;flex-direction:column;gap:10px}
.cnt-btn{border-radius:12px;padding:17px 20px;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;text-align:left;cursor:pointer;transition:background .1s,color .1s,transform .1s;border:1.5px solid transparent;-webkit-appearance:none}
.cnt-btn:active{transform:scale(.97)}
#s-question{display:flex;flex-direction:column}
.qtop{padding:13px 18px 11px;border-bottom:1px solid var(--bd);flex-shrink:0}
.qtop-row{display:flex;align-items:center;gap:10px}
.stop-btn{background:none;border:none;color:var(--dim);font-size:1rem;padding:4px 6px;cursor:pointer;line-height:1;flex-shrink:0;border-radius:6px;transition:color .15s}
.stop-btn:hover{color:var(--red)}
.pbar{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .4s}
.qctr{font-family:'DM Mono',monospace;font-size:12px;flex-shrink:0}
.qscr{font-family:'DM Mono',monospace;font-size:12px;color:var(--dim);flex-shrink:0}
.qbody{flex:1;overflow-y:auto;padding:22px 20px 14px;-webkit-overflow-scrolling:touch}
.ptag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;margin-bottom:16px}
.sent{font-size:1.07rem;line-height:1.85;margin-bottom:24px;color:var(--tx)}
.gap{display:inline-block;min-width:80px;border-bottom:2px solid rgba(238,238,245,.25);margin:0 4px;vertical-align:bottom;font-family:'DM Mono',monospace;font-size:.84rem;padding:0 3px;transition:color .2s,border-color .2s}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:var(--s1);border:1.5px solid var(--bd);border-radius:12px;padding:14px 18px;font-size:.93rem;text-align:left;cursor:pointer;transition:background .1s,border-color .1s,transform .1s;width:100%;-webkit-appearance:none;color:var(--tx)}
.opt:active:not(:disabled){transform:scale(.97)}
.opt.ok{background:rgba(52,211,153,.1)!important;border-color:var(--green)!important;color:var(--green)!important}
.opt.bad{background:rgba(251,113,133,.1)!important;border-color:var(--red)!important;color:var(--red)!important}
.tin{width:100%;background:var(--s1);border:1.5px solid var(--bd);border-radius:12px;padding:15px 18px;font-size:1rem;color:var(--tx);font-family:'DM Mono',monospace;-webkit-appearance:none;transition:border-color .2s}
.tin:focus{border-color:var(--blue)}
.rbadge{display:inline-flex;align-items:center;gap:7px;margin-bottom:16px;background:rgba(129,140,248,.1);border:1px solid rgba(129,140,248,.25);border-radius:7px;padding:5px 12px}
.rlabel{font-family:'DM Mono',monospace;font-size:10px;color:#818cf8;letter-spacing:.1em}
.rword{font-family:'DM Mono',monospace;font-size:.95rem;color:#c7d2fe;font-weight:500}
.origbox{background:var(--s1);border:1px solid var(--bd);border-radius:11px;padding:14px 17px;margin-bottom:14px}
.origlbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--dimmer);letter-spacing:.08em;margin-bottom:7px}
.origtxt{font-size:.93rem;color:var(--dim);line-height:1.65;font-style:italic}
.kbadge{display:inline-flex;align-items:center;gap:7px;margin-bottom:14px;background:rgba(251,113,133,.1);border:1px solid rgba(251,113,133,.25);border-radius:7px;padding:5px 12px}
.klabel{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.1em}
.kword{font-family:'DM Mono',monospace;font-size:.95rem;color:#fda4af;font-weight:500}
.trow{font-size:.97rem;line-height:2;margin-bottom:12px}
.tgap{font-family:'DM Mono',monospace;font-size:.83rem;display:inline-block;min-width:140px;border-bottom:2px solid var(--bd);vertical-align:bottom;padding:0 3px;transition:color .2s,border-color .2s}
.fb{border-radius:10px;padding:12px 14px;margin-top:13px}
.fb.ok{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.25)}
.fb.bad{background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.25)}
.fb.mid{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25)}
.fbm{font-family:'DM Mono',monospace;font-size:.84rem}
.fbm.ok{color:var(--green)}.fbm.bad{color:var(--red)}.fbm.mid{color:var(--amber)}
.fbs{font-size:.79rem;color:var(--dim);margin-top:4px}
.mbox{background:rgba(251,113,133,.05);border:1px solid rgba(251,113,133,.17);border-radius:10px;padding:12px 14px;margin-top:10px}
.mlbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.1em;margin-bottom:7px}
.mrow{font-size:.79rem;color:var(--tx);opacity:.75;line-height:1.8}
.harea{margin-top:16px}
.hbtn{background:transparent;border:1px dashed var(--bd);color:var(--dim);border-radius:8px;padding:7px 14px;font-size:.77rem;cursor:pointer;-webkit-appearance:none}
.hbox{background:rgba(108,142,191,.07);border:1px solid rgba(108,142,191,.18);border-radius:9px;padding:11px 13px;margin-top:10px}
.htag{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);letter-spacing:.1em;margin-bottom:5px}
.htxt{font-size:.82rem;color:var(--tx);opacity:.85;line-height:1.65}
.qbot{flex-shrink:0;border-top:1px solid var(--bd);padding:11px 18px 32px}
.chkbtn{width:100%;border:none;border-radius:12px;padding:15px;font-family:'Syne',sans-serif;font-weight:700;font-size:.97rem;cursor:pointer;transition:background .15s,color .15s;-webkit-appearance:none}
.skipbtn{width:100%;background:transparent;border:1.5px solid var(--bd);border-radius:12px;padding:10px;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--dim);cursor:pointer;margin-top:8px;-webkit-appearance:none;transition:border-color .15s,color .15s}
.skipbtn:hover{border-color:var(--dim);color:var(--dim)}
.nxtbtn{width:100%;border:none;border-radius:12px;padding:15px;font-family:'Syne',sans-serif;font-weight:700;font-size:.97rem;cursor:pointer;color:#0d0f1a;-webkit-appearance:none}
#s-results{overflow-y:auto;padding:36px 22px 48px;display:flex;flex-direction:column}
.rcrd{background:var(--s1);border-radius:14px;padding:32px 22px;text-align:center;margin-bottom:16px}
.rscore{font-family:'Syne',sans-serif;font-weight:800;font-size:4rem;line-height:1;margin-bottom:4px}
.rpct{font-family:'DM Mono',monospace;font-size:.84rem;color:var(--dim);margin-bottom:14px}
.rgrade{font-family:'DM Mono',monospace;font-size:.77rem;border-radius:5px;padding:5px 14px;display:inline-block}
.rnote{font-family:'DM Mono',monospace;font-size:.67rem;color:var(--dim);margin-top:9px}
.rbest{text-align:center;font-family:'DM Mono',monospace;font-size:.74rem;color:var(--dim);margin-bottom:14px}
.rbreakdown{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:20px;padding:0 4px}
.rdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-family:'DM Mono',monospace;font-weight:500;flex-shrink:0}
.rdot.ok{background:rgba(52,211,153,.15);color:var(--green)}
.rdot.bad{background:rgba(251,113,133,.15);color:var(--red)}
.rdot.skip{background:var(--bd);color:var(--dim)}
.streak-info{text-align:center;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--dimmer);margin-bottom:4px}
.rbtns{display:flex;flex-direction:column;gap:10px;margin-top:auto;padding-top:20px}
.rpri{border:none;border-radius:12px;padding:15px;font-family:'Syne',sans-serif;font-weight:700;font-size:.97rem;cursor:pointer;color:#0d0f1a;-webkit-appearance:none}
.rpri.hint-review{background:transparent!important;border:1.5px solid var(--blue)!important;color:var(--blue)!important;font-weight:500}
.rghost{background:transparent;border:1.5px solid var(--bd);border-radius:12px;padding:15px;font-family:'DM Sans',sans-serif;font-size:.94rem;cursor:pointer;color:var(--tx);-webkit-appearance:none}
.footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:7px;font-family:'DM Mono',monospace;font-size:10px;color:var(--dimmer);pointer-events:none;z-index:99;letter-spacing:.06em}
.footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:7px 80px 7px 7px;font-family:'DM Mono',monospace;font-size:10px;color:rgba(128,128,128,.35);pointer-events:none;z-index:99;letter-spacing:.04em}
.light .footer{color:rgba(26,26,24,.25)}
.theme-toggle{position:fixed;top:12px;right:14px;background:var(--bg2);border:1.5px solid var(--bd);border-radius:24px;padding:6px 14px;font-size:18px;cursor:pointer;z-index:200;color:var(--tx);transition:all .2s;-webkit-appearance:none;box-shadow:0 1px 6px rgba(0,0,0,.12)}
.theme-toggle:hover{opacity:.8}.theme-toggle:hover{border-color:var(--p1);color:var(--p1)}
</style>
</head>
<body>
<div class="scr on" id="s-home">
  <div class="home-pad">
    <div class="eyebrow">CAMBRIDGE B2 FIRST</div>
    <h1 class="h1">Use of English</h1>
    <p class="sub">Reading &amp; Use of English &middot; Parts 1&ndash;4</p>
  </div>
  <div id="bank-btn" style="display:none;margin:0 16px 20px;background:rgba(108,142,191,.08);border:1.5px solid rgba(108,142,191,.3);border-radius:12px;padding:14px 18px;cursor:pointer;align-items:center;justify-content:space-between;gap:12px" onclick="showBankMenu()">
    <div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);letter-spacing:.1em;margin-bottom:4px">REVIEW BANK</div>
      <div style="font-size:.88rem;color:var(--tx)" id="bank-label"></div>
    </div>
    <div style="color:var(--blue);font-size:1.2rem">&rsaquo;</div>
  </div>
  <div class="tiles" id="tiles"></div>
  <div style="text-align:center;padding:18px 16px 28px;font-size:.82rem;color:var(--dim)">
    An app by Ross Lawrence &nbsp;&middot;&nbsp;
    <a href="mailto:rossirlawrence@gmail.com" style="color:inherit;text-decoration:none;border-bottom:1px solid var(--bd);cursor:pointer">rossirlawrence@gmail.com</a>
  </div>
</div>
<div class="scr" id="s-setup">
  <div class="setup-head">
    <button class="bk" onclick="show('s-home')">&#8249;</button>
    <div><div class="eyebrow" id="stag"></div><h2 id="stitle"></h2></div>
  </div>
  <div class="p4note" id="p4note" style="display:none">
    Each question is worth <strong>2 marks</strong>. Score 1 mark for getting one transformation point right, 2 marks for a fully correct answer.
  </div>
  <div class="cnt-btns" id="cntbtns"></div>
</div>
<div class="scr" id="s-question">
  <div class="qtop"><div class="qtop-row">
    <button class="stop-btn" onclick="confirmStop()" title="Stop session">&#10005;</button>
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
    <div class="qctr" id="qctr"></div>
    <div class="qscr" id="qscr"></div>
  </div></div>
  <div class="qbody" id="qbody"></div>
  <div class="qbot" id="qbot"></div>
</div>
<div class="scr" id="s-results">
  <div class="eyebrow" id="rtag"></div>
  <div class="rcrd" id="rcrd"></div>
  <div class="rbest" id="rbest"></div>
  <div class="rbreakdown" id="rbreakdown"></div>
  <div class="rbtns">
    <button class="rpri" id="ragain">Try Again</button>
    <button class="rpri" id="rreview" style="display:none">Review Mistakes</button>
    <button class="rpri" id="rreviewhint" style="display:none">Review Hint-Assisted</button>
    <button class="rghost" onclick="show('s-home')">Home</button>
  </div>
</div>
<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">&#9788;</button>
<script>
const P1 = [{"id": "b2p1_001", "sent": "The car broke _______ on the motorway and we had to wait two hours for assistance.", "opts": ["A: up", "B: off", "C: down", "D: out"], "a": "C", "h": "BREAK DOWN = stop working (of machinery). BREAK UP = separate. BREAK OFF = stop temporarily. BREAK OUT = escape or begin suddenly. Only one fits a car stopping on a road."}, {"id": "b2p1_002", "sent": "She came _______ some old photographs while she was clearing out the attic.", "opts": ["A: through", "B: across", "C: over", "D: upon"], "a": "B", "h": "All four options can follow COME, but only one creates a phrasal verb meaning 'find or meet by chance'. Think about which particle suggests an unexpected encounter rather than visiting, surviving or searching."}, {"id": "b2p1_003", "sent": "It took the rescue team three days to carry _______ the search operation in the flooded area.", "opts": ["A: on", "B: out", "C: off", "D: through"], "a": "B", "h": "CARRY OUT = perform or complete a task. CARRY ON = continue. CARRY OFF = do successfully (often surprisingly). CARRY THROUGH = complete despite difficulty. Only CARRY OUT collocates with 'operation' or 'task'."}, {"id": "b2p1_004", "sent": "The new school timetable was brought _______ after consultation with both staff and parents.", "opts": ["A: about", "B: in", "C: up", "D: forward"], "a": "B", "h": "You need the phrasal verb for officially introducing a new rule or law. Think: which particle suggests something being introduced from outside into use? The other options mean cause to happen, raise a topic, or suggest an idea."}, {"id": "b2p1_005", "sent": "The company set _______ a new training programme for all employees joining after January.", "opts": ["A: up", "B: out", "C: about", "D: off"], "a": "A", "h": "SET UP = establish or create. SET OUT = begin a journey or state clearly. SET ABOUT = begin doing something. SET OFF = start a journey or trigger. Only SET UP means to create or establish a new scheme or programme."}, {"id": "b2p1_006", "sent": "The concert was called _______ at the last minute because the lead singer had lost her voice.", "opts": ["A: away", "B: back", "C: off", "D: out"], "a": "C", "h": "CALL OFF = cancel. CALL AWAY = summon elsewhere. CALL BACK = return a phone call. CALL OUT = shout or summon. An event that is cancelled is CALLED OFF."}, {"id": "b2p1_007", "sent": "He gets _______ very well with his colleagues despite having a very different working style.", "opts": ["A: along", "B: over", "C: through", "D: by"], "a": "A", "h": "GET ALONG WITH = have a good relationship. GET OVER = recover from. GET THROUGH = finish or contact by phone. GET BY = manage financially. GET ALONG WITH is the fixed phrasal verb for having a friendly relationship with someone."}, {"id": "b2p1_008", "sent": "The story turned _______ to be completely different from what the trailer had suggested.", "opts": ["A: up", "B: over", "C: out", "D: around"], "a": "C", "h": "All four particles follow TURN. Think about which one means 'prove to be' — something reveals what it really is. The others mean arrive, flip over, or reverse direction."}, {"id": "b2p1_009", "sent": "I looked _______ the word in the dictionary but I still couldn't understand the definition.", "opts": ["A: over", "B: into", "C: through", "D: up"], "a": "D", "h": "LOOK UP = search for a word or name in a reference book. LOOK OVER = inspect. LOOK INTO = investigate. LOOK THROUGH = read quickly. When you search for a word in a dictionary, you LOOK IT UP."}, {"id": "b2p1_010", "sent": "We ran _______ an old school friend while we were walking around the city centre.", "opts": ["A: across", "B: into", "C: over", "D: after"], "a": "B", "h": "All four follow RUN. Which one means 'meet unexpectedly while going somewhere'? Hint: it also means 'collide with'. The others mean search for, meet randomly (but mainly for objects), or chase."}, {"id": "b2p1_011", "sent": "The manager pointed _______ several errors in the report before asking for a revised version.", "opts": ["A: up", "B: over", "C: out", "D: off"], "a": "C", "h": "You need the phrasal verb meaning 'draw attention to a mistake'. Which particle gives POINT the meaning of identifying something for someone else? POINT UP means emphasise, which is rarer."}, {"id": "b2p1_012", "sent": "The price of oil has gone _______ significantly over the past few months.", "opts": ["A: on", "B: over", "C: about", "D: up"], "a": "D", "h": "GO UP = increase in price or amount. GO ON = continue. GO OVER = examine or repeat. GO ABOUT = deal with or move around. When prices increase, they GO UP."}, {"id": "b2p1_013", "sent": "She decided to give _______ her job and travel the world for a year.", "opts": ["A: away", "B: in", "C: up", "D: out"], "a": "C", "h": "GIVE UP = stop doing or having something. GIVE AWAY = give for free or reveal. GIVE IN = surrender. GIVE OUT = distribute. When you stop a job or habit permanently, you GIVE IT UP."}, {"id": "b2p1_014", "sent": "The politician refused to back _______ despite enormous pressure from members of his own party.", "opts": ["A: away", "B: down", "C: off", "D: out"], "a": "B", "h": "BACK DOWN = withdraw from a position or argument. BACK AWAY = move away from. BACK OFF = stop threatening. BACK OUT = withdraw from a commitment. When someone refuses to change their position under pressure, they refuse to BACK DOWN."}, {"id": "b2p1_015", "sent": "After much discussion, they finally came _______ with a solution that everyone was happy with.", "opts": ["A: over", "B: along", "C: up", "D: out"], "a": "C", "h": "COME UP WITH = find or produce an idea or solution. COME OVER = visit. COME ALONG = accompany or make progress. COME OUT = be published or revealed. Only COME UP WITH means to find or produce a solution."}, {"id": "b2p1_016", "sent": "The exhibition is being held _______ at the city's main gallery until the end of the month.", "opts": ["A: on", "B: up", "C: over", "D: off"], "a": "A", "h": "HOLD ON = means an event is taking place. HOLD UP = delay or rob. HOLD OVER = postpone. HOLD OFF = delay doing something. When an event is taking place, it is being HELD ON (or 'on' after the verb)."}, {"id": "b2p1_017", "sent": "It took her a long time to get _______ the shock of losing her job so unexpectedly.", "opts": ["A: over", "B: past", "C: through", "D: around"], "a": "A", "h": "GET OVER = recover from something bad. GET PAST = move beyond physically. GET THROUGH = survive or finish. GET AROUND = avoid or move around. When recovering from a shock or illness, you GET OVER it."}, {"id": "b2p1_018", "sent": "The noise from the construction site was keeping everyone _______ at night.", "opts": ["A: up", "B: on", "C: out", "D: awake"], "a": "A", "h": "KEEP UP = prevent from sleeping (informal but very common: 'keeping me up' = stopping me from sleeping). This is the fixed phrasal expression. KEEP ON = continue. KEEP OUT = prevent entry. D is not a phrasal verb at all. The idiom is 'keeping everyone up'."}, {"id": "b2p1_019", "sent": "The local council decided to do _______ with the old car park and replace it with a public garden.", "opts": ["A: out", "B: away", "C: up", "D: without"], "a": "B", "h": "DO AWAY WITH = abolish or get rid of. DO OUT = clean (a room). DO UP = renovate or fasten. DO WITHOUT = manage without. When something is demolished or abolished, you DO AWAY WITH it."}, {"id": "b2p1_020", "sent": "The teacher asked the students to look _______ the new vocabulary before the next lesson.", "opts": ["A: over", "B: into", "C: up", "D: after"], "a": "A", "h": "All four follow LOOK. Which one means 'examine or check something written before approving it'? Compare: one means investigate, one means search in a reference book, one means take care of."}, {"id": "b2p1_021", "sent": "This type of music is most closely associated _______ the cultural traditions of the deep south.", "opts": ["A: to", "B: by", "C: with", "D: for"], "a": "C", "h": "ASSOCIATED WITH = connected to. This is the fixed preposition after ASSOCIATED. 'Associated to' and 'associated by' are not standard. 'Associated for' is wrong. Always: associated WITH something."}, {"id": "b2p1_022", "sent": "Many young people are not fully aware _______ the risks involved in sharing personal information online.", "opts": ["A: for", "B: about", "C: in", "D: of"], "a": "D", "h": "AWARE OF = conscious of or knowing about. 'Aware about' is a very common error but is not standard English. 'Aware for' and 'aware in' are both wrong. The fixed preposition is always AWARE OF."}, {"id": "b2p1_023", "sent": "All participants must be equipped _______ a valid ID card before they can enter the venue.", "opts": ["A: by", "B: with", "C: in", "D: for"], "a": "B", "h": "EQUIPPED WITH = provided with necessary items. 'Equipped by' refers to who provided the equipment. 'Equipped in' and 'equipped for' mean something different. When you have the necessary equipment, you are EQUIPPED WITH it."}, {"id": "b2p1_024", "sent": "Are you responsible _______ making sure the reports are submitted on time?", "opts": ["A: of", "B: about", "C: for", "D: with"], "a": "C", "h": "RESPONSIBLE FOR = having a duty to do something. 'Responsible of' is not standard English. 'Responsible about' and 'responsible with' have different meanings (careful/sensible). RESPONSIBLE FOR indicates duty or accountability."}, {"id": "b2p1_025", "sent": "His success was largely due _______ the support he received from his family throughout his training.", "opts": ["A: from", "B: by", "C: through", "D: to"], "a": "D", "h": "Think about which preposition follows 'due' when explaining a cause or reason. One option refers to deadlines, one is not used with 'due', and the correct one creates a fixed phrase of cause."}, {"id": "b2p1_026", "sent": "The new manager seems very keen _______ making changes to the way the office is organised.", "opts": ["A: about", "B: in", "C: on", "D: for"], "a": "C", "h": "Which preposition follows KEEN when expressing enthusiasm about an activity? Think about the difference between being eager for something, being enthusiastic about doing it, and the specific preposition KEEN takes."}, {"id": "b2p1_027", "sent": "She was very disappointed _______ not being chosen for the lead role in the production.", "opts": ["A: about", "B: at", "C: with", "D: by"], "a": "A", "h": "DISAPPOINTED ABOUT = unhappy about a situation or outcome. 'Disappointed at' is possible but slightly more formal and usually precedes a specific moment. 'Disappointed with' refers to a person or thing that failed to meet expectations. 'Disappointed by' is less common. DISAPPOINTED ABOUT a situation is the most natural here."}, {"id": "b2p1_028", "sent": "The documentary focuses _______ the lives of people who work in the most remote areas of the country.", "opts": ["A: at", "B: into", "C: about", "D: on"], "a": "D", "h": "FOCUS ON = concentrate attention on. 'Focus at', 'focus into' and 'focus about' are all wrong. The verb FOCUS always takes the preposition ON."}, {"id": "b2p1_029", "sent": "The new policy applies _______ all members of staff regardless of how long they have worked here.", "opts": ["A: for", "B: on", "C: to", "D: at"], "a": "C", "h": "APPLY TO = be relevant to or affect. 'Apply for' means to submit an application. 'Apply on' and 'apply at' are not standard in this meaning. A rule or policy APPLIES TO people."}, {"id": "b2p1_030", "sent": "The scientist succeeded _______ developing a vaccine that proved effective against three different strains.", "opts": ["A: to", "B: in", "C: at", "D: with"], "a": "B", "h": "SUCCEED IN + gerund = manage to do. 'Succeed to' means to inherit a title or position. 'Succeed at' is used with nouns (succeed at a task) but not naturally with a gerund. 'Succeed with' is non-standard. SUCCEED IN + gerund is the fixed pattern."}, {"id": "b2p1_031", "sent": "I'm not very good _______ remembering names, but I never forget a face.", "opts": ["A: for", "B: in", "C: at", "D: with"], "a": "C", "h": "GOOD AT = skilled in or able to do. 'Good for' means beneficial. 'Good in' and 'good with' have different meanings (good with people/good in a crisis). The fixed preposition for ability is GOOD AT."}, {"id": "b2p1_032", "sent": "The charity relies _______ donations from the public to fund all of its programmes.", "opts": ["A: in", "B: on", "C: upon", "D: at"], "a": "B", "h": "Which preposition follows RELY? You need the one that expresses depending on someone or something. Think about the difference between 'rely in', 'rely at', and the standard fixed preposition."}, {"id": "b2p1_033", "sent": "Many people are not familiar _______ the regulations that apply to renting property.", "opts": ["A: about", "B: of", "C: in", "D: with"], "a": "D", "h": "Which preposition follows FAMILIAR when you have knowledge of something? Compare: one preposition means 'having awareness of general information about', another means 'knowing in depth', and the correct one is the fixed standard."}, {"id": "b2p1_034", "sent": "The new regulation prevents employers _______ asking about a candidate's age during an interview.", "opts": ["A: from", "B: against", "C: in", "D: of"], "a": "A", "h": "PREVENT someone FROM doing = stop them from doing. 'Prevent against' is used with insurance. 'Prevent in' and 'prevent of' are not standard. The pattern is always PREVENT + object + FROM + gerund."}, {"id": "b2p1_035", "sent": "The team is capable _______ winning the championship if everyone performs to their best level.", "opts": ["A: to", "B: in", "C: of", "D: for"], "a": "C", "h": "CAPABLE OF = having the ability to do. 'Capable to' is a very common error but is not standard English. 'Capable in' and 'capable for' are both wrong. Always: CAPABLE OF + gerund or noun."}, {"id": "b2p1_036", "sent": "She has a natural _______ to take charge of situations and is often chosen as team leader.", "opts": ["A: habit", "B: tendency", "C: custom", "D: practice"], "a": "B", "h": "All four nouns describe a pattern of behaviour. Which one specifically means a natural inclination towards a type of behaviour — not something done automatically, not a cultural practice, not repeated for skill? Think about whether the behaviour is deliberate or instinctive."}, {"id": "b2p1_037", "sent": "The museum offers a wide _______ of activities for children of all ages during the school holidays.", "opts": ["A: choice", "B: selection", "C: range", "D: variety"], "a": "C", "h": "All four nouns suggest multiple items. Which one specifically describes a span of different types within a category? Think about: one is a chosen group, one suggests different kinds, one is the act of choosing, and one suggests breadth and variety."}, {"id": "b2p1_038", "sent": "The new product was an _______ success, selling out within hours of going on sale.", "opts": ["A: abrupt", "B: immediate", "C: instant", "D: sudden"], "a": "C", "h": "Three of these adjectives describe suddenness or immediacy. Which one specifically collocates with SUCCESS as a fixed phrase meaning 'success that happens immediately'? The others describe abruptness or speed, which are slightly different."}, {"id": "b2p1_039", "sent": "She finally managed to _______ her ambition of becoming a professional dancer.", "opts": ["A: realise", "B: achieve", "C: fulfil", "D: complete"], "a": "C", "h": "All four verbs relate to achieving a goal. Which one specifically collocates with AMBITION? Think: one suggests overcoming obstacles, one is more formal and suggests making possible, and one specifically means making a dream or aspiration come true."}, {"id": "b2p1_040", "sent": "Scientists _______ that there are more than three thousand species of mosquito worldwide.", "opts": ["A: count", "B: estimate", "C: guess", "D: calculate"], "a": "B", "h": "All four verbs relate to calculating a number. Which one is used when scientists give an approximate figure based on evidence — not an exact count, not a guess without evidence, and not a precise mathematical calculation?"}, {"id": "b2p1_041", "sent": "The explorer made a significant _______ to our understanding of deep ocean ecosystems.", "opts": ["A: contribution", "B: addition", "C: donation", "D: input"], "a": "A", "h": "All four nouns describe giving something. Which one collocates with MAKE and TO when adding to a body of knowledge, effort, or understanding? Think about: one is a financial gift, one is something added to a set, one refers to effort put in, and one is the standard academic/journalistic choice."}, {"id": "b2p1_042", "sent": "His speech made a strong _______ on the audience, who applauded for several minutes.", "opts": ["A: effect", "B: influence", "C: impact", "D: impression"], "a": "D", "h": "Which noun collocates with MAKE when referring to the effect someone has on how others perceive them? Think: one requires 'have an impact', one requires 'have an influence', one follows MAKE but means a different kind of effect on the senses, and one is specifically about how you affect someone's perception."}, {"id": "b2p1_043", "sent": "Good quality ingredients are in short _______ during the winter months in remote areas.", "opts": ["A: availability", "B: stock", "C: supply", "D: quantity"], "a": "C", "h": "Which noun completes the fixed phrase meaning 'not enough available'? Only one of these four words forms the established phrase. Think about which collocates with 'in short' to mean 'scarce'."}, {"id": "b2p1_044", "sent": "The journalists managed to observe the rare bird at close _______ for several hours.", "opts": ["A: distance", "B: proximity", "C: range", "D: quarters"], "a": "D", "h": "Which noun completes the fixed phrase meaning 'from very near'? Only one forms the established idiom. Think: one refers to physical distance, one to nearness in space, one to a firing or camera range, and one completes the specific idiom for close observation."}, {"id": "b2p1_045", "sent": "The train service was cancelled _______ a technical fault with the signalling system.", "opts": ["A: despite", "B: because", "C: although", "D: following"], "a": "D", "h": "FOLLOWING = as a result of, after. A preposition meaning \"because of/as a consequence of\". The other options require different grammatical structures: DESPITE/ALTHOUGH signal contrast, BECAUSE needs a full clause here."}, {"id": "b2p1_046", "sent": "The expedition members were filled _______ excitement as they approached the summit.", "opts": ["A: by", "B: up", "C: with", "D: in"], "a": "C", "h": "FILLED WITH = containing a large amount of an emotion or substance. 'Filled by' describes who filled something. 'Filled up' means made completely full. 'Filled in' means completed a form. You are FILLED WITH emotions."}, {"id": "b2p1_047", "sent": "She has a great _______ for languages and picked up basic Italian within a few months.", "opts": ["A: skill", "B: ability", "C: talent", "D: gift"], "a": "C", "h": "All four nouns describe natural ability. Which one specifically collocates with FOR when describing a natural aptitude for a skill? Think: one is an ability developed through practice, one is general capacity, one overlaps but is slightly more informal and suggests something extraordinary, and one specifically describes a natural aptitude."}, {"id": "b2p1_048", "sent": "The politician spoke _______ of his childhood experience of poverty and how it shaped his views.", "opts": ["A: passionately", "B: movingly", "C: emotionally", "D: touchingly"], "a": "B", "h": "Which adverb means 'in a way that causes emotional response in an audience'? Think about: one suggests enthusiasm, one suggests showing emotion personally, one sounds archaic, and the correct one describes the effect the speech had on others."}, {"id": "b2p1_049", "sent": "The coach had to _______ a very difficult decision about who to include in the final squad.", "opts": ["A: do", "B: have", "C: make", "D: take"], "a": "C", "h": "Which verb collocates with DECISION as the standard fixed phrase? Think about what is wrong with 'do a decision', 'have a decision', and 'take a decision' — one of these is also used formally in British English, but which is by far the most common everyday collocation?"}, {"id": "b2p1_050", "sent": "The new restaurant didn't _______ our expectations — the food was disappointing.", "opts": ["A: meet", "B: reach", "C: fulfil", "D: match"], "a": "A", "h": "MEET expectations = satisfy them. The fixed collocation is MEET expectations. REACH is used for targets/goals. FULFIL is possible in formal writing but less idiomatic. MATCH suggests equality."}, {"id": "b2p1_051", "sent": "_______ you choose to go by car or by train, the journey will take about the same amount of time.", "opts": ["A: However", "B: Whenever", "C: Whatever", "D: Whichever"], "a": "D", "h": "You need the relative/interrogative pronoun for choosing between a specific set of options. Think: one means 'in what way', one means 'regardless of what', one means 'at any time', and the correct one means 'no matter which option from a defined set'."}, {"id": "b2p1_052", "sent": "The two friends lost _______ with each other after one of them moved to another country.", "opts": ["A: contact", "B: connection", "C: touch", "D: communication"], "a": "C", "h": "LOSE TOUCH WITH = stop being in contact with someone. 'Lose contact with' is also used, but 'lose touch' is the more idiomatic expression. 'Lose connection with' and 'lose communication with' are not standard fixed phrases."}, {"id": "b2p1_053", "sent": "In the end, the project fell _______ because the two sides could not agree on the budget.", "opts": ["A: through", "B: down", "C: apart", "D: out"], "a": "A", "h": "FALL THROUGH = fail to happen or be completed. FALL DOWN = collapse or fail (usually physically or in an argument). FALL APART = break into pieces or stop functioning. FALL OUT = quarrel. When a plan or project fails to be completed, it FALLS THROUGH."}, {"id": "b2p1_054", "sent": "The children were _______ so much noise that the neighbours finally called the police.", "opts": ["A: causing", "B: making", "C: producing", "D: creating"], "a": "B", "h": "MAKE NOISE = the fixed collocation. 'Cause noise' is non-standard. 'Produce noise' sounds technical. 'Create noise' is sometimes used metaphorically. You always MAKE noise — it is a completely fixed collocation."}, {"id": "b2p1_055", "sent": "It came _______ a complete shock to everyone when the CEO announced his resignation.", "opts": ["A: like", "B: across", "C: as", "D: upon"], "a": "C", "h": "CAME AS A SHOCK = was experienced as a shock — fixed phrase. 'Came like a shock' is not standard. 'Came across as' means gave the impression of. 'Came upon' means encountered. IT CAME AS A SHOCK is the established structure."}, {"id": "b2p1_056", "sent": "She took _______ her mother in many ways — the same bright eyes and quick sense of humour.", "opts": ["A: after", "B: from", "C: on", "D: to"], "a": "A", "h": "TAKE AFTER = resemble a parent or relative. TAKE FROM = derive from. TAKE ON = accept responsibility or compete with. TAKE TO = begin to like. When someone resembles a parent in personality or appearance, they TAKE AFTER them."}, {"id": "b2p1_057", "sent": "The documentary _______ a fascinating insight into the way professional athletes train.", "opts": ["A: gave", "B: offered", "C: provided", "D: afforded"], "a": "B", "h": "All four verbs mean 'provide'. Which one is most natural at B2 level in the phrase '___ an insight into'? Think about which is the most common, neutral verb for making something available to an audience."}, {"id": "b2p1_058", "sent": "After the match, the manager made it _______ that he was unhappy with his team's performance.", "opts": ["A: obvious", "B: plain", "C: clear", "D: apparent"], "a": "C", "h": "Which adjective collocates most naturally with MADE IT ___? Think about: one suggests something was already visible, one suggests it was stated simply, one suggests it was communicated publicly, and the correct one is the dominant fixed phrase for communicating something explicitly."}, {"id": "b2p1_059", "sent": "The thieves took _______ of the fact that the security cameras had been switched off.", "opts": ["A: advantage", "B: benefit", "C: profit", "D: use"], "a": "A", "h": "TAKE ADVANTAGE OF = exploit a situation. TAKE BENEFIT OF is not standard. TAKE PROFIT OF is not standard. TAKE USE OF is not standard. TAKE ADVANTAGE OF is the only fixed phrase meaning to exploit an opportunity or situation."}, {"id": "b2p1_060", "sent": "The town is _______ well known for its annual music festival, which draws visitors from across the country.", "opts": ["A: widely", "B: largely", "C: broadly", "D: greatly"], "a": "A", "h": "Which adverb specifically collocates with KNOWN to mean 'known by many people across a wide area'? Think: one collocates with 'regarded' or 'praised', one with 'unaffected', one with 'speaking', and the correct one specifically forms a collocation with 'known'."}, {"id": "b2p1_061", "sent": "_______ the bad weather, they decided to continue with the outdoor ceremony.", "opts": ["A: Although", "B: However", "C: Despite", "D: Nevertheless"], "a": "C", "h": "DESPITE + noun phrase (no verb needed). ALTHOUGH/EVEN THOUGH need a full clause. HOWEVER and NEVERTHELESS are adverbs, not prepositions/conjunctions. Despite the bad weather = correct."}, {"id": "b2p1_062", "sent": "The exercise takes _______ thirty minutes and can be done at home with no equipment.", "opts": ["A: about", "B: around", "C: approximately", "D: roughly"], "a": "A", "h": "Which word most naturally follows TAKES when giving an approximate duration? Think about register — one is more formal, two are quite natural but one is the most frequent in everyday speech and writing."}, {"id": "b2p1_063", "sent": "There was _______ interesting in the exhibition, so we left after only twenty minutes.", "opts": ["A: anything", "B: something", "C: everything", "D: nothing"], "a": "D", "h": "Think about the logic of the sentence — they left because of what they found. Which pronoun creates a negative meaning that explains why they left early? One means everything, one means something, and the correct one means an absence of anything."}, {"id": "b2p1_064", "sent": "The new safety regulations came into _______ at the start of the year.", "opts": ["A: force", "B: effect", "C: practice", "D: power"], "a": "B", "h": "Come into EFFECT = start to operate or apply officially. Come into FORCE is used for laws specifically, but EFFECT is more general and natural here. INTO PRACTICE and INTO POWER do not collocate with \"come into\" in this sense."}, {"id": "b2p1_065", "sent": "She works _______ a waitress at the café on weekends to earn some extra money.", "opts": ["A: like", "B: as", "C: for", "D: in"], "a": "B", "h": "Which word describes someone working in a role or capacity? Think about: one compares things that are similar, one introduces the role or job someone performs, one refers to an employer, and one is used for a field of work."}, {"id": "b2p1_066", "sent": "I'd rather you _______ anything about our plans until we've got all the details sorted.", "opts": ["A: say", "B: said", "C: will say", "D: have said"], "a": "B", "h": "WOULD RATHER + past simple (subjunctive): I'd rather you didn't / said. After WOULD RATHER + subject, use the past tense. 'Say' (present), 'will say' (future) and 'have said' (perfect) are all incorrect here."}, {"id": "b2p1_067", "sent": "She suggested _______ a later train so that we would not have to rush through dinner.", "opts": ["A: catching", "B: catch", "C: to catch", "D: caught"], "a": "A", "h": "SUGGEST + gerund (-ing). After SUGGEST, use the -ing form. Not the infinitive, not the base form. CATCHING A LATER TRAIN = taking a later train."}, {"id": "b2p1_068", "sent": "It's no use _______ to change his mind once he has made a decision.", "opts": ["A: trying", "B: try", "C: tried", "D: tries"], "a": "A", "h": "IT'S NO USE + gerund (-ing). Fixed construction: 'it's no use/good/worth + -ing'. The infinitive, past tense and third-person forms are all incorrect here."}, {"id": "b2p1_069", "sent": "The news of the merger came as _______ a surprise that the company's share price immediately fell.", "opts": ["A: such", "B: so", "C: too", "D: very"], "a": "A", "h": "The sentence describes a result — they made a decision because of something. Which word begins the structure that introduces a surprising degree of something, followed by a noun phrase and then a result clause?"}, {"id": "b2p1_070", "sent": "He spent most of the holiday _______ on the beach and reading books.", "opts": ["A: lain", "B: lying", "C: laid", "D: lay"], "a": "B", "h": "You need a gerund after SPENT TIME. Which form of the verb LIE (be horizontal) is the gerund? Think about the difference between: the past tense, the past participle, the gerund/present participle, and a common confusion with another verb LAY."}, {"id": "b2p1_071", "sent": "By the time we arrived at the restaurant, all the tables _______ already been reserved.", "opts": ["A: were", "B: had", "C: have", "D: would"], "a": "B", "h": "BY THE TIME + past simple → past perfect in the result clause. HAD already been reserved = past perfect passive. 'Were reserved' is past simple, not the right tense for this structure. 'Have' is present perfect. 'Would' is wrong tense entirely."}, {"id": "b2p1_072", "sent": "Not only _______ the match, but they also broke the world record.", "opts": ["A: they won", "B: won they", "C: did they win", "D: they did win"], "a": "C", "h": "NOT ONLY triggers subject-auxiliary inversion: NOT ONLY + auxiliary (DID) + subject + verb. The correct form is \"Not only did they win\". The other options do not apply inversion correctly."}, {"id": "b2p1_073", "sent": "It was the first time she _______ in front of such a large audience.", "opts": ["A: performs", "B: performed", "C: had performed", "D: has performed"], "a": "C", "h": "IT WAS THE FIRST TIME + past perfect. Because the main clause is in the past (\"it WAS\"), use the past perfect for the subordinate clause. \"It IS the first time\" → present perfect. \"It WAS the first time\" → past perfect."}, {"id": "b2p1_074", "sent": "The museum is well worth _______ if you are interested in local history.", "opts": ["A: visiting", "B: visit", "C: visited", "D: visits"], "a": "A", "h": "WORTH + gerund (-ing). After WORTH, use the -ing form. Not the infinitive or past participle. \"Worth visiting\" is fixed. Compare: \"worth seeing\", \"worth trying\"."}, {"id": "b2p1_075", "sent": "I wish I _______ taken more photos during the trip — it was such a beautiful place.", "opts": ["A: had", "B: have", "C: would have", "D: could have"], "a": "A", "h": "WISH + past perfect for past regrets: \"I wish I HAD taken\". HAD is the auxiliary for the past perfect. HAVE creates present perfect (wrong tense). WOULD HAVE is not used after wish (use could have for ability). COULD HAVE refers to ability/possibility, not simple regret."}, {"id": "b2p1_076", "sent": "The journalist's account of events was _______ accurate, with only minor details proving incorrect.", "opts": ["A: largely", "B: mainly", "C: chiefly", "D: primarily"], "a": "A", "h": "Which adverb collocates most naturally with ACCURATE in formal writing? Think about: one is used with 'regarded', one with 'unaffected', one with 'speaking', and one specifically forms a collocation with accuracy in journalistic and academic English."}, {"id": "b2p1_077", "sent": "The school was forced to _______ classes after the heating system broke down.", "opts": ["A: abandon", "B: cancel", "C: suspend", "D: postpone"], "a": "C", "h": "Which verb means 'stop temporarily with the intention of resuming'? Think about: one means stop permanently for this occasion, one means move to a later time, one means give up completely, and the correct one implies a pause that is not permanent."}, {"id": "b2p1_078", "sent": "The sports centre offers a _______ of classes including yoga, pilates and aqua aerobics.", "opts": ["A: series", "B: number", "C: selection", "D: range"], "a": "D", "h": "All four nouns mean a collection of different types. Which one specifically collocates with WIDE OF to describe a breadth of different types within a category? Compare with one that implies a sequence, one that implies a quantity, and one that implies a chosen group."}, {"id": "b2p1_079", "sent": "The new regulation will _______ all businesses with more than fifty employees.", "opts": ["A: concern", "B: affect", "C: involve", "D: relate"], "a": "B", "h": "Which verb best describes what a regulation does to the businesses it covers? Think: one means be relevant to or worry, one means include as part of, one means have a connection to (with a preposition), and the correct one means have a direct practical impact on."}, {"id": "b2p1_080", "sent": "The athlete made a _______ recovery after surgery and was back training within six weeks.", "opts": ["A: remarkable", "B: considerable", "C: noticeable", "D: dramatic"], "a": "A", "h": "Which adjective collocates with RECOVERY in a medical context? Think about which one implies something impressive and surprising — beyond what was expected — rather than simply large or noticeable."}, {"id": "b2p1_081", "sent": "The company has _______ great efforts to reduce its carbon footprint over the past decade.", "opts": ["A: done", "B: made", "C: taken", "D: put"], "a": "B", "h": "MAKE EFFORTS = put energy into trying — the fixed collocation. 'Do efforts', 'take efforts' and 'put efforts' are all non-standard. You always MAKE an effort or MAKE efforts."}, {"id": "b2p1_082", "sent": "The patient made a full _______ after the operation and was discharged within a week.", "opts": ["A: cure", "B: healing", "C: recovery", "D: restoration"], "a": "C", "h": "Which noun collocates with MAKE A FULL in a medical context? Think about: one refers to a treatment, one is a process, one is a return to normal health, and one is a technical term for restoring something to its original state."}, {"id": "b2p1_083", "sent": "The documentary raised _______ questions about the impact of social media on teenagers.", "opts": ["A: important", "B: serious", "C: heavy", "D: strong"], "a": "B", "h": "RAISE SERIOUS QUESTIONS = bring up important concerns — the standard collocation. 'Raise important questions' is also natural. 'Raise heavy questions' and 'raise strong questions' are not standard. SERIOUS QUESTIONS is the more established fixed phrase in journalism and documentary-making."}, {"id": "b2p1_084", "sent": "She has a natural _______ to worry about things that haven't happened yet.", "opts": ["A: tendency", "B: habit", "C: custom", "D: manner"], "a": "A", "h": "Same distinction as an earlier question — which noun describes a natural inclination as opposed to an automatic regular habit, a cultural practice, or a way of doing things?"}, {"id": "b2p1_085", "sent": "The manager needs to _______ a close eye on costs if the project is to stay within budget.", "opts": ["A: have", "B: take", "C: keep", "D: hold"], "a": "C", "h": "Which verb begins the fixed idiom meaning 'watch something carefully over time'? Think about: one means to want or be interested in, one means to take care of, one is not standard in this context, and the correct one begins the three-word idiom."}, {"id": "b2p1_086", "sent": "It's important to _______ in mind that these figures are only estimates.", "opts": ["A: carry", "B: hold", "C: keep", "D: bear"], "a": "D", "h": "Which verb begins the fixed phrase meaning 'remember or take into account'? There is a second verb that is also used in this phrase — but which is slightly more formal and common in written English?"}, {"id": "b2p1_087", "sent": "The latest figures show a _______ increase in the number of people choosing to work from home.", "opts": ["A: sharp", "B: strong", "C: heavy", "D: deep"], "a": "A", "h": "Which adjective describes a sudden, significant rise in figures? Think about: one describes weight or severity, one describes intensity, one describes depth, and the correct one specifically implies a sudden, steep increase."}, {"id": "b2p1_088", "sent": "The shop assistant _______ my attention to the sign saying that returns had to be made within fourteen days.", "opts": ["A: brought", "B: drew", "C: called", "D: directed"], "a": "C", "h": "CALL SOMEONE'S ATTENTION TO = draw attention to — fixed phrase. 'Draw attention to' is also correct but 'drew my attention to' is slightly less natural in this context. 'Brought my attention to' is non-standard. 'Directed my attention to' is possible but formal. CALLED MY ATTENTION TO is the most natural."}, {"id": "b2p1_089", "sent": "The company was set _______ in 1985 and has grown steadily ever since.", "opts": ["A: about", "B: off", "C: out", "D: up"], "a": "D", "h": "SET UP = established or created (a company). SET ABOUT = begin doing. SET OFF = start a journey or trigger. SET OUT = begin a journey or explain. When a business is founded, it is SET UP."}, {"id": "b2p1_090", "sent": "Despite the cold weather, large _______ of people turned out to watch the parade.", "opts": ["A: amounts", "B: numbers", "C: quantities", "D: sums"], "a": "B", "h": "LARGE NUMBERS OF PEOPLE = many people — the fixed collocation. AMOUNTS OF is used with uncountable nouns. QUANTITIES OF suggests measured amounts, usually of substances. SUMS refers to money. With countable nouns like PEOPLE, you use NUMBERS."}, {"id": "b2p1_091", "sent": "The teacher asked the students to pay _______ to the instructions before starting the exercise.", "opts": ["A: mind", "B: notice", "C: attention", "D: regard"], "a": "C", "h": "PAY ATTENTION TO = listen or watch carefully — completely fixed collocation. 'Pay mind to' is dialectal. 'Pay notice to' is non-standard. 'Pay regard to' means respect or consider, not focus carefully. PAY ATTENTION TO is the only correct expression."}, {"id": "b2p1_092", "sent": "The coach gave the team a motivational talk _______ to the match to build their confidence.", "opts": ["A: prior", "B: before", "C: previous", "D: earlier"], "a": "A", "h": "PRIOR TO = before (formal register). PRIOR TO THE MATCH = before the match. PREVIOUS requires a noun as a pre-modifier (e.g. \"previous match\"). BEFORE here would need \"before the match\" (so before is possible) but PRIOR is the target C2 item tested. EARLIER is an adverb."}, {"id": "b2p1_093", "sent": "The documentary was _______ well received by both critics and general audiences.", "opts": ["A: highly", "B: deeply", "C: greatly", "D: widely"], "a": "A", "h": "Which adverb collocates with WELL RECEIVED to mean 'very positively received'? Think: one means by many people across a wide area, one intensifies certain adjectives in formal contexts, one means generally/in terms of speaking, and the correct one is the standard intensifier for 'well received'."}, {"id": "b2p1_094", "sent": "The children's curiosity was _______ by the strange sounds coming from behind the old shed.", "opts": ["A: attracted", "B: sparked", "C: aroused", "D: triggered"], "a": "C", "h": "CURIOSITY WAS AROUSED = interest was stimulated — fixed collocation. 'Curiosity was attracted' is non-standard. 'Curiosity was sparked' is natural but slightly dramatic. 'Curiosity was triggered' is possible but implies something automatic. AROUSE CURIOSITY is the most established collocation."}, {"id": "b2p1_095", "sent": "The athlete put her recent poor performances _______ to the extra pressure she had been under.", "opts": ["A: down", "B: up", "C: back", "D: across"], "a": "A", "h": "PUT SOMETHING DOWN TO = to explain something as being caused by. Fixed phrasal verb: \"put down to\". PUT UP TO, BACK TO and ACROSS TO do not collocate in this meaning."}, {"id": "b2p1_096", "sent": "The two companies have a great deal _______ common, including their approach to customer service.", "opts": ["A: of", "B: in", "C: with", "D: between"], "a": "B", "h": "Which preposition completes the fixed phrase meaning 'shared between two things'? Think about what follows 'a great deal' and 'have something' in this specific phrase about sharing characteristics."}, {"id": "b2p1_097", "sent": "The city council has decided to go _______ with its controversial plans to pedestrianise the high street.", "opts": ["A: on", "B: forward", "C: ahead", "D: through"], "a": "C", "h": "GO AHEAD WITH = proceed with a plan despite opposition or doubt. 'Go on with' means to continue. 'Go forward with' is non-standard. 'Go through with' = follow through on something difficult or unpleasant. GO AHEAD WITH is the standard phrasal verb for proceeding with plans."}, {"id": "b2p1_098", "sent": "She found it very difficult to _______ up with the rest of the class during the advanced course.", "opts": ["A: catch", "B: keep", "C: hold", "D: stay"], "a": "B", "h": "Which verb begins the phrasal verb meaning 'maintain the same pace as someone or something'? Think: one means reach the same level after falling behind, the correct one means not fall behind, and the others are not standard in this context."}, {"id": "b2p1_099", "sent": "The plan sounds good in theory, but it may be difficult to put it into _______ given the current budget.", "opts": ["A: action", "B: use", "C: effect", "D: practice"], "a": "D", "h": "PUT INTO PRACTICE = actually do something that was planned — fixed phrase. 'PUT INTO ACTION' is also possible but less natural. 'PUT INTO USE' is non-standard. 'PUT INTO EFFECT' means to make something active/operative (laws, plans) and is also possible, but 'PUT INTO PRACTICE' is the most common expression for implementing an idea."}, {"id": "b2p1_100", "sent": "The new exhibition has been drawing _______ crowds since it opened last month.", "opts": ["A: large", "B: heavy", "C: great", "D: huge"], "a": "A", "h": "DRAW LARGE CROWDS = attract many visitors — the most natural collocation. 'Draw heavy crowds' is non-standard. 'Draw great crowds' is slightly archaic. 'Draw huge crowds' is possible but LARGE CROWDS is the most established fixed phrase with 'draw'."}];
const P2 = [{"id": "b2p2_001", "sent": "She is very good _______ languages and picked up Spanish in just a few months.", "a": "at", "h": "GOOD AT = skilled in. The fixed preposition after GOOD when describing ability is AT."}, {"id": "b2p2_002", "sent": "The museum is famous _______ its collection of ancient Egyptian artefacts.", "a": "for", "h": "FAMOUS FOR = known because of. The fixed preposition after FAMOUS is FOR."}, {"id": "b2p2_003", "sent": "He is very interested _______ astronomy and spends every clear night watching the stars.", "a": "in", "h": "INTERESTED IN = wanting to know about. The fixed preposition after INTERESTED is IN."}, {"id": "b2p2_004", "sent": "The concert was cancelled _______ the bad weather, and no refunds were offered.", "a": "because", "h": "Think about what connects a result (the cancellation) to a cause (the weather). Which single word introduces a reason clause directly before a subject and verb?"}, {"id": "b2p2_005", "sent": "She apologised _______ being so late and explained that the train had been delayed.", "a": "for", "h": "APOLOGISE FOR + gerund = the fixed pattern. You apologise FOR doing something."}, {"id": "b2p2_006", "sent": "The report was based _______ data collected from over five thousand households.", "a": "on", "h": "BASED ON = founded on as evidence. The fixed preposition after BASED is ON."}, {"id": "b2p2_007", "sent": "He insisted _______ paying for the meal, even though we all offered to split the bill.", "a": "on", "h": "INSIST ON + gerund = the fixed pattern. You insist ON doing something."}, {"id": "b2p2_008", "sent": "The package must arrive _______ time for the birthday party next Saturday.", "a": "in", "h": "IN TIME = early enough. Compare: 'on time' = at the right time. IN TIME FOR means with enough time to spare before an event."}, {"id": "b2p2_009", "sent": "She found the work very challenging _______ first but gradually got used to it.", "a": "at", "h": "AT FIRST = in the beginning — fixed phrase. The preposition is AT, not 'in' or 'from'."}, {"id": "b2p2_010", "sent": "The train leaves _______ 8.45 and arrives at the capital just before noon.", "a": "at", "h": "AT + specific time = the standard preposition for clock times. You always arrive AT a time."}, {"id": "b2p2_011", "sent": "She was very proud _______ her son's achievements at the national competition.", "a": "of", "h": "PROUD OF = feeling pride about. The fixed preposition after PROUD is OF."}, {"id": "b2p2_012", "sent": "The new park will be open _______ the public from next spring.", "a": "to", "h": "OPEN TO THE PUBLIC = accessible by everyone. The fixed preposition is TO."}, {"id": "b2p2_013", "sent": "They arrived _______ the airport two hours before the flight was due to depart.", "a": "at", "h": "ARRIVE AT = the preposition used with specific locations like airports, stations, schools. ARRIVE IN is used for towns and countries."}, {"id": "b2p2_014", "sent": "The shop assistant was very helpful and went _______ of her way to find what I needed.", "a": "out", "h": "GO OUT OF ONE'S WAY = make a special effort. Fixed idiom — the particle is OUT."}, {"id": "b2p2_015", "sent": "He succeeded _______ passing the exam despite having very little time to prepare.", "a": "in", "h": "SUCCEED IN + gerund = the fixed pattern. You succeed IN doing something, not 'to do'."}, {"id": "b2p2_016", "sent": "The hotel _______ we stayed last summer has recently been completely refurbished.", "a": "where", "h": "WHERE = relative adverb for places. 'Which we stayed' would need 'at which we stayed'. WHERE replaces 'at which' in informal relative clauses."}, {"id": "b2p2_017", "sent": "The woman _______ bag was stolen reported the incident to the police immediately.", "a": "whose", "h": "WHOSE = possessive relative pronoun. The bag belongs to the woman — so the possessive relative WHOSE is needed."}, {"id": "b2p2_018", "sent": "The film _______ she recommended turned out to be one of the best I have ever seen.", "a": "that", "h": "You need a relative pronoun for a defining relative clause about a thing. In everyday English this word is much more common than 'which' in defining clauses."}, {"id": "b2p2_019", "sent": "I'll lend you the book _______ you promise to return it by Friday.", "a": "if", "h": "What single word introduces a condition — a requirement that must be met for the main clause to happen?"}, {"id": "b2p2_020", "sent": "_______ she finally arrived at the station, she had already missed the last train home.", "a": "when", "h": "What time conjunction introduces the moment at which the second action had already happened? Think about which single word links two events in sequence."}, {"id": "b2p2_021", "sent": "The town is so small _______ everyone knows everyone else by name.", "a": "that", "h": "SO + adjective + THAT = result clause structure. The fixed pattern is SO small THAT."}, {"id": "b2p2_022", "sent": "_______ it was raining heavily, the match went ahead as planned without any delay.", "a": "although", "h": "What single concession word introduces a clause that contrasts with the main clause — meaning 'in spite of the fact that'?"}, {"id": "b2p2_023", "sent": "The presenter explained _______ the new system would work and answered questions from the audience.", "a": "how", "h": "EXPLAIN HOW = explain the way in which something works. The question word HOW introduces the indirect question clause."}, {"id": "b2p2_024", "sent": "Can you tell me _______ the next train to Manchester is due to depart?", "a": "when", "h": "What question word introduces an indirect question about the time of an event? Think about what would replace 'at what time' in reported speech."}, {"id": "b2p2_025", "sent": "The report examines _______ young people are spending more time online than previous generations.", "a": "whether", "h": "What word introduces an indirect yes/no question — equivalent to 'if' in reported speech but used more formally in writing?"}, {"id": "b2p2_026", "sent": "She plays _______ violin in the school orchestra and also takes piano lessons.", "a": "the", "h": "PLAY THE + instrument = the fixed pattern. You always play THE violin, THE piano, THE guitar (unlike sports, which take no article)."}, {"id": "b2p2_027", "sent": "It was _______ most beautiful sunset I had ever seen in all my years of travelling.", "a": "the", "h": "THE MOST = superlative structure. THE is required before most in a superlative."}, {"id": "b2p2_028", "sent": "She has been working as _______ architect for over fifteen years.", "a": "an", "h": "AN + vowel sound = the indefinite article before a job title beginning with a vowel. 'An architect' — the A sound requires AN."}, {"id": "b2p2_029", "sent": "He is _______ only person in the office who doesn't drink coffee.", "a": "the", "h": "THE ONLY = when referring to a unique member of a group, THE is required."}, {"id": "b2p2_030", "sent": "They spent _______ week at the coast and came back looking very relaxed.", "a": "a", "h": "A WEEK = an indefinite period of one week. Not 'the week' (which would refer to a specific known week)."}, {"id": "b2p2_031", "sent": "By the time the ambulance arrived, the patient _______ already regained consciousness.", "a": "had", "h": "PAST PERFECT = had + past participle. BY THE TIME + past simple signals the need for past perfect in the result clause."}, {"id": "b2p2_032", "sent": "If she _______ studied harder, she might have passed the exam.", "a": "had", "h": "THIRD CONDITIONAL = if + past perfect. IF SHE HAD studied = the structure for an unreal past condition."}, {"id": "b2p2_033", "sent": "He _______ have been really tired after the race — he'd been training for months.", "a": "must", "h": "MUST HAVE + past participle = logical deduction about the past. We are almost certain he was tired."}, {"id": "b2p2_034", "sent": "You _______ have called to let me know you were going to be late — I waited for an hour.", "a": "should", "h": "Which modal expresses that something was the right thing to do, but was not done? Think about mild criticism of a past action."}, {"id": "b2p2_035", "sent": "The match _______ have been cancelled if the storm hadn't passed.", "a": "would", "h": "WOULD HAVE + past participle = the result clause in a third conditional. Describes an unreal past result."}, {"id": "b2p2_036", "sent": "She _______ been living in Madrid for five years before she got the job in Rome.", "a": "had", "h": "PAST PERFECT CONTINUOUS = had + been + gerund. Used for an action that continued up to a point in the past."}, {"id": "b2p2_037", "sent": "You _______ need to book in advance — the restaurant always has tables available.", "a": "don't", "h": "Which auxiliary makes 'need to' negative in a general present statement meaning 'it is not necessary'?"}, {"id": "b2p2_038", "sent": "_______ you mind helping me move this table? It's too heavy to lift on my own.", "a": "would", "h": "Which modal begins a polite request meaning 'Is it all right if...'? Think about which sounds more polite than the alternative."}, {"id": "b2p2_039", "sent": "She _______ rather have stayed at home than go to the party on such a cold evening.", "a": "would", "h": "WOULD RATHER = expresses a preference. The full form is WOULD RATHER + bare infinitive."}, {"id": "b2p2_040", "sent": "The lights in the office are still on — someone _______ have forgotten to turn them off.", "a": "must", "h": "Which modal expresses a logical deduction — you are almost certain something is true based on the evidence?"}, {"id": "b2p2_041", "sent": "She works very hard. _______ addition, she volunteers at the local food bank at weekends.", "a": "in", "h": "IN ADDITION = furthermore — fixed discourse marker. The full phrase is IN ADDITION or IN ADDITION TO. The preposition is IN."}, {"id": "b2p2_042", "sent": "He studied medicine for six years. _______ the end, he decided to become a teacher instead.", "a": "in", "h": "IN THE END = after everything / finally — fixed phrase. Contrast with 'at the end' (of something specific). IN THE END describes a final outcome."}, {"id": "b2p2_043", "sent": "The new policy will affect all employees regardless _______ how long they have been with the company.", "a": "of", "h": "REGARDLESS OF = without considering. The fixed preposition after REGARDLESS is OF."}, {"id": "b2p2_044", "sent": "He learned to drive _______ the age of seventeen and passed his test first time.", "a": "at", "h": "AT THE AGE OF = when someone was a particular age. The preposition for ages is AT."}, {"id": "b2p2_045", "sent": "The book became a bestseller almost _______ once, selling over a million copies in its first week.", "a": "at", "h": "AT ONCE = immediately / at the same time. Fixed phrase — the preposition is AT."}, {"id": "b2p2_046", "sent": "The building has been _______ construction for nearly three years now.", "a": "under", "h": "UNDER CONSTRUCTION = being built — fixed phrase. The preposition is UNDER, not 'in' or 'at'."}, {"id": "b2p2_047", "sent": "He was _______ such a good mood that morning that he bought coffee for the entire team.", "a": "in", "h": "IN A GOOD MOOD = feeling positive — fixed phrase. The preposition is IN."}, {"id": "b2p2_048", "sent": "The meeting was called _______ short notice and not all team members were able to attend.", "a": "at", "h": "AT SHORT NOTICE = with little warning — fixed phrase. The preposition is AT."}, {"id": "b2p2_049", "sent": "The new system will come _______ effect from the first of January.", "a": "into", "h": "COME INTO EFFECT = become active/operative. Fixed phrase — the particle is INTO."}, {"id": "b2p2_050", "sent": "She spoke _______ behalf of the entire team when she thanked the organisers.", "a": "on", "h": "ON BEHALF OF = representing. Fixed phrase — the preposition is ON."}, {"id": "b2p2_051", "sent": "The research was carried _______ by a team of scientists at the university.", "a": "out", "h": "CARRY OUT = perform or conduct. The fixed particle in this phrasal verb is OUT."}, {"id": "b2p2_052", "sent": "She was _______ charge of organising the event and did an excellent job.", "a": "in", "h": "IN CHARGE OF = responsible for. Fixed phrase — the preposition is IN."}, {"id": "b2p2_053", "sent": "The concert is free of _______ — you just need to register online in advance.", "a": "charge", "h": "FREE OF CHARGE = at no cost — fixed phrase. The noun is CHARGE."}, {"id": "b2p2_054", "sent": "I look forward _______ hearing from you and hope we can arrange a meeting soon.", "a": "to", "h": "LOOK FORWARD TO + gerund = the fixed pattern. TO here is a preposition, not an infinitive marker — so the gerund follows."}, {"id": "b2p2_055", "sent": "She is very much in _______ of making changes to the current system.", "a": "favour", "h": "IN FAVOUR OF = supporting. Fixed phrase — the noun is FAVOUR (British spelling)."}, {"id": "b2p2_056", "sent": "The exam results arrived this morning and _______ of the students in the class had passed.", "a": "all", "h": "Which determiner means 'every one of a group' when referring to the whole group together? It is followed by 'of the students'."}, {"id": "b2p2_057", "sent": "She has lived in three different countries but _______ of them felt like home.", "a": "none", "h": "NONE OF THEM = not one of them. When all options are negative, NONE is the correct pronoun."}, {"id": "b2p2_058", "sent": "He finished his meal quickly and asked for _______ helping.", "a": "another", "h": "ANOTHER = one more. 'Another' is used for an additional, unspecified single item."}, {"id": "b2p2_059", "sent": "The twins look very similar but _______ of them has a completely different personality.", "a": "each", "h": "EACH OF THEM = every one individually, emphasising the separate nature of the two. Used to highlight that two people are different from each other."}, {"id": "b2p2_060", "sent": "She has two sisters. _______ of them is a doctor and the other is a lawyer.", "a": "one", "h": "ONE OF THEM... THE OTHER = the fixed pattern for describing two items from a group of two."}, {"id": "b2p2_061", "sent": "She moved to the city _______ the age of twenty and has lived there ever since.", "a": "at", "h": "AT THE AGE OF = when she was twenty. The preposition for ages is AT."}, {"id": "b2p2_062", "sent": "The results won't be announced _______ the end of the month at the earliest.", "a": "until", "h": "Which preposition/conjunction means 'up to the point of' and introduces the latest possible time before something happens?"}, {"id": "b2p2_063", "sent": "He has been studying Japanese _______ three years and is now almost fluent.", "a": "for", "h": "FOR + period of time = how long something has been happening. Compare SINCE + point in time."}, {"id": "b2p2_064", "sent": "She hasn't spoken to her sister _______ they had an argument at Christmas.", "a": "since", "h": "SINCE + point in time = from that moment until now. Compare FOR + duration."}, {"id": "b2p2_065", "sent": "The project was completed well _______ schedule, finishing three weeks before the deadline.", "a": "ahead", "h": "Which adverb completes the fixed phrase meaning 'earlier than planned'? It is always followed by the word 'of'."}, {"id": "b2p2_066", "sent": "We had barely sat down _______ the phone rang for the third time.", "a": "when", "h": "HARDLY/BARELY + past perfect + WHEN = the fixed correlative structure. WHEN is the correct conjunction after barely/hardly (not 'than')."}, {"id": "b2p2_067", "sent": "She had no sooner arrived home _______ it started to rain heavily.", "a": "than", "h": "NO SOONER + past perfect + THAN = the fixed correlative structure. THAN is always used after 'no sooner' (not 'when')."}, {"id": "b2p2_068", "sent": "It was _______ first time she had ever performed in front of such a large audience.", "a": "the", "h": "THE FIRST TIME = the specific, unique first occasion. THE is required as a definite article."}, {"id": "b2p2_069", "sent": "He arrived _______ the meeting just as it was coming to an end.", "a": "at", "h": "ARRIVE AT = the preposition for specific locations and events. You arrive AT a meeting, a station, a concert."}, {"id": "b2p2_070", "sent": "They waited for _______ than an hour before the doctor could see them.", "a": "more", "h": "MORE THAN = exceeding a quantity. The structure is MORE THAN + number/amount."}, {"id": "b2p2_071", "sent": "The hotel room was small. _______, the view from the window was absolutely stunning.", "a": "however", "h": "Which single discourse marker introduces a contrasting point that follows a negative or limiting statement? It is more common than its synonym 'nevertheless'."}, {"id": "b2p2_072", "sent": "The restaurant was fully booked. _______ a result, we had to find somewhere else to eat.", "a": "as", "h": "AS A RESULT = consequently — fixed phrase. The phrase begins with AS. 'As a result' introduces a consequence."}, {"id": "b2p2_073", "sent": "The new regulations are generally fair. _______, some small businesses may struggle to comply.", "a": "however", "h": "Which discourse marker introduces a concession or contrasting point after a positive statement? It usually comes at the start of the second sentence followed by a comma."}, {"id": "b2p2_074", "sent": "She works long hours. _______ this, she still finds time to exercise every day.", "a": "despite", "h": "Which single preposition means 'in spite of' and can be followed directly by a noun or pronoun?"}, {"id": "b2p2_075", "sent": "The train was running late. _______ the less, we managed to arrive on time.", "a": "none", "h": "NONE THE LESS = nevertheless — fixed discourse marker. NONETHELESS is the single-word alternative."}, {"id": "b2p2_076", "sent": "The children were looking forward _______ the school trip for weeks.", "a": "to", "h": "LOOK FORWARD TO = anticipate with pleasure. TO is a preposition here, not part of an infinitive — the gerund follows."}, {"id": "b2p2_077", "sent": "Could you fill _______ this form with your personal details and hand it in at the desk?", "a": "in", "h": "Which particle completes the phrasal verb meaning 'complete a form with information'? British English uses one specific particle here."}, {"id": "b2p2_078", "sent": "She turned _______ the job offer because the salary was lower than she had expected.", "a": "down", "h": "TURN DOWN = reject. The particle DOWN is essential to this phrasal verb meaning."}, {"id": "b2p2_079", "sent": "The fire alarm went _______ while we were in the middle of our meeting.", "a": "off", "h": "GO OFF = trigger/sound suddenly (for alarms). The particle OFF is essential to this meaning."}, {"id": "b2p2_080", "sent": "He handed _______ his resignation letter first thing on Monday morning.", "a": "in", "h": "HAND IN = submit formally. The particle IN indicates formal submission of a document."}, {"id": "b2p2_081", "sent": "Could you look _______ the children for an hour while I go to the shops?", "a": "after", "h": "LOOK AFTER = take care of. The particle AFTER is essential to this phrasal verb meaning."}, {"id": "b2p2_082", "sent": "The noise from the neighbours kept her _______ most of the night.", "a": "up", "h": "KEEP UP = prevent from sleeping. The particle UP creates this specific meaning in informal English."}, {"id": "b2p2_083", "sent": "They had to call _______ the match because the pitch was waterlogged.", "a": "off", "h": "CALL OFF = cancel. The particle OFF is essential to this meaning."}, {"id": "b2p2_084", "sent": "She grew _______ in a small village and only moved to the city when she started university.", "a": "up", "h": "GROW UP = become an adult or spend one's childhood. The particle UP is essential."}, {"id": "b2p2_085", "sent": "He couldn't work _______ why his computer wasn't connecting to the internet.", "a": "out", "h": "WORK OUT = figure out / understand. The particle OUT creates this meaning."}, {"id": "b2p2_086", "sent": "The more she practised, _______ more confident she became.", "a": "the", "h": "THE MORE... THE MORE = parallel comparative structure. Both clauses begin with THE."}, {"id": "b2p2_087", "sent": "She is not _______ good at cooking as her sister, but she is improving.", "a": "as", "h": "NOT AS... AS = negative comparison of equality. The structure is NOT AS + adjective + AS."}, {"id": "b2p2_088", "sent": "The book was _______ more interesting than the film adaptation, which felt quite flat.", "a": "far", "h": "Which single word intensifies a comparative adjective to show a large difference? It suggests the gap between the two is significant."}, {"id": "b2p2_089", "sent": "He earns twice _______ much as his brother, despite having the same qualifications.", "a": "as", "h": "TWICE AS MUCH AS = comparative of multiplication. The structure is TWICE AS + adjective/adverb + AS."}, {"id": "b2p2_090", "sent": "The sooner we leave, _______ better chance we'll have of getting good seats.", "a": "the", "h": "THE SOONER... THE BETTER = parallel comparative. Both clauses use THE with a comparative adjective."}, {"id": "b2p2_091", "sent": "The building is thought _______ have been constructed in the early eighteenth century.", "a": "to", "h": "IS THOUGHT TO + infinitive = passive reporting structure. After thought/believed/said + passive, use TO + infinitive."}, {"id": "b2p2_092", "sent": "The new drug is said _______ be highly effective in treating the condition.", "a": "to", "h": "IS SAID TO + infinitive = passive reporting verb. The structure is be + past participle + TO + infinitive."}, {"id": "b2p2_093", "sent": "She was offered the position _______ she had less experience than the other candidates.", "a": "although", "h": "Which single concession conjunction introduces a clause showing something surprising happened in spite of an obstacle?"}, {"id": "b2p2_094", "sent": "The package is expected to arrive _______ the end of the week.", "a": "by", "h": "BY THE END OF = no later than. BY introduces a deadline."}, {"id": "b2p2_095", "sent": "The decision was made _______ the best possible intentions.", "a": "with", "h": "WITH INTENTIONS = having those intentions — the preposition WITH accompanies manner or circumstance nouns."}, {"id": "b2p2_096", "sent": "She had such a lot _______ work to do that she had to stay late at the office.", "a": "of", "h": "A LOT OF = a large amount. The fixed structure is A LOT OF + uncountable/countable noun."}, {"id": "b2p2_097", "sent": "They found _______ very difficult to concentrate because of the noise outside.", "a": "it", "h": "FIND IT + adjective + to-infinitive = fixed structure with dummy subject IT. 'Found very difficult to concentrate' needs IT as a placeholder object."}, {"id": "b2p2_098", "sent": "The match was about _______ begin when the rain started.", "a": "to", "h": "ABOUT TO + infinitive = on the point of doing. The fixed structure is BE ABOUT TO + bare infinitive."}, {"id": "b2p2_099", "sent": "_______ far as I know, the meeting has not been rescheduled.", "a": "as", "h": "AS FAR AS I KNOW = based on my current knowledge — fixed phrase. The phrase begins with AS."}, {"id": "b2p2_100", "sent": "She took the job _______ spite of the long commute involved.", "a": "in", "h": "IN SPITE OF = despite — fixed prepositional phrase. The preposition is IN, not 'at' or 'with'."}];
