const P3 = [{"id": "b2p3_001", "sent": "The [IMPROVE] in air quality since the new regulations were introduced has been remarkable.", "root": "IMPROVE", "a": "improvement", "h": "You need a NOUN. The suffix -MENT is added to the verb. No spelling change."}, {"id": "b2p3_002", "sent": "Her [ACHIEVE] in completing the marathon at the age of sixty impressed everyone.", "root": "ACHIEVE", "a": "achievement", "h": "You need a NOUN. Add -MENT to the verb. No spelling change required."}, {"id": "b2p3_003", "sent": "The [DEVELOP] of a new vaccine has given hope to millions of patients worldwide.", "root": "DEVELOP", "a": "development", "h": "You need a NOUN. Add -MENT to the verb. No spelling change."}, {"id": "b2p3_004", "sent": "After much [DISCUSS], the committee finally agreed on a course of action.", "root": "DISCUSS", "a": "discussion", "h": "You need a NOUN. The suffix -ION is added. Note the spelling: DISCUSS + ION."}, {"id": "b2p3_005", "sent": "She showed great [DETERMINE] in completing the course despite several setbacks.", "root": "DETERMINE", "a": "determination", "h": "You need a NOUN. The suffix -ATION is added, and the final E of the verb is dropped."}, {"id": "b2p3_006", "sent": "The [COLLECT] of ancient maps on display at the museum is quite extraordinary.", "root": "COLLECT", "a": "collection", "h": "You need a NOUN. Add -ION to the verb. No spelling change needed."}, {"id": "b2p3_007", "sent": "Finding the right [SOLVE] to the problem took the engineers several weeks.", "root": "SOLVE", "a": "solution", "h": "You need a NOUN. The derivation is irregular — SOLVE becomes SOLUT- before -ION is added."}, {"id": "b2p3_008", "sent": "The [ARRIVE] of the new director was greeted with considerable excitement by staff.", "root": "ARRIVE", "a": "arrival", "h": "You need a NOUN. The suffix is -AL, not -ATION. The final E is dropped before -AL is added."}, {"id": "b2p3_009", "sent": "The [GROW] in online shopping has had a significant impact on the high street.", "root": "GROW", "a": "growth", "h": "You need a NOUN. This is irregular — GROW does not simply add a suffix. Think of the related noun form."}, {"id": "b2p3_010", "sent": "Her quick [REACT] to the emergency prevented what could have been a serious accident.", "root": "REACT", "a": "reaction", "h": "You need a NOUN. Add -ION to the verb. No spelling change required."}, {"id": "b2p3_011", "sent": "The [PERFORM] of the orchestra was described as one of the finest in living memory.", "root": "PERFORM", "a": "performance", "h": "You need a NOUN. The suffix -ANCE is added. No spelling change."}, {"id": "b2p3_012", "sent": "The charity relies on the [DONATE] of the public to fund its work around the world.", "root": "DONATE", "a": "donation", "h": "You need a NOUN. The suffix -ION is added; the final E is dropped."}, {"id": "b2p3_013", "sent": "The police are conducting a [INVESTIGATE] into the disappearance of the paintings.", "root": "INVESTIGATE", "a": "investigation", "h": "You need a NOUN. The suffix -ION is added; the final E is dropped."}, {"id": "b2p3_014", "sent": "The [INTRODUCE] of the new software caused some confusion among older members of staff.", "root": "INTRODUCE", "a": "introduction", "h": "You need a NOUN. The suffix is -ION but the spelling of the root changes: INTRODUC- + TION."}, {"id": "b2p3_015", "sent": "Her natural [COMMUNICATE] skills made her ideal for the role of team spokesperson.", "root": "COMMUNICATE", "a": "communication", "h": "You need a NOUN. COMMUNICATE + -ION, dropping the final E."}, {"id": "b2p3_016", "sent": "She showed great [PATIENT] in teaching the children, never raising her voice.", "root": "PATIENT", "a": "patience", "h": "You need a NOUN. The adjective and noun forms of this word look and sound similar, but the ending changes. Think about which suffix converts adjectives like 'patient', 'silent', 'different' into nouns."}, {"id": "b2p3_017", "sent": "There is growing [AWARE] of the environmental impact of single-use plastics.", "root": "AWARE", "a": "awareness", "h": "You need a NOUN. AWARE + -NESS. No spelling change."}, {"id": "b2p3_018", "sent": "The [DARK] of the cave made it impossible to see more than a metre ahead.", "root": "DARK", "a": "darkness", "h": "You need a NOUN. DARK + -NESS. Straightforward suffix addition."}, {"id": "b2p3_019", "sent": "She spoke with great [CONFIDENT] at the interview, which clearly impressed the panel.", "root": "CONFIDENT", "a": "confidence", "h": "You need a NOUN. The adjective ends in -ENT. Think about which suffix converts adjectives ending in -ENT into nouns. Note that the final consonant changes."}, {"id": "b2p3_020", "sent": "The [POPULAR] of streaming services has transformed the way people watch television.", "root": "POPULAR", "a": "popularity", "h": "You need a NOUN. POPULAR + -ITY. No spelling change."}, {"id": "b2p3_021", "sent": "The [CURIOUS] that children show towards the world around them is remarkable.", "root": "CURIOUS", "a": "curiosity", "h": "You need a NOUN. The adjective ends in -OUS. When adjectives end in -OUS, the noun form uses a completely different suffix. Think about the pattern: generous/generosity, famous/fame, curious/___."}, {"id": "b2p3_022", "sent": "There was real [GENEROUS] in the way she shared her success with the rest of the team.", "root": "GENEROUS", "a": "generosity", "h": "You need a NOUN. The adjective ends in -OUS. Same pattern as CURIOUS — the -OUS ending changes when forming the noun. What suffix replaces it?"}, {"id": "b2p3_023", "sent": "The [SAFE] of the passengers is always the airline's highest priority.", "root": "SAFE", "a": "safety", "h": "You need a NOUN. SAFE + -TY. There is a minor spelling change — the E is retained."}, {"id": "b2p3_024", "sent": "The [DIFFICULT] of the exam surprised many students who had prepared thoroughly.", "root": "DIFFICULT", "a": "difficulty", "h": "You need a NOUN. DIFFICULT + -Y. The final -T is retained and -Y is added."}, {"id": "b2p3_025", "sent": "They showed great [FLEXIBLE] in adapting to the sudden change in plans.", "root": "FLEXIBLE", "a": "flexibility", "h": "You need a NOUN. The adjective ends in -BLE. There is a regular pattern for converting adjectives ending in -BLE into nouns. Think about: possible/possibility, flexible/___, capable/capability."}, {"id": "b2p3_026", "sent": "The new town hall is a truly [IMPRESS] building that has attracted visitors from across the region.", "root": "IMPRESS", "a": "impressive", "h": "You need an ADJECTIVE. IMPRESS + -IVE. No spelling change."}, {"id": "b2p3_027", "sent": "She had an [EXPERIENCE] team around her, which gave her confidence going into the project.", "root": "EXPERIENCE", "a": "experienced", "h": "You need an ADJECTIVE. The root is a NOUN describing a quality gained over time. Think about which suffix turns a noun into an adjective meaning 'having that quality'. The suffix is just one letter."}, {"id": "b2p3_028", "sent": "The instructions were so [CONFUSE] that most people gave up after the first page.", "root": "CONFUSE", "a": "confusing", "h": "You need an ADJECTIVE meaning 'causing confusion'. When a verb causes an effect or feeling in someone, which suffix creates the adjective that describes that effect? Think about the difference between the person feeling it and the thing causing it."}, {"id": "b2p3_029", "sent": "The results of the experiment were quite [SURPRISE] and led to a rethink of the entire theory.", "root": "SURPRISE", "a": "surprising", "h": "You need an ADJECTIVE. Same pattern as the previous one — which suffix describes something that causes a reaction, rather than the person experiencing it?"}, {"id": "b2p3_030", "sent": "She gave a very [POWER] speech that clearly moved many people in the audience.", "root": "POWER", "a": "powerful", "h": "You need an ADJECTIVE. POWER + -FUL. No spelling change."}, {"id": "b2p3_031", "sent": "The new management team came up with some very [CREATE] solutions to the problems.", "root": "CREATE", "a": "creative", "h": "You need an ADJECTIVE. The root is a verb. Think about which suffix converts verbs like 'act', 'create', 'attract' into adjectives meaning 'having the quality of that action'."}, {"id": "b2p3_032", "sent": "The hotel staff were extremely [HELP] and made our stay very comfortable.", "root": "HELP", "a": "helpful", "h": "You need an ADJECTIVE. HELP + -FUL. No spelling change."}, {"id": "b2p3_033", "sent": "It was a very [EXHAUST] day and we were both glad to get home and rest.", "root": "EXHAUST", "a": "exhausting", "h": "You need an ADJECTIVE meaning 'causing tiredness'. Same -ING/-ED pattern as 'confusing/confused' — which form describes the thing causing the feeling rather than the person experiencing it?"}, {"id": "b2p3_034", "sent": "The company has a very [ATTRACT] benefits package, including flexible working hours.", "root": "ATTRACT", "a": "attractive", "h": "You need an ADJECTIVE. ATTRACT + -IVE. No spelling change."}, {"id": "b2p3_035", "sent": "Learning a new language can be very [REWARD] even though it takes considerable effort.", "root": "REWARD", "a": "rewarding", "h": "You need an ADJECTIVE meaning 'giving a feeling of satisfaction'. REWARD + -ING."}, {"id": "b2p3_036", "sent": "The instructions were completely [CLEAR] and nobody in the room knew what to do.", "root": "CLEAR", "a": "unclear", "h": "You need an ADJECTIVE meaning 'not clear'. The prefix UN- is added to reverse the meaning."}, {"id": "b2p3_037", "sent": "It was very [POLITE] of him to leave without saying goodbye to the host.", "root": "POLITE", "a": "impolite", "h": "You need an ADJECTIVE meaning 'rude'. The prefix IM- is used before words beginning with P. Not UN-."}, {"id": "b2p3_038", "sent": "The decision to close the library was deeply [POPULAR] with local residents.", "root": "POPULAR", "a": "unpopular", "h": "You need an ADJECTIVE meaning 'not liked by people'. The prefix UN- reverses the meaning."}, {"id": "b2p3_039", "sent": "The information in the report turned out to be completely [ACCURATE].", "root": "ACCURATE", "a": "inaccurate", "h": "You need an ADJECTIVE meaning 'not correct'. The prefix IN- is used. Not UN-."}, {"id": "b2p3_040", "sent": "She felt [COMFORT] in large social gatherings and preferred to spend time alone.", "root": "COMFORT", "a": "uncomfortable", "h": "You need an ADJECTIVE meaning 'not at ease'. The prefix UN- is added before -COMFORTABLE."}, {"id": "b2p3_041", "sent": "It is [RESPONSIBLE] to leave young children alone in the house for long periods.", "root": "RESPONSIBLE", "a": "irresponsible", "h": "You need an ADJECTIVE meaning 'not behaving sensibly'. The prefix IR- is used before words beginning with R."}, {"id": "b2p3_042", "sent": "The homework was so [TIDY] that the teacher asked the student to redo it.", "root": "TIDY", "a": "untidy", "h": "You need an ADJECTIVE meaning 'messy'. The prefix UN- reverses the meaning."}, {"id": "b2p3_043", "sent": "It is completely [LEGAL] to park on double yellow lines during the day.", "root": "LEGAL", "a": "illegal", "h": "You need an ADJECTIVE meaning 'not allowed by law'. The prefix IL- is used before words beginning with L."}, {"id": "b2p3_044", "sent": "Her spelling was quite [CONSISTENT], with the same word spelled differently on different pages.", "root": "CONSISTENT", "a": "inconsistent", "h": "You need an ADJECTIVE meaning 'not regular or reliable'. The prefix IN- is used."}, {"id": "b2p3_045", "sent": "He was [PATIENT] with the slow progress and kept asking when they would finish.", "root": "PATIENT", "a": "impatient", "h": "You need an ADJECTIVE meaning 'not willing to wait'. The prefix IM- is used before words beginning with P."}, {"id": "b2p3_046", "sent": "She [COMPLETE] forgot about the meeting and only remembered when she got a reminder.", "root": "COMPLETE", "a": "completely", "h": "You need an ADVERB. COMPLETE + -LY. The final E is kept before -LY."}, {"id": "b2p3_047", "sent": "The results were [SURPRISE] good, far exceeding what the researchers had expected.", "root": "SURPRISE", "a": "surprisingly", "h": "You need an ADVERB. The root is an adjective. To make the adverb, you must first form the -ING adjective from the verb, then add the adverb suffix. Two steps."}, {"id": "b2p3_048", "sent": "She was [EXTREME] talented and had won several national competitions before the age of fifteen.", "root": "EXTREME", "a": "extremely", "h": "You need an ADVERB. EXTREME + -LY. No spelling change."}, {"id": "b2p3_049", "sent": "The instructions were [CLEAR] written and easy for everyone to follow.", "root": "CLEAR", "a": "clearly", "h": "You need an ADVERB. CLEAR + -LY. No spelling change."}, {"id": "b2p3_050", "sent": "He spoke [CONFIDENT] at the interview, which clearly made a good impression on the panel.", "root": "CONFIDENT", "a": "confidently", "h": "You need an ADVERB. CONFIDENT + -LY. No spelling change."}, {"id": "b2p3_051", "sent": "The new building fits [PERFECT] into the surrounding landscape.", "root": "PERFECT", "a": "perfectly", "h": "You need an ADVERB. PERFECT + -LY. No spelling change."}, {"id": "b2p3_052", "sent": "She answered all the questions [HONEST] and admitted that she didn't know everything.", "root": "HONEST", "a": "honestly", "h": "You need an ADVERB. HONEST + -LY. No spelling change."}, {"id": "b2p3_053", "sent": "The team played [INCREDIBLE] well and deserved to win the championship.", "root": "INCREDIBLE", "a": "incredibly", "h": "You need an ADVERB. INCREDIBLE + -LY. The final E is kept; just add -LY."}, {"id": "b2p3_054", "sent": "The exam was [REMARKABLE] easy considering how much material it covered.", "root": "REMARKABLE", "a": "remarkably", "h": "You need an ADVERB. Adding -LY to adjectives ending in -BLE does not simply attach — the final E is retained. Check the pattern: probable → probably, remarkable → ___."}, {"id": "b2p3_055", "sent": "She finished the race [EASY] despite the difficult conditions underfoot.", "root": "EASY", "a": "easily", "h": "You need an ADVERB. When adjectives end in -Y, there is a regular spelling change before -LY is added. Think about: happy/happily, easy/___, heavy/heavily."}, {"id": "b2p3_056", "sent": "You should [READ] your essay before handing it in to check for any mistakes.", "root": "READ", "a": "reread", "h": "You need a VERB meaning 'read again'. The prefix RE- (meaning again) is added."}, {"id": "b2p3_057", "sent": "She felt the teacher had [UNDERSTAND] her answer and had marked it too harshly.", "root": "UNDERSTAND", "a": "misunderstood", "h": "You need a PAST TENSE VERB meaning 'understood incorrectly'. The prefix MIS- means incorrectly or badly."}, {"id": "b2p3_058", "sent": "Several students [AGREE] with the teacher's interpretation of the poem.", "root": "AGREE", "a": "disagreed", "h": "You need a PAST TENSE VERB meaning 'did not agree'. The prefix DIS- reverses the meaning."}, {"id": "b2p3_059", "sent": "The project was significantly [RUN] and ended up costing twice the original budget.", "root": "RUN", "a": "overrun", "h": "You need a PAST PARTICIPLE used as an adjective. The context tells you the project went beyond its limits. Which prefix means 'beyond' or 'too much'? The same prefix appears in 'overload' and 'overwork'."}, {"id": "b2p3_060", "sent": "She felt her hard work was constantly [LOOK] by managers who favoured other employees.", "root": "LOOK", "a": "overlooked", "h": "You need a PAST PARTICIPLE. OVERLOOK = fail to notice or give credit to. The prefix OVER- is required."}, {"id": "b2p3_061", "sent": "The children were [EXCITE] about the school trip and could talk about nothing else.", "root": "EXCITE", "a": "excited", "h": "You need an ADJECTIVE describing how the children feel. Think about the -ED/-ING pattern: one describes the feeling the children have, the other describes what causes that feeling. Which describes the person experiencing the emotion?"}, {"id": "b2p3_062", "sent": "The [ENTHUSE] of the volunteers made up for the lack of professional resources.", "root": "ENTHUSE", "a": "enthusiasm", "h": "You need a NOUN. The verb and its noun form look very different — the noun does not use -MENT, -TION, or -ANCE. Think about what abstract noun describes the quality of being enthusiastic."}, {"id": "b2p3_063", "sent": "The [SCIENCE] concluded that further research was needed before any conclusions could be drawn.", "root": "SCIENCE", "a": "scientists", "h": "You need a PLURAL NOUN referring to people. SCIENCE → SCIENTIST (adding -IST for a person), then add -S for plural."}, {"id": "b2p3_064", "sent": "Her first [PUBLISH] received mixed reviews but her second novel was a bestseller.", "root": "PUBLISH", "a": "publication", "h": "You need a NOUN meaning a book, article or document that has been issued. The verb changes significantly — the suffix is -ATION, but the root spelling also changes. Think about: publish → publishes → what noun?"}, {"id": "b2p3_065", "sent": "The [ORGANISE] of the event was praised by all those who attended.", "root": "ORGANISE", "a": "organisation", "h": "You need a NOUN meaning a structured body or the act of organising. The suffix is -ATION, but the verb ending changes. Think about the British English spelling — does the noun use S or Z?"}, {"id": "b2p3_066", "sent": "She has shown a great [DEDICATE] to her work over the past ten years.", "root": "DEDICATE", "a": "dedication", "h": "You need a NOUN meaning devotion to a cause or activity. The verb ends in -ATE. When you add the noun suffix, the -ATE becomes -ATION. What does the full word look like?"}, {"id": "b2p3_067", "sent": "The opening [CELEBRATE] for the new community centre will take place on Saturday.", "root": "CELEBRATE", "a": "celebration", "h": "You need a NOUN meaning an event that marks something special. The verb ends in -ATE. Same pattern as DEDICATE — what happens when you add the noun suffix to this verb?"}, {"id": "b2p3_068", "sent": "She is a very [TALENT] musician who has been playing the violin since the age of four.", "root": "TALENT", "a": "talented", "h": "You need an ADJECTIVE meaning 'having natural ability'. The root is a NOUN. Which single suffix converts a noun into an adjective meaning 'possessing that quality'? Think: gifted, skilled, talented — what do they share?"}, {"id": "b2p3_069", "sent": "The professor is a [RESPECT] authority on the subject who has published extensively.", "root": "RESPECT", "a": "respected", "h": "You need an ADJECTIVE meaning 'admired and well regarded'. RESPECT + -ED (past participle as adjective)."}, {"id": "b2p3_070", "sent": "He received a warm [WELCOME] when he returned to the team after his injury.", "root": "WELCOME", "a": "welcome", "h": "You need a NOUN. Before adding any transformation, check whether the root word already functions as the word class you need. Sometimes no change is required."}, {"id": "b2p3_071", "sent": "Eating a [VARY] diet is important for maintaining good health.", "root": "VARY", "a": "varied", "h": "You need an ADJECTIVE meaning 'containing different types'. The root is a verb. Think about which participial form of the verb creates an adjective meaning 'having variety'."}, {"id": "b2p3_072", "sent": "The [SATISFY] of completing a difficult project makes all the hard work worthwhile.", "root": "SATISFY", "a": "satisfaction", "h": "You need a NOUN. The verb ends in -Y. When you add the noun suffix, the Y changes to I and a longer suffix is added. Think about: apply/application, satisfy/___."}, {"id": "b2p3_073", "sent": "The [RELY] of public transport has improved significantly in recent years.", "root": "RELY", "a": "reliability", "h": "You need a NOUN meaning 'the quality of being dependable'. This requires two transformations — first the verb becomes an adjective (with a spelling change), then the adjective becomes a noun. Think about each step separately."}, {"id": "b2p3_074", "sent": "The [POSSIBLE] of finding a solution to the problem encouraged the research team.", "root": "POSSIBLE", "a": "possibility", "h": "You need a NOUN. The adjective ends in -BLE. Which suffix converts adjectives ending in -BLE into nouns? Think: possible/possibility, capable/___, flexible/flexibility."}, {"id": "b2p3_075", "sent": "She made an [APOLOGY] for her behaviour and promised it would not happen again.", "root": "APOLOGY", "a": "apology", "h": "You need a NOUN. Before adding any affixes, check whether the root word already functions as the noun you need in the phrase 'make an ___'. Sometimes no transformation is required."}, {"id": "b2p3_076", "sent": "The new regulations have had a very [BENEFIT] effect on air quality in the city.", "root": "BENEFIT", "a": "beneficial", "h": "You need an ADJECTIVE. The root is a NOUN. Think about which suffix creates adjectives from nouns in words like: presidential, residential, financial. What does this suffix look like?"}, {"id": "b2p3_077", "sent": "There has been a [DRAMA] increase in the number of people working from home.", "root": "DRAMA", "a": "dramatic", "h": "You need an ADJECTIVE. The root is a NOUN. Think about which suffix creates adjectives from nouns like: fanatic/fanatical, systematic/systematic — where a -TIC ending gives an adjective."}, {"id": "b2p3_078", "sent": "She has a very [PROFESSION] approach to her work and is highly regarded by colleagues.", "root": "PROFESSION", "a": "professional", "h": "You need an ADJECTIVE. The root is a NOUN. Which suffix converts nouns into adjectives meaning 'of or relating to that field or group'? Think: nation/national, profession/___, tradition/traditional."}, {"id": "b2p3_079", "sent": "The film was a [COMMERCE] success, earning over one hundred million dollars worldwide.", "root": "COMMERCE", "a": "commercial", "h": "You need an ADJECTIVE. The root is a NOUN. Same suffix as PROFESSION. Think about: commerce → what adjective means 'relating to buying and selling'?"}, {"id": "b2p3_080", "sent": "He expressed his [GRATEFUL] to everyone who had helped him during the difficult period.", "root": "GRATEFUL", "a": "gratitude", "h": "You need a NOUN. The root is an adjective. This is an irregular derivation — the adjective and noun forms look quite different. Think about what noun means 'the feeling of being thankful'."}, {"id": "b2p3_081", "sent": "The [SCIENCE] evidence suggests that exercise has significant mental health benefits.", "root": "SCIENCE", "a": "scientific", "h": "You need an ADJECTIVE. The root is a NOUN. Which suffix creates adjectives from nouns like: magic/magical, specific/specific, scientific — where a -FIC or -IFIC suffix produces the adjective form?"}, {"id": "b2p3_082", "sent": "She made a very [EFFECT] presentation and the audience was clearly impressed.", "root": "EFFECT", "a": "effective", "h": "You need an ADJECTIVE. The root is a NOUN. Think about which suffix converts nouns into adjectives meaning 'producing or achieving that thing'. Think: effect/effective, attract/attractive, create/creative."}, {"id": "b2p3_083", "sent": "The [ENVIRONMENT] impact of the new motorway has been widely debated.", "root": "ENVIRONMENT", "a": "environmental", "h": "You need an ADJECTIVE. The root is a NOUN. Which suffix converts nouns into adjectives meaning 'relating to that thing'? Think: environment/environmental, nation/national, tradition/traditional."}, {"id": "b2p3_084", "sent": "Her [ENTHUSE] approach to teaching made her extremely popular with students.", "root": "ENTHUSE", "a": "enthusiastic", "h": "You need an ADJECTIVE. The root is a VERB. Which suffix creates an adjective meaning 'characterised by great enthusiasm'? The suffix is longer than -IVE or -AL."}, {"id": "b2p3_085", "sent": "The [GLOBE] popularity of the internet has transformed the way businesses operate.", "root": "GLOBE", "a": "global", "h": "You need an ADJECTIVE. The root is a NOUN meaning 'the world'. Which suffix converts it into an adjective meaning 'worldwide'? Think: nation/national, globe/___, region/regional."}, {"id": "b2p3_086", "sent": "The team showed great [PERSIST] and eventually managed to find a workable solution.", "root": "PERSIST", "a": "persistence", "h": "You need a NOUN. The root is a VERB. Which suffix converts verbs like 'persist', 'exist', 'resist' into nouns? Note the spelling change when the suffix is added."}, {"id": "b2p3_087", "sent": "The [TOUR] industry has been badly affected by the pandemic over the past few years.", "root": "TOUR", "a": "tourism", "h": "You need a NOUN referring to an industry or activity. The root is a NOUN meaning a journey or trip. Which suffix creates a concept noun meaning 'the practice of travelling for pleasure'?"}, {"id": "b2p3_088", "sent": "She received several [COMPETE] job offers and had to think carefully before deciding.", "root": "COMPETE", "a": "competing", "h": "You need an ADJECTIVE used before a plural noun. The root is a VERB. Think about which participial form creates an adjective meaning 'that are in competition with each other'."}, {"id": "b2p3_089", "sent": "The [NATION] team's victory was celebrated by supporters across the country.", "root": "NATION", "a": "national", "h": "You need an ADJECTIVE. The root is a NOUN. Which suffix converts nouns like 'nation', 'tradition', 'region' into adjectives? It is a very common suffix in English."}, {"id": "b2p3_090", "sent": "She showed [REMARK] bravery in speaking out about the issues she had witnessed.", "root": "REMARK", "a": "remarkable", "h": "You need an ADJECTIVE meaning 'extraordinary, deserving attention'. The root is a NOUN. Which suffix converts it into this adjective? Think about: remark/remarkable, read/readable, believe/believable."}, {"id": "b2p3_091", "sent": "The [POLLUTE] of rivers by industrial waste is a major environmental concern.", "root": "POLLUTE", "a": "pollution", "h": "You need a NOUN. The verb ends in -UTE. When this verb takes a noun suffix, the root spelling changes. Think about what noun describes the presence of harmful substances in the environment."}, {"id": "b2p3_092", "sent": "She was a very [AMBITION] student who wanted to study medicine at the best university.", "root": "AMBITION", "a": "ambitious", "h": "You need an ADJECTIVE. The root is a NOUN. The noun ends in -ION. To create the adjective, the -ION is removed and replaced with a different suffix. Think: ambition/ambitious, fiction/fictitious."}, {"id": "b2p3_093", "sent": "The [EMPLOY] rate in the city fell sharply when the main factory closed.", "root": "EMPLOY", "a": "employment", "h": "You need a NOUN referring to the state of being employed. The root is a VERB. Which very common suffix converts verbs like 'employ', 'develop', 'achieve' into nouns?"}, {"id": "b2p3_094", "sent": "She expressed her [SATISFY] with the result of the negotiations.", "root": "SATISFY", "a": "satisfaction", "h": "You need a NOUN. Same root and transformation as a question earlier in this section. The Y in the root changes and a longer suffix is added."}, {"id": "b2p3_095", "sent": "The [MANAGE] of the project was praised for keeping everything on track despite the challenges.", "root": "MANAGE", "a": "management", "h": "You need a NOUN. The root is a VERB. Which suffix converts verbs into nouns of process or action? Note the spelling — the final E of the verb is dropped before the suffix is added."}, {"id": "b2p3_096", "sent": "She has a very [SYMPATHY] manner and is excellent at putting nervous patients at ease.", "root": "SYMPATHY", "a": "sympathetic", "h": "You need an ADJECTIVE. The root is a NOUN. The noun ends in -Y. To create the adjective, this ending changes completely and a longer suffix is added. Think: sympathy/sympathetic, apathy/apathetic."}, {"id": "b2p3_097", "sent": "The [MUSIC] performed several pieces by Beethoven before taking a short break.", "root": "MUSIC", "a": "musician", "h": "You need a NOUN referring to a person. The root is a NOUN for an art form. Which suffix creates person nouns from words like: music, magic, physics? Think about the person who plays music professionally."}, {"id": "b2p3_098", "sent": "The earthquake caused enormous [DESTROY] across the coastal region.", "root": "DESTROY", "a": "destruction", "h": "You need a NOUN. The verb and noun forms look very different. The verb ends in -OY but the noun uses a completely different root and suffix. Think about what noun means 'the act of completely destroying something'."}, {"id": "b2p3_099", "sent": "All staff receive regular [TRAIN] to keep their skills and knowledge up to date.", "root": "TRAIN", "a": "training", "h": "You need a NOUN (uncountable). The root is a VERB. Which form of the verb is commonly used as an uncountable noun to describe a process or activity? Think: swim/swimming, train/___, teach/teaching."}, {"id": "b2p3_100", "sent": "She is a very [EXPERIENCE] teacher who has been working in secondary education for twenty years.", "root": "EXPERIENCE", "a": "experienced", "h": "You need an ADJECTIVE meaning 'having a lot of practice and knowledge'. The root is a NOUN describing that quality. Which single suffix converts a noun into an adjective meaning 'possessing that quality'?"}];
const P4 = [{"id": "b2t001", "orig": "It took me a while to feel comfortable driving on the left.", "key": "USED", "before": "It took me a while to get", "after": "on the left.", "ans": "used to driving", "accept": ["used to driving"], "chunk1": "used to", "chunk2": "driving", "p1": "get used to + gerund = become accustomed to", "p2": "driving (gerund — not 'drive' or 'to drive')", "hint": "FEEL COMFORTABLE DRIVING → GET USED TO DRIVING. The preposition TO is followed by a gerund.", "h": "FEEL COMFORTABLE DRIVING → GET USED TO DRIVING. The preposition TO is followed by a gerund."}, {"id": "b2t002", "orig": "She no longer finds it strange working night shifts.", "key": "USED", "before": "She", "after": "working night shifts.", "ans": "is used to", "accept": ["is used to", "has got used to", "has gotten used to"], "chunk1": "used to", "chunk2": "is used to", "p1": "be used to = be accustomed to (state)", "p2": "is used to (present simple — she is now accustomed)", "hint": "NO LONGER FINDS IT STRANGE → IS USED TO. She is now accustomed — which form of USED expresses a current state?", "h": "NO LONGER FINDS IT STRANGE → IS USED TO. She is now accustomed — which form of USED expresses a current state?"}, {"id": "b2t003", "orig": "When I was young, we didn't have a car and walked everywhere.", "key": "USED", "before": "When I was young, we", "after": "everywhere.", "ans": "used to walk", "accept": ["used to walk"], "chunk1": "used to", "chunk2": "walk", "p1": "used to + infinitive = past habit that no longer exists", "p2": "walk (bare infinitive — not 'walking' or 'walked')", "hint": "WE DIDN'T HAVE / WALKED (past habit) → USED TO WALK. Past discontinued habit.", "h": "WE DIDN'T HAVE / WALKED (past habit) → USED TO WALK. Past discontinued habit."}, {"id": "b2t004", "orig": "My brother is a better cook than I am.", "key": "AS", "before": "I am not", "after": "my brother.", "ans": "as good a cook as", "accept": ["as good a cook as"], "chunk1": "as good", "chunk2": "cook as", "p1": "not as + adjective + a + noun + as = negative comparison", "p2": "a cook (article required between adjective and noun)", "hint": "BETTER COOK THAN → NOT AS GOOD A COOK AS. Note the article A between the adjective and noun.", "h": "BETTER COOK THAN → NOT AS GOOD A COOK AS. Note the article A between the adjective and noun."}, {"id": "b2t005", "orig": "Nobody in the class speaks French better than Maria.", "key": "AS", "before": "Maria speaks French", "after": "anyone in the class.", "ans": "as well as", "accept": ["as well as"], "chunk1": "as well", "chunk2": "as", "p1": "as well as = equally well compared to", "p2": "as (second 'as' — both required)", "hint": "BETTER THAN ANYONE → AS WELL AS ANYONE. The adverb 'well' goes between the two AS.", "h": "BETTER THAN ANYONE → AS WELL AS ANYONE. The adverb 'well' goes between the two AS."}, {"id": "b2t006", "orig": "Brad speaks English better than his parents do.", "key": "AS", "before": "Brad's parents don't speak English", "after": "he does.", "ans": "as well as", "accept": ["as well as"], "chunk1": "as well", "chunk2": "as", "p1": "not as well as = not to the same standard", "p2": "as (second 'as' — both required)", "hint": "SPEAK BETTER THAN → DON'T SPEAK AS WELL AS. Negative comparison with the adverb.", "h": "SPEAK BETTER THAN → DON'T SPEAK AS WELL AS. Negative comparison with the adverb."}, {"id": "b2t007", "orig": "Someone stole my bicycle from outside the station.", "key": "WAS", "before": "My bicycle", "after": "outside the station.", "ans": "was stolen from", "accept": ["was stolen from"], "chunk1": "was stolen", "chunk2": "from", "p1": "passive: was + past participle + preposition", "p2": "from (preposition — stolen FROM a location)", "hint": "SOMEONE STOLE MY BICYCLE → MY BICYCLE WAS STOLEN. Passive voice. Don't forget the preposition.", "h": "SOMEONE STOLE MY BICYCLE → MY BICYCLE WAS STOLEN. Passive voice. Don't forget the preposition."}, {"id": "b2t008", "orig": "They are going to build a new sports centre on the edge of town.", "key": "GOING", "before": "A new sports centre is", "after": "on the edge of town.", "ans": "going to be built", "accept": ["going to be built"], "chunk1": "going to be", "chunk2": "built", "p1": "going to + passive infinitive = future passive plan", "p2": "built (past participle — passive form of build)", "hint": "ARE GOING TO BUILD → IS GOING TO BE BUILT. Future passive. What form does the verb take?", "h": "ARE GOING TO BUILD → IS GOING TO BE BUILT. Future passive. What form does the verb take?"}, {"id": "b2t009", "orig": "People believe that exercise is good for mental health.", "key": "BELIEVED", "before": "Exercise is", "after": "good for mental health.", "ans": "believed to be", "accept": ["believed to be"], "chunk1": "believed to", "chunk2": "be", "p1": "is believed to be = passive reporting verb + infinitive", "p2": "be (bare infinitive after 'believed to')", "hint": "PEOPLE BELIEVE THAT → IS BELIEVED TO BE. Passive reporting structure.", "h": "PEOPLE BELIEVE THAT → IS BELIEVED TO BE. Passive reporting structure."}, {"id": "b2t010", "orig": "They have never played this piece of music in public before.", "key": "NEVER", "before": "This piece of music has", "after": "played in public before.", "ans": "never been", "accept": ["never been"], "chunk1": "never been", "chunk2": "been", "p1": "present perfect passive: has + never + been + past participle", "p2": "been (auxiliary in passive present perfect)", "hint": "THEY HAVE NEVER PLAYED → HAS NEVER BEEN PLAYED. Present perfect passive.", "h": "THEY HAVE NEVER PLAYED → HAS NEVER BEEN PLAYED. Present perfect passive."}, {"id": "b2t011", "orig": "'I'm sorry I didn't call you sooner,' he said to her.", "key": "APOLOGISED", "before": "He", "after": "not calling her sooner.", "ans": "apologised for", "accept": ["apologised for"], "chunk1": "apologised", "chunk2": "for", "p1": "apologise for + gerund phrase", "p2": "for (preposition after 'apologised')", "hint": "SAID SORRY FOR NOT CALLING → APOLOGISED FOR NOT CALLING. The gap is just 'apologised for'.", "h": "SAID SORRY FOR NOT CALLING → APOLOGISED FOR NOT CALLING. The gap is just 'apologised for'."}, {"id": "b2t012", "orig": "'Don't touch the wet paint,' the decorator said to us.", "key": "TOLD", "before": "The decorator", "after": "the wet paint.", "ans": "told us not to touch", "accept": ["told us not to touch"], "chunk1": "told us not to", "chunk2": "touch", "p1": "tell + object + not to + infinitive = negative reported command", "p2": "touch (bare infinitive after 'not to')", "hint": "'DON'T TOUCH' → TOLD US NOT TO TOUCH. Reported negative command.", "h": "'DON'T TOUCH' → TOLD US NOT TO TOUCH. Reported negative command."}, {"id": "b2t013", "orig": "'Can you help me carry these bags?' she asked him.", "key": "ASKED", "before": "She", "after": "help her carry the bags.", "ans": "asked him to", "accept": ["asked him to"], "chunk1": "asked him", "chunk2": "to", "p1": "ask + object + to + infinitive = reported request", "p2": "to (infinitive marker)", "hint": "'CAN YOU HELP ME?' → ASKED HIM TO HELP HER. The gap is 'asked him to'.", "h": "'CAN YOU HELP ME?' → ASKED HIM TO HELP HER. The gap is 'asked him to'."}, {"id": "b2t014", "orig": "'I'll finish the report by Friday,' she said.", "key": "PROMISED", "before": "She", "after": "the report by Friday.", "ans": "promised to finish", "accept": ["promised to finish"], "chunk1": "promised to", "chunk2": "finish", "p1": "promise to + infinitive = reported promise", "p2": "finish (bare infinitive after 'to')", "hint": "'I'LL FINISH' → PROMISED TO FINISH. Reported promise with to-infinitive.", "h": "'I'LL FINISH' → PROMISED TO FINISH. Reported promise with to-infinitive."}, {"id": "b2t015", "orig": "'You should take more exercise,' the doctor told me.", "key": "ADVISED", "before": "The doctor", "after": "more exercise.", "ans": "advised me to take", "accept": ["advised me to take"], "chunk1": "advised me to", "chunk2": "take", "p1": "advise + object + to + infinitive = reported advice", "p2": "take (bare infinitive)", "hint": "'YOU SHOULD TAKE' → ADVISED ME TO TAKE. Reported advice with to-infinitive.", "h": "'YOU SHOULD TAKE' → ADVISED ME TO TAKE. Reported advice with to-infinitive."}, {"id": "b2t016", "orig": "I don't have enough money, so I can't buy a new laptop.", "key": "COULD", "before": "If I had enough money, I", "after": "a new laptop.", "ans": "could buy", "accept": ["could buy"], "chunk1": "could", "chunk2": "buy", "p1": "type 2 conditional: if + past simple, would/could + infinitive", "p2": "buy (bare infinitive after 'could')", "hint": "DON'T HAVE MONEY, CAN'T BUY → IF I HAD MONEY, I COULD BUY. Second conditional.", "h": "DON'T HAVE MONEY, CAN'T BUY → IF I HAD MONEY, I COULD BUY. Second conditional."}, {"id": "b2t017", "orig": "She didn't study hard enough, so she failed the exam.", "key": "PASSED", "before": "She would have", "after": "if she had studied harder.", "ans": "passed the exam", "accept": ["passed the exam"], "chunk1": "passed the exam", "chunk2": "passed", "p1": "type 3 conditional: would have + past participle", "p2": "passed (past participle of pass)", "hint": "DIDN'T STUDY / FAILED → WOULD HAVE PASSED IF SHE HAD STUDIED. Third conditional.", "h": "DIDN'T STUDY / FAILED → WOULD HAVE PASSED IF SHE HAD STUDIED. Third conditional."}, {"id": "b2t018", "orig": "You might get lost without a map.", "key": "UNLESS", "before": "You might get lost", "after": "a map with you.", "ans": "unless you take", "accept": ["unless you take", "unless you have"], "chunk1": "unless you", "chunk2": "take", "p1": "unless = if not. Replaces the negative condition.", "p2": "take (present simple after 'unless' in a conditional)", "hint": "WITHOUT → UNLESS YOU TAKE. UNLESS = if you don't. Use present simple in the unless clause.", "h": "WITHOUT → UNLESS YOU TAKE. UNLESS = if you don't. Use present simple in the unless clause."}, {"id": "b2t019", "orig": "If you ask me, I think you should complain to the manager.", "key": "WERE", "before": "If", "after": "I would complain to the manager.", "ans": "I were you", "accept": ["I were you"], "chunk1": "I were", "chunk2": "you", "p1": "if I were you = giving advice using type 2 conditional", "p2": "you (object pronoun — 'if I were you')", "hint": "IF YOU ASK ME → IF I WERE YOU. Standard advice structure using second conditional.", "h": "IF YOU ASK ME → IF I WERE YOU. Standard advice structure using second conditional."}, {"id": "b2t020", "orig": "She only went to the party because her friend asked her to.", "key": "GONE", "before": "She wouldn't have", "after": "her friend hadn't asked her to.", "ans": "gone to the party if", "accept": ["gone to the party if", "gone if"], "chunk1": "gone to the party", "chunk2": "if", "p1": "type 3 conditional: wouldn't have + past participle + if", "p2": "if (conjunction introducing the condition)", "hint": "ONLY WENT BECAUSE → WOULDN'T HAVE GONE IF. Third conditional result clause.", "h": "ONLY WENT BECAUSE → WOULDN'T HAVE GONE IF … HADN'T. Third conditional: wouldn't have + past perfect negative."}, {"id": "b2t021", "orig": "It's not easy to manage a large team of people.", "key": "CHARGE", "before": "It's not easy to be", "after": "a large team of people.", "ans": "in charge of", "accept": ["in charge of"], "h": "MANAGE → BE IN CHARGE OF. Two changes: verb→prepositional idiom (in charge of) + infinitive structure shifts to be + complement. Answer: in charge of.", "chunk1": "in charge", "chunk2": "of", "p1": "in charge (part of the fixed phrase)", "p2": "in charge OF (preposition required)", "hint": "MANAGE → BE IN CHARGE OF. Two changes: verb→prepositional phrase + infinitive restructure."}, {"id": "b2t022", "orig": "The concert was cancelled because the lead singer fell ill.", "key": "CALLED", "before": "The concert had to be", "after": "due to the lead singer falling ill.", "ans": "called off", "accept": ["called off"], "chunk1": "called", "chunk2": "off", "p1": "called off (phrasal verb = cancelled)", "p2": "had to be called off (passive + modal necessity already in 'before')", "hint": "CANCELLED → HAD TO BE CALLED OFF. Two changes: active→passive + phrasal verb. Answer: called off.", "h": "CANCELLED (active) → HAD TO BE CALLED OFF (passive + modal). Two changes: active→passive + phrasal verb. Answer: called off."}, {"id": "b2t023", "orig": "She managed to find a solution to the problem after a lot of thought.", "key": "CAME", "before": "She", "after": "a solution after a lot of thought.", "ans": "came up with", "accept": ["came up with"], "chunk1": "came up with", "chunk2": "up with", "p1": "come up with = find or produce an idea/solution", "p2": "up with (two particles — both essential)", "hint": "FIND A SOLUTION → CAME UP WITH A SOLUTION. Three-word phrasal verb. All three parts go in.", "h": "FIND A SOLUTION → CAME UP WITH A SOLUTION. Three-word phrasal verb. All three parts go in."}, {"id": "b2t024", "orig": "She rejected the job offer because the salary was too low.", "key": "DOWN", "before": "She turned", "after": "because the salary was too low.", "ans": "down the job offer", "accept": ["down the job offer", "the job offer down"], "chunk1": "down", "chunk2": "job offer", "p1": "turn down = reject — phrasal verb", "p2": "down (particle — can go before or after the object)", "hint": "REJECTED → TURNED DOWN. The particle goes between or after the object.", "h": "REJECTED → TURNED DOWN. The particle goes between or after the object."}, {"id": "b2t025", "orig": "The police are examining the reasons for the crash.", "key": "LOOKING", "before": "The police are", "after": "for the crash.", "ans": "looking into the reasons", "accept": ["looking into the reasons"], "h": "EXAMINING THE REASONS FOR → LOOKING INTO THE REASONS FOR. Two changes: verb→phrasal verb (look into) + object noun phrase inserted in gap. Answer: looking into the reasons.", "chunk1": "looking into", "chunk2": "the reasons", "p1": "look into (phrasal verb = investigate)", "p2": "looking into the reasons (object noun phrase in gap)", "hint": "EXAMINING THE REASONS FOR → LOOKING INTO THE REASONS FOR. Phrasal verb + object phrase."}, {"id": "b2t026", "orig": "It isn't necessary for you to wear a suit to the interview.", "key": "NEED", "before": "You", "after": "a suit to the interview.", "ans": "don't need to wear", "accept": ["don't need to wear", "needn't wear", "need not wear"], "chunk1": "need", "chunk2": "wear", "p1": "don't need to / needn't = not necessary", "p2": "wear (bare infinitive)", "hint": "NOT NECESSARY FOR YOU → YOU DON'T NEED TO WEAR. Lack of obligation.", "h": "NOT NECESSARY FOR YOU → YOU DON'T NEED TO WEAR. Lack of obligation."}, {"id": "b2t027", "orig": "It was wrong of you to leave without saying goodbye.", "key": "SHOULD", "before": "You", "after": "without saying goodbye.", "ans": "shouldn't have left", "accept": ["shouldn't have left", "should not have left"], "chunk1": "shouldn't have", "chunk2": "left", "p1": "should not have + past participle = past criticism", "p2": "left (past participle of leave)", "hint": "IT WAS WRONG OF YOU → YOU SHOULDN'T HAVE LEFT. Modal for past criticism.", "h": "IT WAS WRONG OF YOU → YOU SHOULDN'T HAVE LEFT. Modal for past criticism."}, {"id": "b2t028", "orig": "I'm sure he forgot about the meeting — he looked confused.", "key": "MUST", "before": "He", "after": "about the meeting because he looked confused.", "ans": "must have forgotten", "accept": ["must have forgotten"], "chunk1": "must have", "chunk2": "forgotten", "p1": "must have + past participle = logical deduction about the past", "p2": "forgotten (past participle of forget)", "hint": "I'M SURE HE FORGOT → MUST HAVE FORGOTTEN. Logical deduction about past.", "h": "I'M SURE HE FORGOT → MUST HAVE FORGOTTEN. Logical deduction about past."}, {"id": "b2t029", "orig": "Cycling is not allowed in the park.", "key": "SUPPOSED", "before": "You are not", "after": "in the park.", "ans": "supposed to cycle", "accept": ["supposed to cycle"], "chunk1": "supposed to", "chunk2": "cycle", "p1": "not supposed to = not allowed to — expressing prohibition", "p2": "cycle (bare infinitive after 'to')", "hint": "NOT ALLOWED → NOT SUPPOSED TO CYCLE. Rule or regulation phrased using 'supposed to'.", "h": "NOT ALLOWED → NOT SUPPOSED TO CYCLE. Rule or regulation phrased using 'supposed to'."}, {"id": "b2t030", "orig": "I regret not starting to learn the guitar when I was younger.", "key": "WISH", "before": "I", "after": "to learn the guitar when I was younger.", "ans": "wish I had started", "accept": ["wish I had started"], "chunk1": "wish I had", "chunk2": "started", "p1": "wish + past perfect = regret about past", "p2": "started (past participle — had started)", "hint": "REGRET NOT STARTING → WISH I HAD STARTED. Past regret using wish + past perfect.", "h": "REGRET NOT STARTING → WISH I HAD STARTED. Past regret using wish + past perfect."}, {"id": "b2t031", "orig": "The boy won an Olympic medal. His sister is in my class.", "key": "WHOSE", "before": "The boy", "after": "is in my class won an Olympic medal.", "ans": "whose sister", "accept": ["whose sister"], "chunk1": "whose", "chunk2": "sister", "p1": "whose = possessive relative pronoun", "p2": "sister (the noun that belongs to the boy)", "hint": "HIS SISTER → WHOSE SISTER. Join the sentences using the possessive relative pronoun.", "h": "HIS SISTER → WHOSE SISTER. Join the sentences using the possessive relative pronoun."}, {"id": "b2t032", "orig": "I found a wallet on the street. It was full of cash.", "key": "WHICH", "before": "I found a wallet on the street", "after": "full of cash.", "ans": "which was", "accept": ["which was"], "chunk1": "which", "chunk2": "was", "p1": "which = relative pronoun for things in a non-defining relative clause", "p2": "was (past simple auxiliary)", "hint": "IT WAS FULL → WHICH WAS FULL. Non-defining relative clause using WHICH.", "h": "IT WAS FULL → WHICH WAS FULL. Non-defining relative clause using WHICH."}, {"id": "b2t033", "orig": "The teacher stopped the lesson so that students could ask questions.", "key": "ORDER", "before": "The teacher stopped the lesson", "after": "students to ask questions.", "ans": "in order to allow", "accept": ["in order to allow", "in order for"], "chunk1": "in order", "chunk2": "allow", "p1": "in order to = purpose, more formal than 'to'", "p2": "allow (bare infinitive — allow students to ask)", "hint": "SO THAT STUDENTS COULD → IN ORDER TO ALLOW STUDENTS TO. Purpose clause using in order to.", "h": "SO THAT STUDENTS COULD → IN ORDER TO ALLOW STUDENTS TO. Purpose clause using in order to."}, {"id": "b2t034", "orig": "She really enjoys going to the cinema at weekends.", "key": "KEEN", "before": "She is really", "after": "to the cinema at weekends.", "ans": "keen on going", "accept": ["keen on going"], "chunk1": "keen on", "chunk2": "going", "p1": "keen on + gerund = enthusiastic about doing", "p2": "going (gerund — not 'to go')", "hint": "ENJOYS GOING → KEEN ON GOING. Adjective + preposition + gerund.", "h": "ENJOYS GOING → KEEN ON GOING. Adjective + preposition + gerund."}, {"id": "b2t035", "orig": "She didn't want to miss the start of the film, so she hurried.", "key": "AVOID", "before": "She hurried", "after": "the start of the film.", "ans": "to avoid missing", "accept": ["to avoid missing"], "chunk1": "avoid", "chunk2": "missing", "p1": "avoid + gerund = purpose clause using negative meaning", "p2": "missing (gerund after 'avoid')", "hint": "DIDN'T WANT TO MISS → TO AVOID MISSING. AVOID is always followed by a gerund.", "h": "DIDN'T WANT TO MISS → TO AVOID MISSING. AVOID is always followed by a gerund."}, {"id": "b2t036", "orig": "I haven't spoken to my cousin since last summer.", "key": "LAST", "before": "The", "after": "I spoke to my cousin was last summer.", "ans": "last time", "accept": ["last time"], "h": "HAVEN'T SPOKEN SINCE → THE LAST TIME I SPOKE. Two changes: present perfect negative→past simple + 'the last time' cleft structure. Answer: last time.", "chunk1": "last time", "chunk2": "last time", "p1": "the last time (cleft = since)", "p2": "last time (both words form the phrase)", "hint": "HAVEN'T SPOKEN SINCE → THE LAST TIME I SPOKE. Cleft structure + tense change."}, {"id": "b2t037", "orig": "It's not worth spending money on that film — the reviews are terrible.", "key": "POINT", "before": "There's no", "after": "money on that film — the reviews are terrible.", "ans": "point in spending", "accept": ["point in spending", "point spending"], "chunk1": "point", "chunk2": "spending", "p1": "there's no point in + gerund = it's not worth doing", "p2": "spending (gerund — not 'to spend')", "hint": "NOT WORTH SPENDING → NO POINT IN SPENDING. Fixed phrase + gerund.", "h": "NOT WORTH SPENDING → NO POINT IN SPENDING. Fixed phrase + gerund."}, {"id": "b2t038", "orig": "He found it difficult to wake up early during the winter months.", "key": "TROUBLE", "before": "He had", "after": "up early during the winter months.", "ans": "trouble waking", "accept": ["trouble waking"], "chunk1": "trouble", "chunk2": "waking", "p1": "have trouble + gerund = find it difficult to do", "p2": "waking (gerund — not 'to wake')", "hint": "FOUND IT DIFFICULT TO WAKE → HAD TROUBLE WAKING. TROUBLE is followed by a gerund.", "h": "FOUND IT DIFFICULT TO WAKE → HAD TROUBLE WAKING. TROUBLE is followed by a gerund."}, {"id": "b2t039", "orig": "She had never visited Rome before this trip.", "key": "FIRST", "before": "It was her", "after": "Rome.", "ans": "first visit to", "accept": ["first visit to", "first time visiting"], "chunk1": "first visit", "chunk2": "to", "p1": "her first visit to = she had never been before", "p2": "to (preposition after 'visit')", "hint": "HAD NEVER VISITED BEFORE → HER FIRST VISIT TO. Noun phrase version.", "h": "HAD NEVER VISITED BEFORE → HER FIRST VISIT TO. Noun phrase version."}, {"id": "b2t040", "orig": "He had never cooked for so many people before.", "key": "FIRST", "before": "It was the", "after": "for so many people.", "ans": "first time he had cooked", "accept": ["first time he had cooked"], "chunk1": "first time he", "chunk2": "had cooked", "p1": "first time + past perfect = had never done before", "p2": "had cooked (past perfect passive)", "hint": "HAD NEVER COOKED BEFORE → THE FIRST TIME HE HAD COOKED. Past perfect.", "h": "HAD NEVER COOKED BEFORE → THE FIRST TIME HE HAD COOKED. Past perfect."}, {"id": "b2t041", "orig": "We were all surprised when she resigned so suddenly.", "key": "CAME", "before": "Her sudden resignation", "after": "all of us.", "ans": "came as a surprise to", "accept": ["came as a surprise to", "came as a shock to", "came as a complete surprise to"], "chunk1": "came as a surprise", "chunk2": "to", "p1": "came as a surprise/shock to = was experienced as unexpected", "p2": "to (preposition — not 'for')", "hint": "SURPRISED US → CAME AS A SURPRISE TO US. Nominalisation + fixed phrase.", "h": "SURPRISED US → CAME AS A SURPRISE TO US. Nominalisation + fixed phrase."}, {"id": "b2t042", "orig": "The news of his promotion delighted everyone in the team.", "key": "CAME", "before": "The news of his promotion", "after": "everyone in the team.", "ans": "came as a delight to", "accept": ["came as a delight to", "came as great news to"], "chunk1": "came as a", "chunk2": "to", "p1": "came as + noun + to = was experienced as", "p2": "to (preposition after the noun)", "hint": "DELIGHTED EVERYONE → CAME AS A DELIGHT TO EVERYONE. Verb becomes noun phrase.", "h": "DELIGHTED EVERYONE → CAME AS A DELIGHT TO EVERYONE. Verb becomes noun phrase."}, {"id": "b2t043", "orig": "I really don't mind which day we have the party.", "key": "CONCERNED", "before": "As far as", "after": "we can have the party on any day.", "ans": "I'm concerned", "accept": ["I'm concerned", "i'm concerned"], "chunk1": "I'm", "chunk2": "concerned", "p1": "as far as I'm concerned (= I don't mind — fixed phrase)", "p2": "I'm concerned (both words complete the fixed phrase)", "hint": "I DON'T MIND → AS FAR AS I'M CONCERNED. Fixed phrase expressing personal indifference or opinion.", "h": "I DON'T MIND → AS FAR AS I'M CONCERNED. Fixed phrase of indifference. Answer: I'm concerned."}, {"id": "b2t044", "orig": "They postponed the match because of the bad weather.", "key": "PUT", "before": "The match had to be", "after": "because of the bad weather.", "ans": "put off", "accept": ["put off"], "h": "POSTPONED (active) → HAD TO BE PUT OFF (passive + modal). Two changes: active→passive + phrasal verb (put off). Answer: put off.", "chunk1": "put off", "chunk2": "put off", "p1": "put off (phrasal verb = postpone)", "p2": "had to be put off (passive + modal already in before)", "hint": "POSTPONED → PUT OFF. Active→passive + phrasal verb."}, {"id": "b2t045", "orig": "She can't wait to see her friends at the reunion.", "key": "FORWARD", "before": "She is", "after": "her friends at the reunion.", "ans": "looking forward to seeing", "accept": ["looking forward to seeing"], "chunk1": "looking forward to", "chunk2": "seeing", "p1": "look forward to + gerund = anticipate with pleasure", "p2": "seeing (gerund — TO is a preposition here, not infinitive marker)", "hint": "CAN'T WAIT TO SEE → LOOKING FORWARD TO SEEING. The full phrase 'looking forward to' uses FORWARD.", "h": "CAN'T WAIT TO SEE → LOOKING FORWARD TO SEEING. The full phrase 'looking forward to' uses FORWARD."}, {"id": "b2t046", "orig": "Someone is going to cut my hair tomorrow.", "key": "HAVING", "before": "I am", "after": "tomorrow.", "ans": "having my hair cut", "accept": ["having my hair cut"], "chunk1": "having my hair", "chunk2": "cut", "p1": "have something done = causative — someone does something for you", "p2": "cut (past participle — not 'cutting')", "hint": "SOMEONE WILL CUT MY HAIR → HAVING MY HAIR CUT. Causative structure.", "h": "SOMEONE WILL CUT MY HAIR → HAVING MY HAIR CUT. Causative structure."}, {"id": "b2t047", "orig": "A mechanic repaired our car last week.", "key": "HAD", "before": "We", "after": "last week.", "ans": "had our car repaired", "accept": ["had our car repaired"], "chunk1": "had our car", "chunk2": "repaired", "p1": "have + object + past participle = causative have", "p2": "repaired (past participle — not 'repair' or 'repairing')", "hint": "A MECHANIC REPAIRED → HAD OUR CAR REPAIRED. Causative have.", "h": "A MECHANIC REPAIRED → HAD OUR CAR REPAIRED. Causative have."}, {"id": "b2t048", "orig": "Her jokes caused everyone to laugh.", "key": "MADE", "before": "Her jokes", "after": "laugh.", "ans": "made everyone", "accept": ["made everyone"], "chunk1": "made", "chunk2": "everyone", "p1": "make + object + bare infinitive = cause to do", "p2": "everyone (object — required between MADE and the infinitive)", "hint": "CAUSED EVERYONE TO LAUGH → MADE EVERYONE LAUGH. MAKE + object + bare infinitive (no 'to').", "h": "CAUSED EVERYONE TO LAUGH → MADE EVERYONE LAUGH. MAKE + object + bare infinitive (no 'to')."}, {"id": "b2t049", "orig": "The teacher allowed us to use dictionaries during the test.", "key": "LET", "before": "The teacher", "after": "dictionaries during the test.", "ans": "let us use", "accept": ["let us use"], "chunk1": "let us", "chunk2": "use", "p1": "let + object + bare infinitive = allow to do", "p2": "use (bare infinitive — no 'to')", "hint": "ALLOWED US TO USE → LET US USE. LET + object + bare infinitive (no 'to').", "h": "ALLOWED US TO USE → LET US USE. LET + object + bare infinitive (no 'to')."}, {"id": "b2t050", "orig": "The coffee was so hot that I couldn't drink it.", "key": "TOO", "before": "The coffee was", "after": "drink.", "ans": "too hot to", "accept": ["too hot to"], "chunk1": "too hot", "chunk2": "to", "p1": "too + adjective + to = so...that you can't", "p2": "to (infinitive marker — what follows is the action you can't do)", "hint": "SO HOT THAT I COULDN'T → TOO HOT TO. The structure is TOO + adjective + TO + infinitive.", "h": "SO HOT THAT I COULDN'T → TOO HOT TO. The structure is TOO + adjective + TO + infinitive."}, {"id": "b2t051", "orig": "She is not old enough to vote in the election.", "key": "YOUNG", "before": "She is", "after": "vote in the election.", "ans": "too young to", "accept": ["too young to"], "chunk1": "too young", "chunk2": "to", "p1": "too young to = not old enough to (opposite comparison)", "p2": "to (infinitive marker)", "hint": "NOT OLD ENOUGH TO → TOO YOUNG TO. Reverse the comparison using the opposite adjective.", "h": "NOT OLD ENOUGH TO → TOO YOUNG TO. Reverse the comparison using the opposite adjective."}, {"id": "b2t052", "orig": "The suitcase was so heavy that she couldn't lift it.", "key": "ENOUGH", "before": "The suitcase wasn't", "after": "lift.", "ans": "light enough to", "accept": ["light enough to"], "chunk1": "enough", "chunk2": "light enough", "p1": "not + adjective + enough + to = too [opposite adjective] to", "p2": "light (opposite of heavy — the adjective changes)", "hint": "TOO HEAVY TO LIFT → NOT LIGHT ENOUGH TO LIFT. Use the opposite adjective + enough + to.", "h": "TOO HEAVY TO LIFT → NOT LIGHT ENOUGH TO LIFT. Use the opposite adjective + enough + to."}, {"id": "b2t053", "orig": "The last time she visited her grandmother was three years ago.", "key": "VISITED", "before": "She hasn't", "after": "for three years.", "ans": "visited her grandmother", "accept": ["visited her grandmother"], "h": "LAST TIME SHE VISITED … THREE YEARS AGO → HASN'T VISITED … FOR THREE YEARS. Two changes: past simple→present perfect negative + time expression (three years ago → for three years). Answer: visited her grandmother.", "chunk1": "visited her grandmother", "chunk2": "her grandmother", "p1": "visited (present perfect negative — hasn't)", "p2": "visited her grandmother (full object in gap)", "hint": "LAST TIME VISITED … AGO → HASN'T VISITED … FOR. Tense change + time expression."}, {"id": "b2t054", "orig": "They moved to this city in 2018.", "key": "BEEN", "before": "They have", "after": "2018.", "ans": "been living here since", "accept": ["been living here since", "been living in this city since", "been here since"], "chunk1": "been living", "chunk2": "since", "p1": "have been living since = present perfect continuous from a point in time", "p2": "since (time preposition for a point in the past)", "hint": "MOVED IN 2018 → HAVE BEEN LIVING HERE SINCE 2018. Present perfect continuous + since.", "h": "MOVED IN 2018 → HAVE BEEN LIVING HERE SINCE 2018. Present perfect continuous + since."}, {"id": "b2t055", "orig": "This is the most interesting book I've ever read.", "key": "NEVER", "before": "I have", "after": "a more interesting book than this.", "ans": "never read", "accept": ["never read"], "chunk1": "never", "chunk2": "read", "p1": "have never + past participle = negative experience", "p2": "read (past participle of read — same spelling, different pronunciation)", "hint": "MOST INTERESTING EVER → NEVER READ A MORE INTERESTING ONE. Superlative → never comparative.", "h": "MOST INTERESTING EVER → NEVER READ A MORE INTERESTING ONE. Superlative → never comparative."}, {"id": "b2t056", "orig": "Although the film was long, we didn't get bored.", "key": "DESPITE", "before": "", "after": "we didn't get bored.", "ans": "Despite the film being long", "accept": ["Despite the film being long", "Despite the film being quite long"], "chunk1": "despite", "chunk2": "being long", "p1": "despite + gerund phrase = although + clause", "p2": "the film being long (gerund phrase — note subject + gerund)", "hint": "ALTHOUGH THE FILM WAS LONG → DESPITE THE FILM BEING LONG. DESPITE needs a noun or gerund phrase.", "h": "ALTHOUGH THE FILM WAS LONG → DESPITE THE FILM BEING LONG. DESPITE needs a noun or gerund phrase."}, {"id": "b2t057", "orig": "She trained hard for months but didn't win the race.", "key": "SPITE", "before": "She didn't win the race", "after": "training hard for months.", "ans": "in spite of", "accept": ["in spite of"], "chunk1": "in spite", "chunk2": "of", "p1": "in spite of + gerund = despite (formal)", "p2": "of (essential — in spite OF, not 'in spite')", "hint": "BUT DIDN'T WIN / TRAINED HARD → IN SPITE OF TRAINING HARD. Three-word phrase + gerund.", "h": "BUT DIDN'T WIN / TRAINED HARD → IN SPITE OF TRAINING HARD. Three-word phrase + gerund."}, {"id": "b2t058", "orig": "The weather was so good that we decided to have a picnic.", "key": "SUCH", "before": "It was", "after": "we decided to have a picnic.", "ans": "such good weather that", "accept": ["such good weather that"], "chunk1": "such good weather", "chunk2": "that", "p1": "such + adjective + noun + that = so + adjective + that", "p2": "that (result conjunction — obligatory)", "hint": "SO GOOD → SUCH GOOD WEATHER THAT. SO + adjective → SUCH + (a) + adjective + noun.", "h": "SO GOOD → SUCH GOOD WEATHER THAT. SO + adjective → SUCH + (a) + adjective + noun."}, {"id": "b2t059", "orig": "The exam was so difficult that nobody finished all the questions.", "key": "SUCH", "before": "It was", "after": "nobody finished all the questions.", "ans": "such a difficult exam that", "accept": ["such a difficult exam that"], "chunk1": "such a difficult exam", "chunk2": "that", "p1": "such a + adjective + noun + that = result clause", "p2": "that (result conjunction — obligatory)", "hint": "SO DIFFICULT → SUCH A DIFFICULT EXAM THAT. Include the article A before the adjective.", "h": "SO DIFFICULT → SUCH A DIFFICULT EXAM THAT. Include the article A before the adjective."}, {"id": "b2t060", "orig": "He doesn't like jazz and she doesn't either.", "key": "NEITHER", "before": "", "after": "likes jazz.", "ans": "Neither of them", "accept": ["Neither of them", "Neither he nor she"], "chunk1": "neither", "chunk2": "them", "p1": "neither of them = not one of the two", "p2": "them (object pronoun — 'neither of them likes')", "hint": "HE DOESN'T / SHE DOESN'T EITHER → NEITHER OF THEM LIKES. Combined negative.", "h": "HE DOESN'T / SHE DOESN'T EITHER → NEITHER OF THEM LIKES. Combined negative."}, {"id": "b2t061", "orig": "'Have you ever visited Japan?' he asked her.", "key": "ASKED", "before": "He", "after": "she had ever visited Japan.", "ans": "asked her if", "accept": ["asked her if", "asked her whether"], "chunk1": "asked her", "chunk2": "if", "p1": "ask + object + if/whether = indirect yes/no question", "p2": "if (conjunction introducing the indirect question)", "hint": "'HAVE YOU EVER VISITED?' → ASKED HER IF SHE HAD. Indirect question.", "h": "'HAVE YOU EVER VISITED?' → ASKED HER IF SHE HAD. Indirect question."}, {"id": "b2t062", "orig": "It's a pity she didn't come to the party.", "key": "WISH", "before": "I", "after": "the party.", "ans": "wish she had come to", "accept": ["wish she had come to"], "chunk1": "wish she had", "chunk2": "come to", "p1": "wish + past perfect = regret about a past event", "p2": "come to (past participle + preposition)", "hint": "IT'S A PITY SHE DIDN'T COME → I WISH SHE HAD COME TO. Past regret using wish.", "h": "IT'S A PITY SHE DIDN'T COME → I WISH SHE HAD COME TO. Past regret using wish."}, {"id": "b2t063", "orig": "Heidi stayed at a friend's house when she visited London.", "key": "PUT", "before": "Heidi was", "after": "her friend when she visited London.", "ans": "put up by", "accept": ["put up by"], "chunk1": "put up", "chunk2": "by", "p1": "be put up by = be given accommodation by someone", "p2": "by (agent in passive phrasal verb)", "hint": "STAYED AT A FRIEND'S HOUSE → WAS PUT UP BY HER FRIEND. Passive of 'put up' (provide accommodation).", "h": "STAYED AT A FRIEND'S HOUSE → WAS PUT UP BY HER FRIEND. Passive of 'put up' (provide accommodation)."}, {"id": "b2t064", "orig": "The singer doesn't like people recognising him in the street.", "key": "LIKE", "before": "The singer doesn't", "after": "in the street.", "ans": "like being recognised", "accept": ["like being recognised", "like people recognising"], "chunk1": "like being", "chunk2": "recognised", "p1": "not like being + past participle = not enjoy having something done to you", "p2": "recognised (past participle — passive gerund)", "hint": "DOESN'T LIKE PEOPLE RECOGNISING → DOESN'T LIKE BEING RECOGNISED. Passive gerund.", "h": "DOESN'T LIKE PEOPLE RECOGNISING → DOESN'T LIKE BEING RECOGNISED. Passive gerund."}, {"id": "b2t065", "orig": "We ran out of milk so I went to the shop.", "key": "LEFT", "before": "There was no milk", "after": ", so I went to the shop.", "ans": "left at all", "accept": ["left at all", "left, so"], "chunk1": "left", "chunk2": "at all", "p1": "there was no X left = nothing remaining", "p2": "left (adjective meaning remaining — one word gap)", "hint": "RAN OUT OF MILK → NO MILK LEFT AT ALL. 'Left' = remaining; 'at all' strengthens the negation.", "h": "RAN OUT OF MILK → NO MILK LEFT AT ALL. 'Left' = remaining; 'at all' strengthens the negation."}, {"id": "b2t066", "orig": "That decision belongs to you — it's not my choice to make.", "key": "UP", "before": "It's", "after": "decide — not mine.", "ans": "up to you to", "accept": ["up to you to"], "chunk1": "up to you", "chunk2": "to", "p1": "it's up to someone to = it is their responsibility or choice", "p2": "to (infinitive marker after 'up to you')", "hint": "BELONGS TO YOU / YOUR CHOICE → IT'S UP TO YOU TO DECIDE. Fixed phrase.", "h": "BELONGS TO YOU / YOUR CHOICE → IT'S UP TO YOU TO DECIDE. Fixed phrase."}, {"id": "b2t067", "orig": "I'd prefer you not to tell anyone about this.", "key": "RATHER", "before": "I would", "after": "anyone about this.", "ans": "rather you didn't tell", "accept": ["rather you didn't tell", "rather you did not tell"], "chunk1": "rather you didn't", "chunk2": "tell", "p1": "would rather + subject + past simple = preference about someone else's action", "p2": "didn't tell (past simple negative — not 'don't tell')", "hint": "PREFER YOU NOT TO TELL → RATHER YOU DIDN'T TELL. Past subjunctive after 'would rather you'.", "h": "PREFER YOU NOT TO TELL → RATHER YOU DIDN'T TELL. Past subjunctive after 'would rather you'."}, {"id": "b2t068", "orig": "She forgot that she needed to call her mother.", "key": "REMEMBER", "before": "She didn't", "after": "her mother.", "ans": "remember to call", "accept": ["remember to call"], "chunk1": "remember to", "chunk2": "call", "p1": "not remember to + infinitive = forget to do something", "p2": "call (bare infinitive after 'to')", "hint": "FORGOT TO CALL → DIDN'T REMEMBER TO CALL. REMEMBER TO = the future-oriented meaning.", "h": "FORGOT TO CALL → DIDN'T REMEMBER TO CALL. REMEMBER TO = the future-oriented meaning."}, {"id": "b2t069", "orig": "The last time I went to the cinema was two months ago.", "key": "BEEN", "before": "I haven't", "after": "two months.", "ans": "been to the cinema for", "accept": ["been to the cinema for"], "chunk1": "been to the cinema", "chunk2": "for", "p1": "haven't been + for = present perfect with duration", "p2": "for (preposition for a period of time)", "hint": "LAST TIME WAS TWO MONTHS AGO → HAVEN'T BEEN FOR TWO MONTHS. Present perfect + for.", "h": "LAST TIME WAS TWO MONTHS AGO → HAVEN'T BEEN FOR TWO MONTHS. Present perfect + for."}, {"id": "b2t070", "orig": "Immediately after arriving home, she called her sister.", "key": "SOON", "before": "As", "after": "she called her sister.", "ans": "soon as she arrived home", "accept": ["soon as she arrived home", "soon as she got home"], "chunk1": "soon as she arrived", "chunk2": "home,", "p1": "as soon as = immediately after — time conjunction", "p2": "home, (the place + comma that follows the clause)", "hint": "IMMEDIATELY AFTER ARRIVING → AS SOON AS SHE ARRIVED HOME. Time clause with past simple.", "h": "IMMEDIATELY AFTER ARRIVING → AS SOON AS SHE ARRIVED HOME. Time clause with past simple."}, {"id": "b2t071", "orig": "Sandra's sister is a better skier than she is.", "key": "SKIER", "before": "Sandra is not as good a", "after": "her sister.", "ans": "skier as", "accept": ["skier as"], "chunk1": "skier", "chunk2": "as", "p1": "not as good a + noun + as = negative comparison including noun", "p2": "as (second 'as' in the comparison)", "hint": "BETTER SKIER THAN → NOT AS GOOD A SKIER AS. Comparison including the noun.", "h": "BETTER SKIER THAN → NOT AS GOOD A SKIER AS. Comparison including the noun."}, {"id": "b2t072", "orig": "Mark can't wait to use his new games console.", "key": "FORWARD", "before": "Mark is really looking", "after": "his new games console.", "ans": "forward to using", "accept": ["forward to using"], "chunk1": "forward to", "chunk2": "using", "p1": "look forward to + gerund = anticipate; can't wait = same meaning", "p2": "using (gerund after 'to')", "hint": "CAN'T WAIT TO USE → LOOKING FORWARD TO USING. TO is a preposition here, so the verb becomes a gerund.", "h": "CAN'T WAIT TO USE → LOOKING FORWARD TO USING. TO is a preposition here, so the verb becomes a gerund."}, {"id": "b2t073", "orig": "There has never been a higher attendance at a school event than last night's concert.", "key": "HIGHEST", "before": "Last night's concert attracted", "after": "ever recorded at a school event.", "ans": "the highest attendance", "accept": ["the highest attendance"], "chunk1": "the highest", "chunk2": "attendance", "p1": "the highest = superlative — nobody did better", "p2": "the highest (superlative — definite article required)", "hint": "NEVER BEEN A HIGHER → ATTRACTED THE HIGHEST. Superlative form: the highest + noun.", "h": "NEVER BEEN A HIGHER → ATTRACTED THE HIGHEST. Superlative form: the highest + noun."}, {"id": "b2t074", "orig": "Workmen completed the repairs to the road before the weekend.", "key": "HAD", "before": "The repairs to the road", "after": "before the weekend.", "ans": "had been completed", "accept": ["had been completed"], "h": "WORKMEN COMPLETED (active, past simple) → HAD BEEN COMPLETED (passive, past perfect). Two changes: active→passive + tense (past simple→past perfect). Answer: had been completed.", "chunk1": "had been", "chunk2": "completed", "p1": "had been (past perfect passive auxiliary)", "p2": "completed (active verb→passive participle)", "hint": "WORKMEN COMPLETED → HAD BEEN COMPLETED. Active→passive + past perfect."}, {"id": "b2t075", "orig": "Despite being exhausted, he managed to finish the race.", "key": "ALTHOUGH", "before": "", "after": "he managed to finish the race.", "ans": "Although he was exhausted", "accept": ["Although he was exhausted", "Although he was tired"], "chunk1": "although he was", "chunk2": "exhausted,", "p1": "although + clause = despite + gerund", "p2": "exhausted, (past participle as adjective + comma)", "hint": "DESPITE BEING EXHAUSTED → ALTHOUGH HE WAS EXHAUSTED. ALTHOUGH introduces a full clause.", "h": "DESPITE BEING EXHAUSTED → ALTHOUGH HE WAS EXHAUSTED. ALTHOUGH introduces a full clause."}, {"id": "b2t076", "orig": "It was unnecessary for her to leave so early.", "key": "NEED", "before": "She", "after": "so early.", "ans": "didn't need to leave", "accept": ["didn't need to leave", "needn't have left"], "chunk1": "need", "chunk2": "leave", "p1": "didn't need to = was not necessary (and may or may not have done it)", "p2": "leave (bare infinitive after 'to')", "hint": "UNNECESSARY FOR HER TO LEAVE → DIDN'T NEED TO LEAVE. Absence of obligation.", "h": "UNNECESSARY FOR HER TO LEAVE → DIDN'T NEED TO LEAVE. Absence of obligation."}, {"id": "b2t077", "orig": "She started working at this company ten years ago.", "key": "WORKING", "before": "She has been", "after": "ten years.", "ans": "working here for", "accept": ["working here for", "working at this company for"], "chunk1": "working", "chunk2": "for", "p1": "present perfect continuous + for = duration from past to now", "p2": "for (duration preposition)", "hint": "STARTED TEN YEARS AGO → HAS BEEN WORKING FOR TEN YEARS. Present perfect continuous.", "h": "STARTED TEN YEARS AGO → HAS BEEN WORKING FOR TEN YEARS. Present perfect continuous."}, {"id": "b2t078", "orig": "'Where do you live?' the interviewer asked her.", "key": "ASKED", "before": "The interviewer", "after": "she lived.", "ans": "asked where", "accept": ["asked where"], "chunk1": "asked", "chunk2": "where", "p1": "asked + where = indirect question", "p2": "where (question word in indirect question)", "hint": "'WHERE DO YOU LIVE?' → THE INTERVIEWER ASKED WHERE SHE LIVED. The gap is 'asked where'.", "h": "'WHERE DO YOU LIVE?' → THE INTERVIEWER ASKED WHERE SHE LIVED. The gap is 'asked where'."}, {"id": "b2t079", "orig": "All the students except Maria had already finished the exercise.", "key": "ONLY", "before": "Maria was the only student", "after": "already finished the exercise.", "ans": "not to have", "accept": ["not to have"], "h": "ALL EXCEPT MARIA → MARIA WAS THE ONLY STUDENT NOT TO HAVE. Two changes: quantifier (all except→only) + infinitive clause with perfect aspect (not to have finished). Answer: not to have.", "chunk1": "not to have", "chunk2": "not to have", "p1": "not to (negative infinitive clause)", "p2": "not to have (perfect infinitive — past action)", "hint": "ALL EXCEPT MARIA → ONLY STUDENT NOT TO HAVE. Cleft + perfect infinitive."}, {"id": "b2t080", "orig": "The exam was so difficult that none of the students could finish it in time.", "key": "TOO", "before": "The exam was", "after": "for any of the students to finish in time.", "ans": "too difficult", "accept": ["too difficult"], "chunk1": "too", "chunk2": "difficult", "p1": "so + adj + that → too + adj (structure shift)", "p2": "too difficult FOR (preposition required — too adj FOR someone to do)", "hint": "SO DIFFICULT THAT → TOO DIFFICULT FOR. Two changes: so/that → too/for + result clause → infinitive. Answer: too difficult.", "h": "SO DIFFICULT THAT NONE COULD → TOO DIFFICULT FOR ANY TO. Two changes: so/that→too/for + clause→infinitive. Answer: too difficult."}, {"id": "b2t081", "orig": "Her parents are making her study every evening.", "key": "MADE", "before": "She is being", "after": "every evening by her parents.", "ans": "made to study", "accept": ["made to study"], "chunk1": "made to", "chunk2": "study", "p1": "passive of make: be made to + infinitive (note: TO appears in passive form)", "p2": "study (infinitive — in passive, 'to' is required unlike active)", "hint": "MAKING HER STUDY → BEING MADE TO STUDY. In the passive of 'make', the TO appears.", "h": "MAKING HER STUDY → BEING MADE TO STUDY. In the passive of 'make', the TO appears."}, {"id": "b2t082", "orig": "I'm sure it was Tom who took my pen — I saw him near my desk.", "key": "MUST", "before": "It", "after": "Tom who took my pen.", "ans": "must have been", "accept": ["must have been"], "chunk1": "must have", "chunk2": "been", "p1": "must have been = logical deduction about the past", "p2": "been (auxiliary — past of be)", "hint": "I'M SURE IT WAS TOM → IT MUST HAVE BEEN TOM. Deduction about past.", "h": "I'M SURE IT WAS TOM → IT MUST HAVE BEEN TOM. Deduction about past."}, {"id": "b2t083", "orig": "He was so tired that he couldn't concentrate during the lecture.", "key": "ENOUGH", "before": "He was not", "after": "during the lecture.", "ans": "awake enough to concentrate", "accept": ["awake enough to concentrate", "alert enough to concentrate"], "chunk1": "awake enough", "chunk2": "to concentrate", "p1": "so tired → not awake enough (opposite adjective + enough)", "p2": "enough TO + infinitive (awake enough TO concentrate)", "hint": "SO TIRED THAT HE COULDN'T → NOT AWAKE ENOUGH TO. Two changes: opposite adjective + enough/infinitive. Answer: awake enough to concentrate.", "h": "SO TIRED HE COULDN'T CONCENTRATE → NOT AWAKE ENOUGH TO CONCENTRATE. Two changes: opposite adjective (tired→awake) + enough+infinitive. Answer: awake enough to concentrate."}, {"id": "b2t084", "orig": "She only agreed to come because her friend would be there.", "key": "HAVE", "before": "She wouldn't", "after": "if her friend wasn't going to be there.", "ans": "have agreed to come", "accept": ["have agreed to come"], "chunk1": "have agreed", "chunk2": "to come", "p1": "third conditional: wouldn't have + past participle", "p2": "to come (infinitive — agreed TO come)", "hint": "ONLY AGREED BECAUSE → WOULDN'T HAVE AGREED TO COME IF. Third conditional.", "h": "ONLY AGREED BECAUSE → WOULDN'T HAVE AGREED TO COME IF. Third conditional."}, {"id": "b2t085", "orig": "The police are looking into the disappearance of the paintings.", "key": "BEING", "before": "The disappearance of the paintings is", "after": "the police.", "ans": "being looked into by", "accept": ["being looked into by"], "chunk1": "being looked into", "chunk2": "by", "p1": "passive continuous: is being + past participle + by", "p2": "by (agent preposition)", "hint": "LOOKING INTO → IS BEING LOOKED INTO BY. Passive of phrasal verb in present continuous.", "h": "LOOKING INTO → IS BEING LOOKED INTO BY. Passive of phrasal verb in present continuous."}, {"id": "b2t086", "orig": "It wasn't obligatory for students to attend the lecture.", "key": "HAVE", "before": "Students didn't", "after": "the lecture.", "ans": "have to attend", "accept": ["have to attend"], "chunk1": "have to", "chunk2": "attend", "p1": "didn't have to = not obligatory — no obligation", "p2": "attend (bare infinitive)", "hint": "NOT OBLIGATORY → DIDN'T HAVE TO ATTEND. Absence of obligation.", "h": "NOT OBLIGATORY → DIDN'T HAVE TO ATTEND. Absence of obligation."}, {"id": "b2t087", "orig": "I'm not as interested in football as I used to be.", "key": "LOST", "before": "I have", "after": "football.", "ans": "lost interest in", "accept": ["lost interest in"], "chunk1": "lost interest", "chunk2": "in", "p1": "have lost interest in = no longer interested in", "p2": "in (preposition after 'interest')", "hint": "NOT AS INTERESTED AS I USED TO BE → HAVE LOST INTEREST IN. Present perfect + noun phrase.", "h": "NOT AS INTERESTED AS I USED TO BE → HAVE LOST INTEREST IN. Present perfect + noun phrase."}, {"id": "b2t088", "orig": "The company was founded in 1985 by a group of engineers.", "key": "SET", "before": "A group of engineers", "after": "the company in 1985.", "ans": "had set up", "accept": ["had set up"], "h": "WAS FOUNDED (passive, past simple) → HAD SET UP (active, past perfect, ph
